  <style>

    /* ─── UNIFIED SYSTEM - ALL PAGES ─── */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1.125rem;
    }

    .page-header-title {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .page-title {
      font-size: 1.125rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text-primary);
      font-family: var(--font-heading);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .page-subtitle {
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 700;
      font-family: var(--font-heading);
    }

    /* ─── CONTENT CARD ─── */
    .content-card {
      background: var(--glass-light);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: var(--radius-md);
      padding: 0.875rem;
      margin-bottom: 0.625rem;
      transition: all 180ms ease;
    }

    .content-card:hover {
      background: var(--glass-medium);
      border-color: rgba(212, 175, 55, 0.4);
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.2);
      transform: translateY(-2px);
    }

    /* ─── RANKING ITEM ─── */
    .ranking-item {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      padding: 0.875rem;
      background: var(--glass-light);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: var(--radius-md);
      margin-bottom: 0.625rem;
      transition: all 180ms ease;
      border-left: 3px solid var(--color-gold);
    }

    .ranking-item:hover {
      background: var(--glass-medium);
      border-color: rgba(212, 175, 55, 0.4);
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.15);
      transform: translateY(-1px);
    }

    .ranking-position {
      min-width: 32px;
      text-align: center;
      font-weight: 700;
      color: var(--color-gold);
      font-size: 1.1rem;
      font-family: var(--font-heading);
    }

    .ranking-info {
      flex: 1;
    }

    .ranking-name {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
      font-family: var(--font-heading);
      font-size: 0.95rem;
    }

    .ranking-details {
      display: flex;
      gap: 0.875rem;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .ranking-xp {
      color: var(--color-gold);
      font-weight: 700;
      font-family: var(--font-heading);
    }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      text-align: center;
      padding: 1.5rem 1rem;
      background: var(--glass-light);
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
    }

    .empty-state-icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      opacity: 0.7;
    }

    .empty-state-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.375rem;
      font-family: var(--font-heading);
    }

    .empty-state-subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* ─── DIVIDER ─── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(212, 175, 55, 0.15) 20%,
        rgba(212, 175, 55, 0.15) 80%,
        transparent 100%);
      margin: 1.125rem 0;
    }

    /* ─── PAGE CONTAINER ─── */
    .page-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 1rem 1.5rem 1rem;
      padding-bottom: var(--nav-height-bottom);
    }

    @media (max-width: 768px) {
      .page-container {
        padding: 0.875rem 1.25rem 1rem;
      }

      .page-title {
        font-size: 1rem;
      }
    }

    @media (max-width: 480px) {
      .page-container {
        padding: 0.75rem 1rem 1rem;
      }

      .page-title {
        font-size: 0.95rem;
      }

      .divider {
        margin: 0.875rem 0;
      }
    }

  </style>
</head>
