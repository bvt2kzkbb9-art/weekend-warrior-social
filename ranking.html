<main class="content-area" style="position:relative;z-index:1;">
  <div class="ranking-page">

    <!-- Header -->
    <div class="ranking-header">
      <div class="ranking-title">👑 Sala Chwały</div>
      <div class="ranking-subtitle">Tabela Najlepszych Wojowników Areny</div>
    </div>

    <div class="rpg-panel" style="margin-bottom:.875rem;overflow:visible;">
      <!-- Podium skeleton -->
      <div id="podium-skeleton" style="padding:1.5rem 1rem 1rem;display:flex;justify-content:center;align-items:flex-end;gap:.75rem;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:.375rem;">
          <div class="skeleton" style="width:56px;height:56px;border-radius:50%;"></div>
          <div class="skeleton" style="height:10px;width:50px;border-radius:4px;"></div>
          <div class="skeleton" style="height:8px;width:40px;border-radius:4px;"></div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:.375rem;margin-bottom:8px;">
          <div class="skeleton" style="width:72px;height:72px;border-radius:50%;"></div>
          <div class="skeleton" style="height:10px;width:60px;border-radius:4px;"></div>
          <div class="skeleton" style="height:8px;width:50px;border-radius:4px;"></div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:.375rem;margin-bottom:16px;">
          <div class="skeleton" style="width:48px;height:48px;border-radius:50%;"></div>
          <div class="skeleton" style="height:10px;width:44px;border-radius:4px;"></div>
          <div class="skeleton" style="height:8px;width:36px;border-radius:4px;"></div>
        </div>
      </div>

      <!-- Podium content -->
      <div id="ranking-podium" class="ranking-podium hidden"></div>
    </div>

    <!-- Ranking list -->
    <div class="rpg-panel">
      <div class="rpg-panel-header">
        <div class="rpg-panel-title">🗡 Tablice Wojowników</div>
        <div id="total-count" class="label-caps" style="font-size:.45rem;">—</div>
      </div>

      <!-- Filters -->
      <div style="display:flex;gap:.375rem;padding:.625rem .875rem;border-bottom:1px solid var(--border-dim);overflow-x:auto;scrollbar-width:none;">
        <button class="btn btn-primary btn-sm rank-filter active" data-filter="xp">⚔ XP</button>
        <button class="btn btn-outline btn-sm rank-filter" data-filter="wins">🏆 Wygrane</button>
        <button class="btn btn-outline btn-sm rank-filter" data-filter="streak">🔥 Seria</button>
      </div>

      <div id="ranking-list" class="ranking-list">
        <!-- Skeleton rows (static) -->
        <div class="ranking-row"><div class="skeleton" style="width:22px;height:14px;border-radius:3px;"></div><div class="skeleton" style="width:36px;height:36px;border-radius:50%;flex-shrink:0;"></div><div style="flex:1;display:flex;flex-direction:column;gap:.3rem;"><div class="skeleton" style="height:12px;width:55%;border-radius:3px;"></div><div class="skeleton" style="height:9px;width:35%;border-radius:3px;"></div></div><div class="skeleton" style="width:50px;height:12px;border-radius:3px;"></div></div>
        <div class="ranking-row"><div class="skeleton" style="width:22px;height:14px;border-radius:3px;"></div><div class="skeleton" style="width:36px;height:36px;border-radius:50%;flex-shrink:0;"></div><div style="flex:1;display:flex;flex-direction:column;gap:.3rem;"><div class="skeleton" style="height:12px;width:48%;border-radius:3px;"></div><div class="skeleton" style="height:9px;width:30%;border-radius:3px;"></div></div><div class="skeleton" style="width:50px;height:12px;border-radius:3px;"></div></div>
        <div class="ranking-row"><div class="skeleton" style="width:22px;height:14px;border-radius:3px;"></div><div class="skeleton" style="width:36px;height:36px;border-radius:50%;flex-shrink:0;"></div><div style="flex:1;display:flex;flex-direction:column;gap:.3rem;"><div class="skeleton" style="height:12px;width:60%;border-radius:3px;"></div><div class="skeleton" style="height:9px;width:38%;border-radius:3px;"></div></div><div class="skeleton" style="width:50px;height:12px;border-radius:3px;"></div></div>
        <div class="ranking-row"><div class="skeleton" style="width:22px;height:14px;border-radius:3px;"></div><div class="skeleton" style="width:36px;height:36px;border-radius:50%;flex-shrink:0;"></div><div style="flex:1;display:flex;flex-direction:column;gap:.3rem;"><div class="skeleton" style="height:12px;width:42%;border-radius:3px;"></div><div class="skeleton" style="height:9px;width:28%;border-radius:3px;"></div></div><div class="skeleton" style="width:50px;height:12px;border-radius:3px;"></div></div>
        <div class="ranking-row"><div class="skeleton" style="width:22px;height:14px;border-radius:3px;"></div><div class="skeleton" style="width:36px;height:36px;border-radius:50%;flex-shrink:0;"></div><div style="flex:1;display:flex;flex-direction:column;gap:.3rem;"><div class="skeleton" style="height:12px;width:52%;border-radius:3px;"></div><div class="skeleton" style="height:9px;width:33%;border-radius:3px;"></div></div><div class="skeleton" style="width:50px;height:12px;border-radius:3px;"></div></div>
      </div>

      <div id="load-more-ranking" style="padding:.625rem;text-align:center;display:none;">
        <button id="load-more-btn" class="btn btn-outline btn-sm">Załaduj więcej</button>
      </div>
    </div>

    <div style="height:.5rem;"></div>
  </div>
</main>

<script type="module">
  import { injectMessengerBadge } from './js/messenger.js';
  import { injectNotifBell } from './js/notifications.js';
  import { initTheme, injectLightModeCSS } from './js/weekly-ranking.js';
  import { checkAuth, logout } from './js/auth.js';
  import { db, COL, getRank, getLevel } from './js/firebase.js';
  import { collection, query, orderBy, limit, getDocs, startAfter } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  document.getElementById('logout-btn').addEventListener('click', logout);

  let myUid = null;
  let lastDoc = null;
  let currentFilter = 'points';
  const PAGE_SIZE = 20;

  injectLightModeCSS();
  initTheme();

  checkAuth(async (user) => {
    myUid = user.uid;
    injectMessengerBadge(user.uid);
    injectNotifBell(user.uid);
    // 2s skeleton timeout safety
    const skeletonTimeout = setTimeout(() => {
      const sk = document.getElementById('podium-skeleton');
      if (sk && sk.style.display !== 'none') {
        sk.style.display = 'none';
        document.getElementById('ranking-podium').classList.remove('hidden');
      }
    }, 2000);
    await _loadPodium();
    clearTimeout(skeletonTimeout);
    await _loadRankingPage(true);
    _setupFilters();
  });

  async function _loadPodium() {
    try {
      const snap = await getDocs(query(collection(db, COL.USERS), orderBy('points','desc'), limit(3)));
      const users = []; snap.forEach(d => users.push({uid:d.id,...d.data()}));
      const podium = document.getElementById('ranking-podium');
      const skeleton = document.getElementById('podium-skeleton');
      skeleton.style.display = 'none';
      podium.classList.remove('hidden');

      const slots = [
        {rank:2, i:1, users},
        {rank:1, i:0, users},
        {rank:3, i:2, users},
      ];
      slots.forEach(({rank, i}) => {
        const u = users[i];
        if (!u) return;
        const ini = (u.displayName||'?')[0].toUpperCase();
        const crown = ['','👑','🥈','🥉'][rank];
        const colors = ['','var(--podium-1)','var(--podium-2)','var(--podium-3)'];
        const div = document.createElement('div');
        div.className = `podium-slot rank-${rank}`;
        div.style.animationDelay = (i * .12) + 's';
        div.innerHTML = `
          <div class="podium-crown-wrap" style="color:${colors[rank]};">${crown}</div>
          <div class="podium-avatar-wrap">
            <div class="podium-avatar">
              ${u.photoURL?`<img src="${_esc(u.photoURL)}" onerror="this.parentElement.textContent='${ini}'">`
              :ini}
            </div>
          </div>
          <div class="podium-base">
            <div class="podium-name">${_esc((u.displayName||'?').split(' ')[0])}</div>
            <div class="podium-pts">${(u.points||0).toLocaleString('pl-PL')} XP</div>
          </div>`;
        if (u.uid === myUid) div.style.filter = 'drop-shadow(0 0 12px rgba(212,175,55,.4))';
        podium.appendChild(div);
      });
    } catch(e) { console.warn('[podium]', e); }
  }

  async function _loadRankingPage(reset = false) {
    if (reset) { lastDoc = null; }
    const list = document.getElementById('ranking-list');
    if (reset) list.innerHTML = '';

    try {
      let q = query(collection(db, COL.USERS), orderBy(currentFilter,'desc'), limit(PAGE_SIZE));
      if (lastDoc) q = query(collection(db, COL.USERS), orderBy(currentFilter,'desc'), startAfter(lastDoc), limit(PAGE_SIZE));
      const snap = await getDocs(q);
      const docs = snap.docs;
      lastDoc = docs[docs.length - 1];

      const startPos = reset ? 1 : list.querySelectorAll('.ranking-row').length + 1;
      docs.forEach((d, i) => {
        const u = {uid:d.id,...d.data()};
        const pos = startPos + i;
        const ini = (u.displayName||'?')[0].toUpperCase();
        const rankObj = getRank(u.points||0);
        const row = document.createElement('div');
        row.className = 'ranking-row' + (u.uid===myUid?' is-me':'');
        row.style.animationDelay = (i*.04)+'s';
        row.innerHTML = `
          <div class="rank-number">${pos <= 3 ? ['🥇','🥈','🥉'][pos-1] : pos}</div>
          <div class="rank-avatar">${u.photoURL?`<img src="${_esc(u.photoURL)}" onerror="this.parentElement.textContent='${ini}'">`
            :ini}</div>
          <div class="rank-info">
            <div class="rank-name">${_esc(u.displayName||'Wojownik')}${u.uid===myUid?' (Ty)':''}</div>
            <div class="rank-sub">${rankObj.emoji} ${rankObj.label}</div>
          </div>
          <div class="rank-pts">${(u.points||0).toLocaleString('pl-PL')} XP</div>
          ${(u.streak||0)>=3?`<div class="rank-streak">${u.streak}🔥</div>`:''}`;
        row.addEventListener('click', () => { window.location.href = `user.html?uid=${u.uid}`; });
        list.appendChild(row);
      });

      const loadMoreWrap = document.getElementById('load-more-ranking');
      loadMoreWrap.style.display = docs.length === PAGE_SIZE ? 'block' : 'none';
    } catch(e) { console.warn('[ranking]', e); }
  }

  function _setupFilters() {
    document.querySelectorAll('.rank-filter').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.rank-filter').forEach(b => {
          b.classList.remove('active');
          b.className = b.className.replace('btn-primary','btn-outline');
        });
        btn.classList.add('active');
        btn.className = btn.className.replace('btn-outline','btn-primary');
        const f = btn.dataset.filter;
        currentFilter = f === 'xp' ? 'points' : f === 'wins' ? 'challengesCompleted' : 'streak';
        _loadRankingPage(true);
      });
    });
    document.getElementById('load-more-btn')?.addEventListener('click', () => _loadRankingPage(false));
  }

  function _esc(s){if(typeof s!=='string')return '';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
  <script src="js/autohide-nav.js"></script>
</body>
</html>
