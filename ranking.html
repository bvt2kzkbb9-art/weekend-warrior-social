<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#06050A"/>
  <title>Sala Chwały — Weekend Warrior Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/navigation.css"/>

</head>
<body>
<div class="bg-orbs" aria-hidden="true"></div>
<div class="particles" aria-hidden="true">
  <div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div>
  <div class="particle"></div>
</div>

<!-- Top Navigation -->
<header class="top-nav" aria-label="Górna nawigacja">
  <a href="index.html" class="top-nav-logo">
    <svg class="logo-svg" viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="sword-grad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#E8D5B5;stop-opacity:1"/>
          <stop offset="50%" style="stop-color:#C9A75C;stop-opacity:1"/>
          <stop offset="100%" style="stop-color:#8B6914;stop-opacity:1"/>
        </linearGradient>
        <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.15"/>
          <stop offset="100%" style="stop-color:#C9A75C;stop-opacity:0.08"/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <path d="M 20 8 L 22 8 L 22 24 Q 22 32 20 38 Q 18 32 18 24 L 18 8 Z" fill="url(#shield-grad)" stroke="rgba(212,175,55,0.3)" stroke-width="2.3"/>
      <g filter="url(#glow)">
        <line x1="16" y1="20" x2="24" y2="8" stroke="url(#sword-grad)" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M 23 9 L 25 6 L 26 7 L 24 10 Z" fill="url(#sword-grad)"/>
        <ellipse cx="20" cy="14" rx="1.2" ry="0.8" fill="rgba(255,255,255,0.2)"/>
      </g>
      <g filter="url(#glow)">
        <line x1="24" y1="20" x2="16" y2="8" stroke="url(#sword-grad)" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M 17 9 L 15 6 L 14 7 L 16 10 Z" fill="url(#sword-grad)"/>
        <ellipse cx="20" cy="14" rx="1.2" ry="0.8" fill="rgba(255,255,255,0.2)"/>
      </g>
      <circle cx="20" cy="22" r="3" fill="none" stroke="#D4AF37" stroke-width="2.3" opacity="0.6"/>
      <text x="38" y="24" font-family="'Orbitron', 'Courier New', monospace" font-size="14" font-weight="900" letter-spacing="1" fill="#D4AF37" text-anchor="start">
        WEEKEND WARRIOR
      </text>
      <text x="38" y="35" font-family="'Orbitron', 'Courier New', monospace" font-size="6" font-weight="700" letter-spacing="0.8" fill="#C9A75C" text-anchor="start" opacity="0.85">
        SOCIAL
      </text>
      <line x1="16" y1="6" x2="24" y2="6" stroke="rgba(255,255,255,0.1)" stroke-width="2.3" stroke-linecap="round"/>
    </svg>
  </a>
  <div class="top-nav-actions">
    <button class="top-nav-action" title="Powiadomienia" aria-label="Powiadomienia">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="nav-badge hide">0</span>
    </button>
    <button class="top-nav-action" title="Wiadomości" aria-label="Wiadomości">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span class="nav-badge hide">0</span>
    </button>
    <a href="profile.html" class="top-nav-action" title="Profil" aria-label="Profil">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </a>
    <button id="logout-btn" class="top-nav-action" title="Wyloguj" aria-label="Wyloguj">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</header>

<!-- Bottom Navigation -->
<nav class="bottom-nav" aria-label="Główna nawigacja">
  <a href="index.html" class="bottom-nav-item" data-nav="arena">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14.5 10c-.83 0-1.5-.67-1.5-1.5v-5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5z"/>
      <path d="M20.5 10H19V8.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
    </svg>
    <span>Arena</span>
  </a>

  <a href="feed.html" class="bottom-nav-item" data-nav="kroniki">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
    </svg>
    <span>Kroniki</span>
  </a>

  <a href="challenges.html" class="bottom-nav-item hero-item" data-nav="misje">
    <div class="hero-shield">⚔</div>
    <span>Misje</span>
  </a>

  <a href="ranking.html" class="bottom-nav-item" data-nav="chwal" active" aria-current="page">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="8" r="6"/>
      <path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/>
    </svg>
    <span>Chwała</span>
  </a>

  <a href="profile.html" class="bottom-nav-item" data-nav="bohater">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
    <span>Bohater</span>
  </a>
</nav>

<main class="content-area" style="position:relative;z-index:1;">
  <div class="ranking-page">

    <!-- Header -->
    <div class="ranking-header">
      <div class="ranking-title">👑 Sala Chwały</div>
      <div class="ranking-subtitle">Tabela Najlepszych Wojowników Areny</div>
    </div>

    <div class="rpg-panel" style="margin-bottom:.875rem;overflow:visible;">
      <!-- Podium skeleton -->
      <div id="podium-skeleton" style="padding:1.5rem 1rem 1rem;display:flex;justify-content:center;align-items:flex-end;gap:.75rem;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:.375rem;">
          <div class="skeleton" style="width:56px;height:56px;border-radius:50%;"></div>
          <div class="skeleton" style="height:10px;width:50px;border-radius:4px;"></div>
          <div class="skeleton" style="height:8px;width:40px;border-radius:4px;"></div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:.375rem;margin-bottom:8px;">
          <div class="skeleton" style="width:72px;height:72px;border-radius:50%;"></div>
          <div class="skeleton" style="height:10px;width:60px;border-radius:4px;"></div>
          <div class="skeleton" style="height:8px;width:50px;border-radius:4px;"></div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:.375rem;margin-bottom:16px;">
          <div class="skeleton" style="width:48px;height:48px;border-radius:50%;"></div>
          <div class="skeleton" style="height:10px;width:44px;border-radius:4px;"></div>
          <div class="skeleton" style="height:8px;width:36px;border-radius:4px;"></div>
        </div>
      </div>

      <!-- Podium content -->
      <div id="ranking-podium" class="ranking-podium hidden"></div>
    </div>

    <!-- Ranking list -->
    <div class="rpg-panel">
      <div class="rpg-panel-header">
        <div class="rpg-panel-title">🗡 Tablice Wojowników</div>
        <div id="total-count" class="label-caps" style="font-size:.45rem;">—</div>
      </div>

      <!-- Filters -->
      <div style="display:flex;gap:.375rem;padding:.625rem .875rem;border-bottom:1px solid var(--border-dim);overflow-x:auto;scrollbar-width:none;">
        <button class="btn btn-primary btn-sm rank-filter active" data-filter="xp">⚔ XP</button>
        <button class="btn btn-outline btn-sm rank-filter" data-filter="wins">🏆 Wygrane</button>
        <button class="btn btn-outline btn-sm rank-filter" data-filter="streak">🔥 Seria</button>
      </div>

      <div id="ranking-list" class="ranking-list">
        <!-- Skeleton rows (static) -->
        <div class="ranking-row"><div class="skeleton" style="width:22px;height:14px;border-radius:3px;"></div><div class="skeleton" style="width:36px;height:36px;border-radius:50%;flex-shrink:0;"></div><div style="flex:1;display:flex;flex-direction:column;gap:.3rem;"><div class="skeleton" style="height:12px;width:55%;border-radius:3px;"></div><div class="skeleton" style="height:9px;width:35%;border-radius:3px;"></div></div><div class="skeleton" style="width:50px;height:12px;border-radius:3px;"></div></div>
        <div class="ranking-row"><div class="skeleton" style="width:22px;height:14px;border-radius:3px;"></div><div class="skeleton" style="width:36px;height:36px;border-radius:50%;flex-shrink:0;"></div><div style="flex:1;display:flex;flex-direction:column;gap:.3rem;"><div class="skeleton" style="height:12px;width:48%;border-radius:3px;"></div><div class="skeleton" style="height:9px;width:30%;border-radius:3px;"></div></div><div class="skeleton" style="width:50px;height:12px;border-radius:3px;"></div></div>
        <div class="ranking-row"><div class="skeleton" style="width:22px;height:14px;border-radius:3px;"></div><div class="skeleton" style="width:36px;height:36px;border-radius:50%;flex-shrink:0;"></div><div style="flex:1;display:flex;flex-direction:column;gap:.3rem;"><div class="skeleton" style="height:12px;width:60%;border-radius:3px;"></div><div class="skeleton" style="height:9px;width:38%;border-radius:3px;"></div></div><div class="skeleton" style="width:50px;height:12px;border-radius:3px;"></div></div>
        <div class="ranking-row"><div class="skeleton" style="width:22px;height:14px;border-radius:3px;"></div><div class="skeleton" style="width:36px;height:36px;border-radius:50%;flex-shrink:0;"></div><div style="flex:1;display:flex;flex-direction:column;gap:.3rem;"><div class="skeleton" style="height:12px;width:42%;border-radius:3px;"></div><div class="skeleton" style="height:9px;width:28%;border-radius:3px;"></div></div><div class="skeleton" style="width:50px;height:12px;border-radius:3px;"></div></div>
        <div class="ranking-row"><div class="skeleton" style="width:22px;height:14px;border-radius:3px;"></div><div class="skeleton" style="width:36px;height:36px;border-radius:50%;flex-shrink:0;"></div><div style="flex:1;display:flex;flex-direction:column;gap:.3rem;"><div class="skeleton" style="height:12px;width:52%;border-radius:3px;"></div><div class="skeleton" style="height:9px;width:33%;border-radius:3px;"></div></div><div class="skeleton" style="width:50px;height:12px;border-radius:3px;"></div></div>
      </div>

      <div id="load-more-ranking" style="padding:.625rem;text-align:center;display:none;">
        <button id="load-more-btn" class="btn btn-outline btn-sm">Załaduj więcej</button>
      </div>
    </div>

    <div style="height:.5rem;"></div>
  </div>
</main>

<script src="js/navigation.js"></script>
<script src="js/icon-system.js"></script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
