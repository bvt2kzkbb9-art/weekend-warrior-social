<!-- Content -->

    <div class="challenges-header">

<!-- ══════════════════════════════════════════
     CHALLENGE MODAL
══════════════════════════════════════════ -->
<div id="ch-modal-backdrop" class="ch-modal-backdrop hidden">
  <div class="ch-modal" id="ch-modal">
    <img id="modal-img" src="" alt="" class="ch-modal-img" style="display:none;"/>
    <div class="ch-modal-body">
      <div id="modal-badge" class="ch-modal-badge"></div>
      <div id="modal-title" class="ch-modal-title"></div>
      <div id="modal-desc" class="ch-modal-desc"></div>
      <div class="ch-modal-stats">
        <div class="ch-modal-stat">
          <span id="modal-xp" class="ch-modal-stat-val">+0 XP</span>
          <span class="ch-modal-stat-label">Nagroda</span>
        </div>
        <div class="ch-modal-stat">
          <span id="modal-diff" class="ch-modal-stat-val">—</span>
          <span class="ch-modal-stat-label">Poziom</span>
        </div>
        <div class="ch-modal-stat">
          <span id="modal-cat" class="ch-modal-stat-val">—</span>
          <span class="ch-modal-stat-label">Kategoria</span>
        </div>
      </div>
      <div class="ch-modal-actions">
        <button id="modal-quiz-btn" class="rpg-btn rpg-btn-gold" style="flex:1;">🧠 Przystąp do Quizu</button>
        <button id="modal-close-btn" class="rpg-btn rpg-btn-outline" style="flex:1;">✖ Zamknij</button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     QUIZ OVERLAY — PRÓBA WOJOWNIKA
══════════════════════════════════════════ -->
<div id="quiz-overlay" class="quiz-overlay hidden">
  <div class="quiz-container">

    <!-- Quiz header -->
    <div class="quiz-header">
      <span class="quiz-eyebrow">⚔ Próba Wojownika</span>
      <div id="quiz-ch-title" class="quiz-title">—</div>
      <div class="quiz-progress-row">
        <div class="quiz-progress-track">
          <div id="quiz-progress-fill" class="quiz-progress-fill" style="width:0%;"></div>
        </div>
        <span id="quiz-progress-label" class="quiz-progress-label">0 / 0</span>
      </div>
    </div>

    <!-- Question parchment -->
    <div class="quiz-parchment" id="quiz-parchment-wrap">
      <div id="quiz-q-num" class="quiz-q-num">Pytanie 1</div>
      <div id="quiz-question" class="quiz-question">—</div>
    </div>

    <!-- Answers -->
    <div id="quiz-answers" class="quiz-answers"></div>

    <!-- Feedback -->
    <div id="quiz-feedback" class="quiz-feedback hidden"></div>

    <!-- Result -->
    <div id="quiz-result" class="quiz-result hidden">
      <div id="quiz-result-icon" class="quiz-result-icon">🏆</div>
      <div id="quiz-result-title" class="quiz-result-title">—</div>
      <div id="quiz-result-msg" class="quiz-result-message">—</div>
      <div id="quiz-xp-earned" class="quiz-xp-earned">⭐ +0 XP</div>
      <div style="display:flex;gap:.625rem;justify-content:center;flex-wrap:wrap;margin-top:.5rem;">
        <button id="quiz-back-btn" class="rpg-btn rpg-btn-gold">⚔ Wróć do Misji</button>
        <button id="quiz-retry-btn" class="rpg-btn rpg-btn-outline" style="display:none;">🔄 Spróbuj ponownie</button>
      </div>
    </div>

  </div>
</div>

<!-- Level-up overlay -->
<div id="level-up-overlay" class="level-up-overlay hidden">
  <div class="level-up-burst">🎉 AWANS!</div>
  <div id="level-up-text" class="level-up-burst" style="font-size:clamp(1.25rem,4vw,2rem);"></div>
  <div class="level-up-sub">Nowy poziom osiągnięty, Wojowniku!</div>
</div>

<script type="module">
  import { injectMessengerBadge } from './js/messenger.js';
  import { initTheme, injectLightModeCSS } from './js/weekly-ranking.js';
  import { checkAuth, logout, showToast } from './js/auth.js';
  import { db, COL, getLevel, getRank, RANKS } from './js/firebase.js';
  import { CHALLENGES_DATA } from './js/challenge-system.js';
  import {
    collection, addDoc, doc, updateDoc, getDoc, increment, serverTimestamp,
    query, where, getDocs, orderBy, limit,
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  injectLightModeCSS();
  initTheme();

  document.getElementById('logout-btn').addEventListener('click', logout);

  let currentUser = null;
  let currentUserData = null;
  let currentChallenge = null;

  checkAuth(async (user) => {
    currentUser = user;
    injectMessengerBadge(user.uid);
    // 2s skeleton safety (grid is rendered by JS anyway — just ensure it shows empty if CHALLENGES_DATA fails)
    const skTimer = setTimeout(() => {
      const grid = document.getElementById('challenges-grid');
      if (grid && grid.children.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem 1rem;
          font-family:var(--font-heading);font-size:.7rem;color:var(--text-faint);font-style:italic;">
          Brak dostępnych misji.</div>`;
      }
    }, 2000);
    try {
      const snap = await getDoc(doc(db, COL.USERS, user.uid));
      currentUserData = snap.exists() ? snap.data() : { points: 0, displayName: user.displayName };
    } catch {}
    clearTimeout(skTimer);
    _renderGrid();
  });

  // ── Challenge Grid ──────────────────────────────────────────────
  function _renderGrid() {
    const grid = document.getElementById('challenges-grid');
    if (!grid) return;
    grid.innerHTML = '';
    CHALLENGES_DATA.forEach((ch, idx) => {
      const card = document.createElement('div');
      card.className = 'ch-full-card';
      card.style.animationDelay = (idx * 0.06) + 's';
      card.innerHTML = `
        <div class="rpg-ch-num">${ch.order}</div>
        <div class="ch-full-img-wrap">
          <img src="${ch.image}" alt="${_esc(ch.title)}" class="ch-full-img" loading="lazy"
            onerror="this.style.display='none';this.parentElement.style.background='#1A150E'"/>
        </div>
        <div class="ch-full-body">
          <div class="ch-full-badge">${ch.badge}</div>
          <div class="ch-full-title">${_esc(ch.title)}</div>
          <div class="ch-full-xp">+${ch.xp} XP</div>
          <div class="ch-full-actions">
            <div class="ch-full-action primary">🧠 Quiz</div>
            <div class="ch-full-action">⚔️ Rzuć</div>
          </div>
        </div>`;
      card.querySelectorAll('.ch-full-action')[0].addEventListener('click', e => {
        e.stopPropagation(); _openQuiz(ch);
      });
      card.querySelectorAll('.ch-full-action')[1].addEventListener('click', e => {
        e.stopPropagation(); _openModal(ch);
      });
      card.addEventListener('click', () => _openModal(ch));
      grid.appendChild(card);
    });
  }

  // ── Challenge Modal ─────────────────────────────────────────────
  function _openModal(ch) {
    currentChallenge = ch;
    document.getElementById('modal-badge').textContent = ch.badge;
    document.getElementById('modal-title').textContent = ch.title;
    document.getElementById('modal-desc').textContent = ch.description || `Podejmij wyzwanie ${ch.title} i zdobądź XP!`;
    document.getElementById('modal-xp').textContent = `+${ch.xp} XP`;
    document.getElementById('modal-diff').textContent = ch.difficulty || 'Średni';
    document.getElementById('modal-cat').textContent = ch.category || 'Ogólne';
    const img = document.getElementById('modal-img');
    if (ch.image) { img.src = ch.image; img.style.display = 'block'; } else img.style.display = 'none';
    document.getElementById('ch-modal-backdrop').classList.remove('hidden');
  }

  document.getElementById('modal-close-btn').addEventListener('click', () => {
    document.getElementById('ch-modal-backdrop').classList.add('hidden');
  });
  document.getElementById('ch-modal-backdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('ch-modal-backdrop'))
      document.getElementById('ch-modal-backdrop').classList.add('hidden');
  });
  document.getElementById('modal-quiz-btn').addEventListener('click', () => {
    document.getElementById('ch-modal-backdrop').classList.add('hidden');
    if (currentChallenge) _openQuiz(currentChallenge);
  });

  // ── Quiz System ─────────────────────────────────────────────────
  let quizState = {
    questions: [], current: 0, correct: 0,
    answered: false, challenge: null
  };

  /**
   * Konwertuje format z challenge-system.js:
   *   ch.quiz = { question, answers: [...], correct: N, wrongMessages: [...] }
   * na wewnętrzny format:
   *   [{ question, options: [...], correctIndex: N }]
   */
  function _buildQuestions(ch) {
    // Nowy format: ch.quiz to obiekt z jednym pytaniem (challenge-system.js)
    if (ch.quiz && ch.quiz.question && Array.isArray(ch.quiz.answers)) {
      return [{
        question:     ch.quiz.question,
        options:      ch.quiz.answers,
        correctIndex: typeof ch.quiz.correct === 'number' ? ch.quiz.correct : 0,
      }];
    }
    // Stary format tablicowy: ch.quiz = [{ question, options, correctIndex }]
    if (Array.isArray(ch.quiz) && ch.quiz.length > 0) {
      return ch.quiz;
    }
    // Fallback
    return _defaultQuestions(ch);
  }

  function _openQuiz(ch) {
    const questions = _buildQuestions(ch);
    quizState = { questions, current: 0, correct: 0, answered: false, challenge: ch };

    document.getElementById('quiz-ch-title').textContent = ch.title;
    document.getElementById('quiz-overlay').classList.remove('hidden');
    document.getElementById('quiz-result').classList.add('hidden');
    document.getElementById('quiz-parchment-wrap').classList.remove('hidden');
    document.getElementById('quiz-answers').classList.remove('hidden');
    _renderQuestion();
  }

  function _renderQuestion() {
    const { questions, current } = quizState;
    const q = questions[current];
    if (!q) return;

    document.getElementById('quiz-q-num').textContent = `Pytanie ${current + 1}`;
    document.getElementById('quiz-question').textContent = q.question;
    document.getElementById('quiz-progress-label').textContent = `${current + 1} / ${questions.length}`;
    const pct = ((current + 1) / questions.length) * 100;
    document.getElementById('quiz-progress-fill').style.width = pct + '%';
    document.getElementById('quiz-feedback').classList.add('hidden');

    const answersEl = document.getElementById('quiz-answers');
    answersEl.innerHTML = '';
    const runes = ['Ⅰ','Ⅱ','Ⅲ','Ⅳ'];
    // Obsługuje zarówno `options` jak i `answers` (aliasy)
    const opts = q.options || q.answers || [];
    opts.forEach((opt, i) => {
      const btn = document.createElement('div');
      btn.className = 'quiz-answer';
      btn.style.animationDelay = (i * 0.07) + 's';
      btn.innerHTML = `
        <div class="quiz-answer-rune">${runes[i] || (i + 1)}</div>
        <div class="quiz-answer-text">${_esc(opt)}</div>`;
      btn.addEventListener('click', () => _selectAnswer(i, btn));
      answersEl.appendChild(btn);
    });
    quizState.answered = false;
  }

  function _selectAnswer(idx, btn) {
    if (quizState.answered) return;
    quizState.answered = true;

    const q = quizState.questions[quizState.current];
    // Obsługuje zarówno `correctIndex` jak i `correct` (aliasy)
    const correctIdx = typeof q.correctIndex === 'number' ? q.correctIndex
                     : typeof q.correct      === 'number' ? q.correct
                     : 0;
    const isCorrect = idx === correctIdx;
    const feedback = document.getElementById('quiz-feedback');
    const allBtns = document.querySelectorAll('.quiz-answer');

    // Zaznacz poprawną odpowiedź
    if (allBtns[correctIdx]) allBtns[correctIdx].classList.add('correct');
    if (!isCorrect) btn.classList.add('wrong');

    // Feedback message
    feedback.classList.remove('hidden', 'correct', 'wrong');
    if (isCorrect) {
      feedback.classList.add('correct');
      feedback.innerHTML = `<span class="quiz-feedback-icon">⚔️</span>Arena uznała Cię za godnego!`;
      quizState.correct++;
    } else {
      // Losowy komunikat z wrongMessages lub domyślny
      const msgs = q.wrongMessages;
      const msg = (Array.isArray(msgs) && msgs.length)
        ? msgs[Math.floor(Math.random() * msgs.length)]
        : 'Hydra śmieje się z Twojej odpowiedzi…';
      feedback.classList.add('wrong');
      feedback.innerHTML = `<span class="quiz-feedback-icon">🐍</span>${_esc(msg)}`;
    }

    // Advance after delay
    setTimeout(() => {
      quizState.current++;
      if (quizState.current < quizState.questions.length) {
        _renderQuestion();
      } else {
        _showResult();
      }
    }, 1600);
  }

  async function _showResult() {
    const { questions, correct, challenge } = quizState;
    const total = questions.length;
    const passed = correct >= Math.ceil(total * 0.6);
    const xpEarned = passed ? Math.round(challenge.xp * (correct / total)) : 0;

    document.getElementById('quiz-parchment-wrap').classList.add('hidden');
    document.getElementById('quiz-answers').classList.add('hidden');
    document.getElementById('quiz-feedback').classList.add('hidden');

    const result = document.getElementById('quiz-result');
    result.classList.remove('hidden');
    document.getElementById('quiz-result-icon').textContent = passed ? '🏆' : '💀';
    document.getElementById('quiz-result-title').textContent = passed
      ? '⚔️ Przetestowany w Boju!'
      : '🐍 Hydra Zatriumfowała...';
    document.getElementById('quiz-result-msg').textContent = passed
      ? `Odpowiedziałeś poprawnie na ${correct} z ${total} pytań. Arena cię honoruje!`
      : `Tylko ${correct} z ${total} odpowiedzi było poprawnych. Trenuj mocniej, wojowniku!`;
    document.getElementById('quiz-xp-earned').textContent = xpEarned > 0 ? `⭐ +${xpEarned} XP` : '❌ 0 XP';
    document.getElementById('quiz-retry-btn').style.display = passed ? 'none' : 'inline-flex';

    if (xpEarned > 0 && currentUser) {
      try {
        const userRef = doc(db, COL.USERS, currentUser.uid);
        const beforeSnap = await getDoc(userRef);
        const oldPts = beforeSnap.data()?.points || 0;
        await updateDoc(userRef, {
          points: increment(xpEarned),
          quizzesCompleted: increment(1),
        });
        // Check level-up
        const newPts = oldPts + xpEarned;
        if (getLevel(newPts) > getLevel(oldPts)) {
          _showLevelUp(getLevel(newPts), getRank(newPts));
        }
        showToast(`+${xpEarned} XP zdobyte! 🌟`, 'success');
      } catch (e) { console.warn('[xp update]', e); }
    }
  }

  function _showLevelUp(level, rankObj) {
    const overlay = document.getElementById('level-up-overlay');
    const text = document.getElementById('level-up-text');
    text.textContent = `Poziom ${level} · ${rankObj.emoji} ${rankObj.label}`;
    overlay.classList.remove('hidden');
    setTimeout(() => overlay.classList.add('hidden'), 3500);
  }

  document.getElementById('quiz-back-btn').addEventListener('click', () => {
    document.getElementById('quiz-overlay').classList.add('hidden');
  });
  document.getElementById('quiz-retry-btn').addEventListener('click', () => {
    if (quizState.challenge) _openQuiz(quizState.challenge);
  });

  function _defaultQuestions(ch) {
    return [
      {
        question: `Jakiej dyscypliny sportowej dotyczy wyzwanie "${ch.title}"?`,
        options: ['Bieganie', 'Pływanie', 'Siłownia', 'Ogólna sprawność'],
        correctIndex: 3,
      },
      {
        question: 'Jak często należy trenować, aby zauważyć postępy?',
        options: ['Raz w miesiącu', 'Raz w tygodniu', '3–4 razy w tygodniu', '10 razy dziennie'],
        correctIndex: 2,
      },
      {
        question: 'Co jest kluczem do sukcesu w długoterminowym treningu?',
        options: ['Intensywność', 'Regularność i konsekwencja', 'Drogi sprzęt', 'Dieta białkowa'],
        correctIndex: 1,
      },
    ];
  }

  function _esc(s){if(typeof s!=='string')return '';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>

</body>
</html>
