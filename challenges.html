<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#0B0D12"/>
  <title>Misje — Weekend Warrior Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/rpg-theme.css"/>
  <link rel="stylesheet" href="css/challenges.css"/>
  <style>
    /* ── Tabs ── */
    .cs-tabs {
      display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; gap: 0;
      background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 3px; margin-bottom: .875rem;
    }
    .cs-tabs::-webkit-scrollbar { display: none; }
    [data-cs-tab] {
      flex: 1; flex-shrink: 0;
      padding: .5rem .5rem; background: none; border: none;
      border-radius: calc(var(--r-lg) - 3px);
      font-family: var(--font-ui); font-size: .6875rem; font-weight: 600;
      color: var(--text-muted); cursor: pointer;
      transition: all var(--dur-fast); white-space: nowrap; min-height: 36px;
    }
    [data-cs-tab].active { background: var(--bg-card); color: var(--text-primary); box-shadow: 0 1px 4px rgba(0,0,0,.3); }

    /* ── Challenge cards grid ── */
    .cs-cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(260px,100%), 1fr));
      gap: .875rem; width: 100%;
    }

    /* ── Sections ── */
    .cs-section { display: none; }

    /* Page header */
    .ch-page-header { padding: .75rem 0 .5rem; }
    .ch-page-title  { font-size: 1.125rem; font-weight: 700; color: var(--text-primary); }
    .ch-page-sub    { font-size: .875rem; color: var(--text-muted); margin-top: .125rem; }
  </style>
</head>
<body>

<!-- TOP BAR -->
<header class="top-bar">
  <div class="top-bar-inner">
    <a href="index.html" class="top-bar-brand">Misje Areny</a>
    <nav class="top-bar-actions">
      <a href="search.html" class="top-bar-btn" aria-label="Szukaj">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </a>
      <a href="messenger.html" class="top-bar-btn" aria-label="Wiadomości">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <span id="msg-nav-badge" class="top-bar-badge" style="display:none;">0</span>
      </a>
      <button class="top-bar-btn" id="notif-bell-btn" aria-label="Powiadomienia">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span id="notif-top-badge" class="top-bar-badge" style="display:none;">0</span>
      </button>
      <a href="profile.html" class="top-bar-avatar" id="top-bar-avatar" aria-label="Profil">W</a>
    </nav>
  </div>
</header>

<!-- Notif dropdown -->
<div id="notif-dropdown" class="notif-dropdown hidden">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:.875rem 1rem;border-bottom:1px solid var(--border);">
    <span style="font-size:.875rem;font-weight:700;">Powiadomienia</span>
    <button id="notif-mark-all" style="font-size:.75rem;color:var(--brand);font-weight:600;background:none;border:none;cursor:pointer;">Oznacz przeczytane</button>
  </div>
  <div id="notif-list" style="overflow-y:auto;max-height:360px;"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="nav" aria-label="Nawigacja">
  <a href="index.html" class="nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Arena</span>
  </a>
  <a href="feed.html" class="nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span>Kroniki</span>
  </a>
  <a href="challenges.html" class="nav-item nav-item-hero active" aria-current="page">
    <div class="nav-hero-shield">⚔</div>
    <span>Misje</span>
  </a>
  <a href="ranking.html" class="nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
    <span>Chwała</span>
  </a>
</nav>

<!-- MAIN CONTENT -->
<main class="content-area">
  <div class="page" style="max-width:680px;">

    <div class="ch-page-header">
      <div class="ch-page-title">🐍 Misje Areny</div>
      <div class="ch-page-sub">Wybierz swoją próbę, Wojowniku</div>
    </div>

    <!-- Tabs -->
    <div class="cs-tabs" role="tablist">
      <button data-cs-tab="challenges" class="active" role="tab">⚔️ Misje</button>
      <button data-cs-tab="received"   role="tab">📥 Odebrane <span id="received-badge" style="display:none;" class="rpg-count-badge">0</span></button>
      <button data-cs-tab="sent"       role="tab">📤 Wysłane</button>
      <button data-cs-tab="active"     role="tab">🎯 Aktywne</button>
      <button data-cs-tab="history"    role="tab">📜 Historia</button>
    </div>

    <!-- SECTION: Challenge cards -->
    <div id="cs-section-challenges" class="cs-section">
      <div id="cs-cards-grid" class="cs-cards-grid">
        <!-- Skeleton -->
        <div class="ch-card" style="opacity:.4;">
          <div class="skeleton" style="height:120px;border-radius:var(--r-md);margin-bottom:.75rem;"></div>
          <div class="skeleton" style="height:14px;width:60%;border-radius:4px;margin-bottom:.375rem;"></div>
          <div class="skeleton" style="height:10px;width:40%;border-radius:4px;"></div>
        </div>
        <div class="ch-card" style="opacity:.25;">
          <div class="skeleton" style="height:120px;border-radius:var(--r-md);margin-bottom:.75rem;"></div>
          <div class="skeleton" style="height:14px;width:55%;border-radius:4px;margin-bottom:.375rem;"></div>
          <div class="skeleton" style="height:10px;width:35%;border-radius:4px;"></div>
        </div>
      </div>
    </div>

    <!-- SECTION: Received challenges -->
    <div id="cs-section-received" class="cs-section">
      <div id="cs-received-list"></div>
    </div>

    <!-- SECTION: Sent challenges -->
    <div id="cs-section-sent" class="cs-section">
      <div id="cs-sent-list"></div>
    </div>

    <!-- SECTION: Active challenges -->
    <div id="cs-section-active" class="cs-section">
      <div id="cs-active-list"></div>
    </div>

    <!-- SECTION: History -->
    <div id="cs-section-history" class="cs-section">
      <div id="cs-history-list"></div>
    </div>

  </div>
</main>

<script type="module">
import { checkAuth, logout, getCurrentUserData, showToast } from './js/auth.js';
import { auth, db, COL, getRank, getLevel } from './js/firebase.js';
import { initChallengeSystem } from './js/challenge-system.js';
import { injectMessengerBadge } from './js/messenger.js';
import { initNotifications } from './js/notifications.js';
import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

// ── Top Bar ───────────────────────────────────────────────
document.getElementById('notif-bell-btn')?.addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('notif-dropdown')?.classList.toggle('hidden');
});
document.addEventListener('click', e => {
  if (!e.target.closest('#notif-bell-btn') && !e.target.closest('#notif-dropdown'))
    document.getElementById('notif-dropdown')?.classList.add('hidden');
});
document.getElementById('notif-mark-all')?.addEventListener('click', async () => {
  const { markAllRead } = await import('./js/notifications.js');
  const u = auth.currentUser; if (u) await markAllRead(u.uid);
});

// ── Init ──────────────────────────────────────────────────
checkAuth(async (user) => {
  injectMessengerBadge(user.uid);
  initNotifications(user.uid);

  // Top bar avatar
  try {
    const snap = await getDoc(doc(db, COL.USERS, user.uid));
    const d    = snap.exists() ? snap.data() : {};
    const av   = document.getElementById('top-bar-avatar');
    if (av) {
      if (d.photoURL) av.innerHTML = `<img src="${d.photoURL}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="Av"/>`;
      else av.textContent = (d.displayName||user.displayName||'W').charAt(0).toUpperCase();
    }
  } catch {}

  // Pobierz dane użytkownika
  let userData = null;
  try { userData = await getCurrentUserData(user.uid, user); } catch {}
  userData ??= { uid: user.uid, displayName: user.displayName||'Wojownik', photoURL: user.photoURL||'', points: 0 };

  // Inicjalizuj system wyzwań (zakładki + karty + send modal + realtime)
  initChallengeSystem(user, userData);

  // Pokaż domyślną sekcję
  const hash = window.location.hash.replace('#','');
  const validTabs = ['challenges','received','sent','active','history'];
  const startTab  = validTabs.includes(hash) ? hash : 'challenges';

  document.querySelectorAll('[data-cs-tab]').forEach(btn => {
    const isActive = btn.dataset.csTab === startTab;
    btn.classList.toggle('active', isActive);
  });
  // Sekcja zostanie pokazana przez initChallengeSystem._loadTab
});
</script>
</body>
</html>
