<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0A0B" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com/firebasejs/; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://firestore.googleapis.com https://firebase.googleapis.com https://cloudinary.com https://res.cloudinary.com;">
  <meta name="description" content="Weekend Warrior Social — Profil" />
  <title>Profil — Weekend Warrior Social</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WWS Arena" />
  <link rel="apple-touch-icon" href="assets/icons/icon-512.svg" />
  <!-- OG / Social -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="Weekend Warrior Social" />
  <meta property="og:description" content="Portal społecznościowy dla wojowników weekendu. Wyzwania, ranking, osiągnięcia." />
  <meta property="og:image"       content="assets/icons/icon-512.svg" />
  <meta name="twitter:card"       content="summary" />
  <meta name="twitter:title"      content="Weekend Warrior Social ⚔️" />
  <meta name="twitter:description"content="Dołącz. Walcz. Zwyciężaj." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="bg-orbs" aria-hidden="true"></div>

<!-- ── Navigation ── -->
<nav class="nav" aria-label="Główna nawigacja">
  <span class="nav-brand">⚔ WWS</span>

  <a href="index.html" class="nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <span>Start</span>
  </a>

  <a href="feed.html" class="nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
    </svg>
    <span>Feed</span>
  </a>
  <a href="challenges.html" class="nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
    </svg>
    <span>Wyzwania</span>
  </a>


  <a href="ranking.html" class="nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
      <polyline points="17 6 23 6 23 12"/>
    </svg>
    <span>Ranking</span>
  </a>

  <a href="profile.html" class="nav-item active" aria-current="page">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
    <span>Profil</span>
  </a>

  <div class="nav-actions">
    <button id="logout-btn" class="btn btn-ghost btn-sm" style="color:var(--text-muted);">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Wyloguj
    </button>
  </div>
</nav>

<!-- ── Content ── -->
<main class="content-area page">

  <!-- ── SKELETON ── -->
  <div id="profile-skeleton">
    <div class="profile-skeleton-hero">
      <div class="skeleton" style="width:96px;height:96px;border-radius:50%;"></div>
      <div class="skeleton" style="height:22px;width:160px;border-radius:6px;"></div>
      <div class="skeleton" style="height:14px;width:100px;border-radius:4px;"></div>
      <div class="skeleton" style="height:14px;width:220px;border-radius:4px;"></div>
      <div style="display:flex;gap:0.5rem;">
        <div class="skeleton" style="height:24px;width:90px;border-radius:20px;"></div>
        <div class="skeleton" style="height:24px;width:80px;border-radius:20px;"></div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;margin-top:1rem;">
      <div class="skeleton" style="height:78px;border-radius:var(--r-lg);"></div>
      <div class="skeleton" style="height:78px;border-radius:var(--r-lg);"></div>
      <div class="skeleton" style="height:78px;border-radius:var(--r-lg);"></div>
    </div>
    <div class="skeleton" style="height:90px;border-radius:var(--r-lg);margin-top:1rem;"></div>
    <div class="skeleton" style="height:56px;border-radius:var(--r-xl);margin-top:1rem;"></div>
    <div class="skeleton" style="height:56px;border-radius:var(--r-xl);margin-top:0.75rem;"></div>
  </div>

  <!-- ── PROFILE CONTENT ── -->
  <div id="profile-content" class="hidden">

    <!-- Hero card -->
    <div class="profile-page-hero">

      <!-- Avatar z upload -->
      <div class="profile-avatar-wrap" id="profile-avatar-wrap"
           role="button" tabindex="0" aria-label="Zmień avatar">
        <div class="profile-avatar-el" id="profile-avatar-el"></div>
        <div class="avatar-upload-overlay">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <span>Zmień</span>
        </div>
        <div class="avatar-upload-progress" id="avatar-upload-progress">0%</div>
      </div>

      <!-- Hidden file input -->
      <input type="file" id="avatar-file-input"
             accept="image/jpeg,image/png,image/webp"
             style="display:none;" aria-hidden="true" />

      <!-- Info -->
      <div>
        <div class="profile-page-name" id="profile-display-name">Wojownik</div>
        <div class="profile-page-username" id="profile-username">@wojownik</div>
      </div>

      <!-- Bio -->
      <p class="profile-page-bio" id="profile-bio"></p>

      <!-- Badges -->
      <div class="profile-badges">
        <span id="profile-rank-badge" class="badge badge-gold">🥉 Rookie</span>
        <span id="profile-level-badge" class="badge badge-blue">Poziom 1</span>
      </div>

      <!-- Email small -->
      <div style="font-size:0.8125rem;color:var(--text-muted);" id="profile-email-display"></div>

    </div>

    <!-- Stats row -->
    <div class="profile-stats-row">
      <div class="stat-card">
        <div id="profile-stat-points" class="stat-value" style="color:var(--gold);">0</div>
        <div class="stat-label">Punkty XP</div>
      </div>
      <div class="stat-card">
        <div id="profile-stat-level" class="stat-value" style="color:var(--blue);">1</div>
        <div class="stat-label">Poziom</div>
      </div>
      <div class="stat-card">
        <div id="profile-stat-rank" class="stat-value rank-rookie">🥉</div>
        <div class="stat-label">Ranga</div>
      </div>
    </div>

    <!-- XP Progress -->
    <div class="profile-xp-card">
      <div class="xp-row">
        <span class="xp-label">Postęp do następnej rangi</span>
        <span id="profile-xp-percent" class="xp-val">0%</span>
      </div>
      <div class="progress-track">
        <div id="profile-xp-bar" class="progress-fill" style="width:0%;"
             role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
        </div>
      </div>
      <div class="xp-sublabels">
        <span id="profile-rank-current" class="xp-sublabel"></span>
        <span id="profile-rank-next"    class="xp-sublabel"></span>
      </div>
    </div>

    <!-- Achievements preview -->
    <div class="achievements-preview">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <h4 style="font-size:0.9375rem;font-family:var(--font-hd);">🏆 Osiągnięcia</h4>
        <a href="achievements.html" style="font-size:0.8125rem;color:var(--gold);font-weight:500;">
          Wszystkie →
        </a>
      </div>
      <div class="achievements-grid" id="achievements-grid"></div>
    </div>

    <!-- ── Edit profile (accordion) ── -->
    <div class="profile-edit-card">
      <div class="profile-section-header" id="edit-profile-header"
           role="button" tabindex="0" aria-expanded="false">
        <div class="profile-section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          Edytuj profil
        </div>
        <svg id="edit-profile-chevron" class="section-chevron"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>

      <div class="profile-section-body" id="edit-profile-body">
        <form id="edit-profile-form" class="edit-form" novalidate>

          <div class="form-group">
            <label class="form-label" for="edit-display-name">Imię / Pseudonim</label>
            <div class="input-wrap">
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="1.8"
                   stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <input id="edit-display-name" type="text"
                     class="form-input" placeholder="Twój pseudonim"
                     maxlength="32" autocomplete="name" />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="edit-bio">Opis profilu</label>
            <textarea id="edit-bio" class="bio-textarea"
                      placeholder="Napisz coś o sobie... (max 200 znaków)"
                      maxlength="200" rows="3"></textarea>
            <span class="form-hint">Max. 200 znaków</span>
          </div>

          <button id="save-profile-btn" type="submit" class="btn btn-primary btn-full">
            Zapisz zmiany
          </button>

        </form>
      </div>
    </div>

    <!-- ── Change password (accordion) ── -->
    <div class="profile-edit-card">
      <div class="profile-section-header" id="password-header"
           role="button" tabindex="0" aria-expanded="false">
        <div class="profile-section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          Zmień hasło
        </div>
        <svg id="password-chevron" class="section-chevron"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>

      <div class="profile-section-body" id="password-body">
        <form id="change-password-form" class="edit-form" novalidate autocomplete="off">

          <div class="form-group">
            <label class="form-label" for="current-password">Aktualne hasło</label>
            <div class="input-wrap">
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="1.8"
                   stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
              <input id="current-password" type="password"
                     class="form-input has-toggle"
                     placeholder="Wpisz aktualne hasło"
                     autocomplete="current-password" />
              <button type="button" class="input-toggle toggle-password-btn"
                      data-target="current-password"
                      aria-label="Pokaż hasło">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="new-password">Nowe hasło</label>
            <div class="input-wrap">
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="1.8"
                   stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              </svg>
              <input id="new-password" type="password"
                     class="form-input has-toggle"
                     placeholder="Min. 6 znaków"
                     autocomplete="new-password" />
              <button type="button" class="input-toggle toggle-password-btn"
                      data-target="new-password"
                      aria-label="Pokaż nowe hasło">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="confirm-new-password">Potwierdź nowe hasło</label>
            <div class="input-wrap">
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="1.8"
                   stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              </svg>
              <input id="confirm-new-password" type="password"
                     class="form-input has-toggle"
                     placeholder="Powtórz nowe hasło"
                     autocomplete="new-password" />
              <button type="button" class="input-toggle toggle-password-btn"
                      data-target="confirm-new-password"
                      aria-label="Pokaż potwierdzenie hasła">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <button id="save-password-btn" type="submit" class="btn btn-secondary btn-full">
            Zmień hasło
          </button>

        </form>
      </div>
    </div>

    <!-- ── Danger zone (accordion) ── -->
    <div class="danger-zone">
      <div class="profile-section-header" id="danger-header"
           role="button" tabindex="0" aria-expanded="false">
        <div class="profile-section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          Strefa niebezpieczna
        </div>
        <svg id="danger-chevron" class="section-chevron"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>

      <div class="danger-section-body" id="danger-body">
        <div class="danger-item">
          <div class="danger-item-info">
            <div class="danger-item-title">Wyloguj się</div>
            <div class="danger-item-desc">Zakończ sesję na tym urządzeniu.</div>
          </div>
          <button id="danger-logout-btn" class="btn btn-danger btn-sm">
            Wyloguj
          </button>
        </div>
      </div>
    </div>

    <!-- Invite section -->
    <div style="text-align:center;margin-top:1.25rem;animation:fadeInUp 0.4s ease 0.49s both;">
      <button id="profile-invite-btn" class="btn btn-secondary btn-sm"
              style="gap:0.5rem;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
        Zaproś wojownika (skopiuj link)
      </button>
    </div>

    <!-- Member since -->
    <div class="member-since" id="member-since"></div>

    <!-- Bottom padding -->
    <div style="height:1rem;"></div>

  </div><!-- /profile-content -->

</main>

<script type="module">
  import { initProfilePage } from './js/profile.js';
  import { initInviteButton } from './js/social.js';
  import { auth } from './js/firebase.js';
  import { onAuthStateChanged } from './js/auth.js';

  initProfilePage();

  // Wire invite button
  onAuthStateChanged(auth, (user) => {
    if (user) {
      initInviteButton(document.getElementById('profile-invite-btn'), user.uid);
    }
  });

  // Password visibility toggles
  document.querySelectorAll('.toggle-password-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      const targetId = btn.dataset.target;
      const input = document.getElementById(targetId);
      if (input) {
        input.type = input.type === 'password' ? 'text' : 'password';
      }
    });
  });
</script>


  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('[SW] Registered:', reg.scope))
          .catch(err => console.warn('[SW] Registration failed:', err));
      });
    }
  </script>
</body>
</html>
