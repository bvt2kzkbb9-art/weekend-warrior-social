<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Weekend Warrior Social — Profil</title>

  <link rel="stylesheet" href="css/style.css" />

  <style>
    .profile-page {
      min-height: 100vh;
      background: #0a0a0b;
      color: #ffffff;
      padding: 24px;
    }

    .profile-container {
      max-width: 900px;
      margin: 0 auto;
    }

    .profile-header {
      background: #121317;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 24px;
      padding: 32px;
      display: flex;
      gap: 24px;
      align-items: center;
      margin-bottom: 24px;
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      overflow: hidden;
      background: #d4af37;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: 700;
      color: #000;
      flex-shrink: 0;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-info h1 {
      margin: 0;
      font-size: 2rem;
    }

    .profile-info p {
      margin: 6px 0;
      color: #a5adba;
    }

    .rank-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(212,175,55,.15);
      border: 1px solid rgba(212,175,55,.3);
      color: #d4af37;
      padding: 8px 14px;
      border-radius: 999px;
      margin-top: 12px;
      font-weight: 600;
    }

    .profile-actions {
      margin-left: auto;
    }

    .btn-edit {
      border: none;
      background: #d4af37;
      color: #000;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(140px,1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: #121317;
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      border: 1px solid rgba(255,255,255,.08);
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #d4af37;
    }

    .stat-label {
      color: #a5adba;
      margin-top: 6px;
      font-size: .9rem;
    }

    .card {
      background: #121317;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 16px;
    }

    .xp-bar {
      width: 100%;
      height: 14px;
      background: #1a1c22;
      border-radius: 999px;
      overflow: hidden;
    }

    .xp-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg,#d4af37,#ffd95c);
      transition: width .4s ease;
    }

    .activity-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .activity-item {
      background: #1a1c22;
      padding: 14px;
      border-radius: 12px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      width: 100%;
      max-width: 500px;
      background: #121317;
      border-radius: 24px;
      padding: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      background: #1a1c22;
      color: white;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 12px;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .btn-primary {
      background: #d4af37;
      color: #000;
      border: none;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-secondary {
      background: #1a1c22;
      color: #fff;
      border: none;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
    }

    @media(max-width:768px) {
      .profile-header {
        flex-direction: column;
        text-align: center;
      }

      .profile-actions {
        margin-left: 0;
      }
    }
  </style>
</head>

<body class="profile-page">

<div class="profile-container">

  <section class="profile-header">

    <div class="avatar" id="avatar">
      W
    </div>

    <div class="profile-info">
      <h1 id="displayName">Ładowanie...</h1>
      <p id="email">...</p>

      <div class="rank-badge">
        <span id="rankEmoji">🥉</span>
        <span id="rankName">Rookie</span>
      </div>

      <p id="levelText">
        Poziom 1
      </p>
    </div>

    <div class="profile-actions">
      <button class="btn-edit" id="editProfileBtn">
        Edytuj profil
      </button>
    </div>

  </section>

  <section class="stats-grid">

    <div class="stat-card">
      <div class="stat-value" id="points">0</div>
      <div class="stat-label">Punkty</div>
    </div>

    <div class="stat-card">
      <div class="stat-value" id="level">1</div>
      <div class="stat-label">Poziom</div>
    </div>

    <div class="stat-card">
      <div class="stat-value" id="postsCount">0</div>
      <div class="stat-label">Posty</div>
    </div>

    <div class="stat-card">
      <div class="stat-value" id="followersCount">0</div>
      <div class="stat-label">Obserwujący</div>
    </div>

    <div class="stat-card">
      <div class="stat-value" id="followingCount">0</div>
      <div class="stat-label">Obserwowani</div>
    </div>

    <div class="stat-card">
      <div class="stat-value" id="achievementsCount">0</div>
      <div class="stat-label">Osiągnięcia</div>
    </div>

  </section>

  <section class="card">

    <h2>Postęp rangi</h2>

    <div class="xp-bar">
      <div class="xp-fill" id="xpFill"></div>
    </div>

    <p id="progressText">
      0%
    </p>

  </section>

  <section class="card">

    <h2>Bio</h2>

    <p id="bio">
      Brak opisu.
    </p>

  </section>

  <section class="card">

    <h2>Lokalizacja</h2>

    <p id="location">
      Nie podano lokalizacji.
    </p>

  </section>

  <section class="card">

    <h2>Historia aktywności</h2>

    <div class="activity-list">

      <div class="activity-item">
        Konto utworzone.
      </div>

      <div class="activity-item">
        Dołączono do Weekend Warrior Social.
      </div>

    </div>

  </section>

</div>

<div class="modal" id="editModal">

  <div class="modal-content">

    <h2>Edytuj profil</h2>

    <form id="profileForm">

      <div class="form-group">
        <label>Nazwa użytkownika</label>
        <input type="text" id="editDisplayName">
      </div>

      <div class="form-group">
        <label>Bio</label>
        <textarea id="editBio" rows="4"></textarea>
      </div>

      <div class="form-group">
        <label>Lokalizacja</label>
        <input type="text" id="editLocation">
      </div>

      <div class="modal-actions">

        <button type="button" class="btn-secondary" id="closeModal">
          Anuluj
        </button>

        <button type="submit" class="btn-primary">
          Zapisz zmiany
        </button>

      </div>

    </form>

  </div>

</div>

<script type="module" src="./js/profile.js"></script>

</body>
</html>
