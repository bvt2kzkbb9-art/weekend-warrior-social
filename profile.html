<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050506" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com/firebasejs/; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://firestore.googleapis.com https://firebase.googleapis.com https://cloudinary.com https://res.cloudinary.com;">
  <meta name="description" content="Weekend Warrior Social — Bohater" />
  <title>Bohater — Weekend Warrior Social</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WWS Arena" />
  <link rel="apple-touch-icon" href="assets/icons/icon-512.svg" />
  <!-- OG / Social -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="Weekend Warrior Social" />
  <meta property="og:description" content="Portal społecznościowy dla wojowników weekendu. Wyzwania, ranking, osiągnięcia." />
  <meta property="og:image"       content="assets/icons/icon-512.svg" />
  <meta name="twitter:card"       content="summary" />
  <meta name="twitter:title"      content="Weekend Warrior Social ⚔️" />
  <meta name="twitter:description"content="Dołącz. Walcz. Zwyciężaj." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/design-system.css" />
</head>
<body>

<div class="app-layout">

  <!-- FIXED TOP HEADER -->
  <header class="app-header" role="banner">
    <div class="app-header-left">
      <span class="app-header-logo">⚔ WWS</span>
    </div>
    <div class="app-header-right">
      <button class="header-icon-btn" id="notifications-btn" aria-label="Powiadomienia">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <div class="badge-dot hidden"></div>
      </button>
      <button class="header-icon-btn" id="messages-btn" aria-label="Wiadomości">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <div class="badge-dot hidden"></div>
      </button>
      <button class="header-icon-btn" id="profile-btn" aria-label="Profil">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- SCROLLABLE CONTENT AREA -->
  <main class="app-content" role="main">
    <div class="content-area page">

      <!-- ── SKELETON ── -->
      <div id="profile-skeleton">
        <div class="profile-skeleton-hero">
          <div class="skeleton" style="width:96px;height:96px;border-radius:50%;"></div>
          <div class="skeleton" style="height:22px;width:160px;border-radius:6px;"></div>
          <div class="skeleton" style="height:14px;width:100px;border-radius:4px;"></div>
          <div class="skeleton" style="height:14px;width:220px;border-radius:4px;"></div>
          <div style="display:flex;gap:0.5rem;">
            <div class="skeleton" style="height:24px;width:90px;border-radius:20px;"></div>
            <div class="skeleton" style="height:24px;width:80px;border-radius:20px;"></div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;margin-top:1rem;">
          <div class="skeleton" style="height:78px;border-radius:var(--r-lg);"></div>
          <div class="skeleton" style="height:78px;border-radius:var(--r-lg);"></div>
          <div class="skeleton" style="height:78px;border-radius:var(--r-lg);"></div>
        </div>
        <div class="skeleton" style="height:90px;border-radius:var(--r-lg);margin-top:1rem;"></div>
        <div class="skeleton" style="height:56px;border-radius:var(--r-xl);margin-top:1rem;"></div>
        <div class="skeleton" style="height:56px;border-radius:var(--r-xl);margin-top:0.75rem;"></div>
      </div>

      <!-- ── PROFILE CONTENT ── -->
      <div id="profile-content" class="hidden">

        <!-- Hero card -->
        <div class="profile-page-hero">

          <!-- Avatar z upload -->
          <div class="profile-avatar-wrap" id="profile-avatar-wrap"
               role="button" tabindex="0" aria-label="Zmień avatar">
            <div class="profile-avatar-el" id="profile-avatar-el"></div>
            <div class="avatar-upload-overlay">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
                <circle cx="12" cy="13" r="4"/>
              </svg>
              <span>Zmień</span>
            </div>
            <div class="avatar-upload-progress" id="avatar-upload-progress">0%</div>
          </div>

          <!-- Hidden file input -->
          <input type="file" id="avatar-file-input"
                 accept="image/jpeg,image/png,image/webp"
                 style="display:none;" aria-hidden="true" />

          <!-- Info -->
          <div>
            <div class="profile-page-name" id="profile-display-name">Wojownik</div>
            <div class="profile-page-username" id="profile-username">@wojownik</div>
          </div>

          <!-- Bio -->
          <p class="profile-page-bio" id="profile-bio"></p>

          <!-- Badges -->
          <div class="profile-badges">
            <span id="profile-rank-badge" class="badge badge-gold">🥉 Rookie</span>
            <span id="profile-level-badge" class="badge badge-blue">Poziom 1</span>
          </div>

          <!-- Email small -->
          <div style="font-size:0.8125rem;color:var(--text-muted);" id="profile-email-display"></div>

        </div>

        <!-- Stats row -->
        <div class="profile-stats-row">
          <div class="stat-card">
            <div id="profile-stat-points" class="stat-value" style="color:var(--gold);">0</div>
            <div class="stat-label">Punkty XP</div>
          </div>
          <div class="stat-card">
            <div id="profile-stat-level" class="stat-value" style="color:var(--blue);">1</div>
            <div class="stat-label">Poziom</div>
          </div>
          <div class="stat-card">
            <div id="profile-stat-rank" class="stat-value rank-rookie">🥉</div>
            <div class="stat-label">Ranga</div>
          </div>
        </div>

        <!-- XP Progress -->
        <div class="profile-xp-card">
          <div class="xp-row">
            <span class="xp-label">Postęp do następnej rangi</span>
            <span id="profile-xp-percent" class="xp-val">0%</span>
          </div>
          <div class="progress-track">
            <div id="profile-xp-bar" class="progress-fill" style="width:0%;"
                 role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
            </div>
          </div>
          <div class="xp-sublabels">
            <span id="profile-rank-current" class="xp-sublabel"></span>
            <span id="profile-rank-next"    class="xp-sublabel"></span>
          </div>
        </div>

        <!-- Achievements preview -->
        <div class="achievements-preview">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <h4 style="font-size:0.9375rem;font-family:var(--font-hd);">🏆 Osiągnięcia</h4>
            <a href="achievements.html" style="font-size:0.8125rem;color:var(--gold);font-weight:500;">
              Wszystkie →
            </a>
          </div>
          <div class="achievements-grid" id="achievements-grid"></div>
        </div>

        <!-- ── Edit profile (accordion) ── -->
        <div class="profile-edit-card">
          <div class="profile-section-header" id="edit-profile-header"
               role="button" tabindex="0" aria-expanded="false">
            <div class="profile-section-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
              Edytuj profil
            </div>
            <svg id="edit-profile-chevron" class="section-chevron"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>

          <div class="profile-section-body" id="edit-profile-body">
            <form id="edit-profile-form" class="edit-form" novalidate>

              <div class="form-group">
                <label class="form-label" for="edit-display-name">Imię / Pseudonim</label>
                <div class="input-wrap">
                  <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24"
                       fill="none" stroke="currentColor" stroke-width="1.8"
                       stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                  </svg>
                  <input id="edit-display-name" type="text"
                         class="form-input" placeholder="Twój pseudonim"
                         maxlength="32" autocomplete="name" />
                </div>
              </div>

              <div class="form-group">
                <label class="form-label" for="edit-bio">Opis profilu</label>
                <textarea id="edit-bio" class="bio-textarea"
                          placeholder="Napisz coś o sobie... (max 200 znaków)"
                          maxlength="200" rows="3"></textarea>
                <span class="form-hint">Max. 200 znaków</span>
              </div>

              <button id="save-profile-btn" type="submit" class="btn btn-primary btn-full">
                Zapisz zmiany
              </button>

            </form>
          </div>
        </div>

        <!-- ── Change password (accordion) ── -->
        <div class="profile-edit-card">
          <div class="profile-section-header" id="password-header"
               role="button" tabindex="0" aria-expanded="false">
            <div class="profile-section-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
              Zmień hasło
            </div>
            <svg id="password-chevron" class="section-chevron"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>

          <div class="profile-section-body" id="password-body">
            <form id="change-password-form" class="edit-form" novalidate autocomplete="off">

              <div class="form-group">
                <label class="form-label" for="current-password">Aktualne hasło</label>
                <div class="input-wrap">
                  <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24"
                       fill="none" stroke="currentColor" stroke-width="1.8"
                       stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0110 0v4"/>
                  </svg>
                  <input id="current-password" type="password"
                         class="form-input has-toggle"
                         placeholder="Wpisz aktualne hasło"
                         autocomplete="current-password" />
                  <button type="button" class="input-toggle toggle-password-btn"
                          data-target="current-password"
                          aria-label="Pokaż hasło">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                      <circle cx="12" cy="12" r="3"/>
                    </svg>
                  </button>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label" for="new-password">Nowe hasło</label>
                <div class="input-wrap">
                  <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24"
                       fill="none" stroke="currentColor" stroke-width="1.8"
                       stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                  </svg>
                  <input id="new-password" type="password"
                         class="form-input has-toggle"
                         placeholder="Min. 6 znaków"
                         autocomplete="new-password" />
                  <button type="button" class="input-toggle toggle-password-btn"
                          data-target="new-password"
                          aria-label="Pokaż nowe hasło">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                      <circle cx="12" cy="12" r="3"/>
                    </svg>
                  </button>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label" for="confirm-new-password">Potwierdź nowe hasło</label>
                <div class="input-wrap">
                  <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24"
                       fill="none" stroke="currentColor" stroke-width="1.8"
                       stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                  </svg>
                  <input id="confirm-new-password" type="password"
                         class="form-input has-toggle"
                         placeholder="Powtórz nowe hasło"
                         autocomplete="new-password" />
                  <button type="button" class="input-toggle toggle-password-btn"
                          data-target="confirm-new-password"
                          aria-label="Pokaż potwierdzenie hasła">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                      <circle cx="12" cy="12" r="3"/>
                    </svg>
                  </button>
                </div>
              </div>

              <button id="save-password-btn" type="submit" class="btn btn-secondary btn-full">
                Zmień hasło
              </button>

            </form>
          </div>
        </div>

        <!-- ── Danger zone (accordion) ── -->
        <div class="danger-zone">
          <div class="profile-section-header" id="danger-header"
               role="button" tabindex="0" aria-expanded="false">
            <div class="profile-section-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13"/>
                <line x1="12" y1="17" x2="12.01" y2="17"/>
              </svg>
              Strefa niebezpieczna
            </div>
            <svg id="danger-chevron" class="section-chevron"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>

          <div class="danger-section-body" id="danger-body">
            <div class="danger-item">
              <div class="danger-item-info">
                <div class="danger-item-title">Wyloguj się</div>
                <div class="danger-item-desc">Zakończ sesję na tym urządzeniu.</div>
              </div>
              <button id="danger-logout-btn" class="btn btn-danger btn-sm">
                Wyloguj
              </button>
            </div>
          </div>
        </div>

        <!-- Invite section -->
        <div style="text-align:center;margin-top:1.25rem;animation:fadeInUp 0.4s ease 0.49s both;">
          <button id="profile-invite-btn" class="btn btn-secondary btn-sm"
                  style="gap:0.5rem;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
              <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
            </svg>
            Zaproś wojownika (skopiuj link)
          </button>
        </div>

        <!-- Member since -->
        <div class="member-since" id="member-since"></div>

        <!-- Bottom padding -->
        <div style="height:1rem;"></div>

      </div><!-- /profile-content -->

    </div>
  </main>

  <!-- FIXED BOTTOM NAVIGATION -->
  <nav class="app-nav" role="navigation" aria-label="Główna nawigacja">
    <a href="index.html" class="nav-item" data-page="arena">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="1"/><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/>
      </svg>
      <span>Arena</span>
    </a>
    <a href="feed.html" class="nav-item" data-page="kroniki">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>Kroniki</span>
    </a>
    <a href="challenges.html" class="nav-item" data-page="misje">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v20M2 12h20"/>
        <circle cx="12" cy="12" r="1"/>
      </svg>
      <span>Misje</span>
    </a>
    <a href="ranking.html" class="nav-item" data-page="chwala">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
        <polyline points="17 6 23 6 23 12"/>
      </svg>
      <span>Chwała</span>
    </a>
    <a href="profile.html" class="nav-item active" aria-current="page" data-page="bohater">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>Bohater</span>
    </a>
  </nav>

</div>

<!-- Edit Profile Modal -->
<div id="edit-modal" class="ch-modal-backdrop hidden">
  <div class="ch-modal" style="max-width:420px;">
    <div class="ch-modal-body" style="max-height:80vh;overflow-y:auto;">
      <div class="ch-modal-badge">✏️</div>
      <div class="ch-modal-title">Edytuj Postać</div>
      <div style="display:flex;flex-direction:column;gap:.875rem;margin-top:1rem;">
        <div class="form-group">
          <label class="form-label">Imię Wojownika</label>
          <input type="text" id="edit-name" class="form-input" placeholder="Twoje imię" maxlength="40"/>
        </div>
        <div class="form-group">
          <label class="form-label">Bio (opowieść o Tobie)</label>
          <textarea id="edit-bio" class="form-input" rows="3" maxlength="200"
            placeholder="Kim jesteś na tej arenie?" style="resize:vertical;"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Lokalizacja</label>
          <input type="text" id="edit-location" class="form-input" placeholder="np. Warszawa" maxlength="60"/>
        </div>
        <div style="display:flex;gap:.625rem;">
          <div class="form-group" style="flex:1;">
            <label class="form-label">Wiek</label>
            <input type="number" id="edit-age" class="form-input" placeholder="—" min="13" max="120"/>
          </div>
          <div class="form-group" style="flex:1;">
            <label class="form-label">Wzrost (cm)</label>
            <input type="number" id="edit-height" class="form-input" placeholder="—" min="100" max="250"/>
          </div>
          <div class="form-group" style="flex:1;">
            <label class="form-label">Waga (kg)</label>
            <input type="number" id="edit-weight" class="form-input" placeholder="—" min="30" max="300"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Ulubiona dyscyplina</label>
          <input type="text" id="edit-discipline" class="form-input"
            placeholder="np. Siłownia, Bieganie, MMA" maxlength="40"/>
        </div>
        <div class="form-group">
          <label class="form-label">URL Portretu (opcjonalne)</label>
          <input type="url" id="edit-photo" class="form-input" placeholder="https://..."/>
        </div>
        <div id="edit-error" class="form-error" style="display:none;"></div>
        <div style="display:flex;gap:.625rem;">
          <button id="edit-cancel" class="rpg-btn rpg-btn-outline" style="flex:1;">Anuluj</button>
          <button id="edit-save" class="rpg-btn rpg-btn-gold" style="flex:1;">Zapisz</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { checkAuth, logout, getCurrentUserData, showToast } from './js/auth.js';
  import {
    db, COL, getRank, getLevel, getRankProgress, RANKS,
    uploadImage, compressImage,
  } from './js/firebase.js';
  import {
    collection, query, where, orderBy, limit, getDocs, doc, updateDoc,
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
  import { injectMessengerBadge, openChatWith } from './js/messenger.js';
  import { injectNotifBell } from './js/notifications.js';
  import {
    getFollowCounts, getFriendCount, getFriends, getPendingRequests,
    acceptFriendRequest, rejectFriendRequest, searchUsers,
    sendFriendRequest, getFriendshipStatus, removeFriend, openUserProfile,
  } from './js/social.js';
  import { initTheme, injectLightModeCSS, toggleDarkMode } from './js/weekly-ranking.js';

  // ── Tryb wyświetlania — wywołaj PRZED wszystkim, żeby nie mignął ciemny ekran ──
  injectLightModeCSS();
  initTheme();

  document.getElementById('logout-btn').addEventListener('click', logout);
  document.getElementById('logout-btn-2')?.addEventListener('click', logout);

  // ── Przycisk dark/light mode ───────────────────────────────────────────────────
  const themeBtn = document.getElementById('theme-toggle-btn');
  if (themeBtn) {
    themeBtn.textContent = document.documentElement.classList.contains('light-mode')
      ? '☀️ Jasny' : '🌙 Ciemny';
    themeBtn.addEventListener('click', () => {
      const isLight = toggleDarkMode();
      themeBtn.textContent = isLight ? '☀️ Jasny' : '🌙 Ciemny';
    });
  }

  let ME = null;

  checkAuth(async (user) => {
    ME = user;
    injectMessengerBadge(user.uid);
    injectNotifBell(user.uid);
    // 3s skeleton safety — Firebase może być wolny
    const skTimer = setTimeout(() => {
      document.getElementById('profile-skeleton').style.display = 'none';
      document.getElementById('profile-content').classList.remove('hidden');
    }, 3000);
    let data = null;
    try { 
      data = await getCurrentUserData(user.uid, user);
      console.log('[profile] ✅ Data loaded:', data);
    } catch (err) {
      console.error('[profile] ❌ Error loading data:', err.message);
    }
    data ??= { uid: user.uid, displayName: user.displayName||'Wojownik', photoURL: user.photoURL||'', points: 0 };
    clearTimeout(skTimer);
    _renderProfile(user, data);
    _renderAchievements(data);
    _renderStreakCalendar(data);
    _setupEdit(user, data);
    _setupImageUploads(user.uid, data);
    await Promise.allSettled([
      _loadHistory(user.uid),
      _loadSocialCounts(user.uid),
      _loadFriendsPanel(user.uid, data),
    ]);
    _setupFriendSearch(user.uid, data);
  });

  // Password visibility toggles
  document.querySelectorAll('.toggle-password-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      const targetId = btn.dataset.target;
      const input = document.getElementById(targetId);
      if (input) {
        input.type = input.type === 'password' ? 'text' : 'password';
      }
    });
  });

  // Setup header buttons
  document.getElementById('messages-btn').addEventListener('click', () => {
    window.location.href = 'messages.html';
  });
</script>

<!-- Service Worker Registration -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('[SW] Registered:', reg.scope))
        .catch(err => console.warn('[SW] Registration failed:', err));
    });
  }
</script>
