<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#0B0D12"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="WWS"/>
  <meta name="description" content="Weekend Warrior Social"/>
  <link rel="apple-touch-icon" href="assets/icons/icon-512.svg"/>
  <link rel="manifest" href="manifest.json"/>
  <title>Weekend Warrior Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    /* ── HOME PAGE SPECIFIC ─────────────────────── */
    .home-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: .875rem;
    }
    @media (min-width: 900px) {
      .home-layout {
        grid-template-columns: 280px 1fr 280px;
        gap: 1.25rem;
        align-items: start;
      }
      .home-left, .home-right {
        position: sticky;
        top: calc(var(--top-bar-h) + var(--safe-t) + 1rem);
      }
    }
    @media (min-width: 640px) and (max-width: 899px) {
      .home-layout { grid-template-columns: 1fr 1fr; }
      .home-left  { grid-column: 1 / 2; }
      .home-center { grid-column: 1 / -1; order: -1; }
      .home-right { grid-column: 2 / 3; }
    }

    /* ── USER CARD ── */
    .user-card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
    }
    .user-card-cover {
      height: 64px;
      background: linear-gradient(135deg, #1A2035 0%, #0F1628 100%);
    }
    .user-card-body {
      padding: 0 1rem 1rem;
      margin-top: -28px;
      text-align: center;
    }
    .user-card-av {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 3px solid var(--bg-panel);
      background: var(--bg-elevated);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.125rem; font-weight: 700;
      color: var(--text-secondary);
      overflow: hidden;
      margin: 0 auto .5rem;
    }
    .user-card-av img { width:100%;height:100%;object-fit:cover; }
    .user-card-name {
      font-size: .9375rem; font-weight: 700;
      color: var(--text-primary);
      margin-bottom: .125rem;
    }
    .user-card-rank {
      font-size: .75rem; color: var(--text-muted);
      margin-bottom: .75rem;
    }
    .user-card-xp-track {
      height: 4px; background: var(--bg-elevated);
      border-radius: 2px; overflow: hidden; margin-bottom: .375rem;
    }
    .user-card-xp-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--brand), var(--accent));
      border-radius: 2px; transition: width .6s var(--ease-out);
    }
    .user-card-xp-label {
      font-size: .625rem; color: var(--text-muted);
      display: flex; justify-content: space-between;
      margin-bottom: .75rem;
    }
    .user-card-stats {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: .375rem; margin-bottom: .75rem;
    }
    .user-card-stat { text-align: center; }
    .user-card-stat-val {
      font-size: 1rem; font-weight: 800;
      color: var(--text-primary); display: block;
    }
    .user-card-stat-label { font-size: .5625rem; color: var(--text-muted); }
    .user-card-divider {
      height: 1px; background: var(--border); margin: .75rem 0;
    }
    .user-card-link {
      display: block; text-align: center;
      font-size: .75rem; font-weight: 600;
      color: var(--brand); padding: .25rem;
    }
    .user-card-link:hover { color: var(--text-primary); }

    /* ── CHALLENGE CARDS ── */
    .ch-scroll-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-bottom: .25rem; }
    .ch-scroll-wrap::-webkit-scrollbar { display: none; }
    .ch-scroll { display: flex; gap: .625rem; }
    .ch-card-mini {
      flex-shrink: 0; width: 130px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden; cursor: pointer;
      transition: border-color var(--dur-fast), transform var(--dur-fast);
    }
    .ch-card-mini:hover { border-color: var(--border-light); transform: translateY(-2px); }
    .ch-card-mini-img {
      width: 100%; height: 72px;
      background: var(--bg-elevated);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
    }
    .ch-card-mini-body { padding: .5rem .625rem; }
    .ch-card-mini-title {
      font-size: .6875rem; font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: .15rem;
    }
    .ch-card-mini-xp { font-size: .5625rem; color: var(--brand); font-weight: 600; }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: .5rem 0;
      margin-bottom: .5rem;
    }
    .section-title { font-size: .875rem; font-weight: 700; color: var(--text-primary); }
    .section-link  { font-size: .75rem; font-weight: 600; color: var(--brand); }

    /* ── INBOX ITEM ── */
    .inbox-item {
      display: flex; align-items: center; gap: .75rem;
      padding: .625rem .875rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-panel);
      border-radius: var(--r-md); margin-bottom: .375rem;
    }
    .inbox-item-av {
      width: 36px; height: 36px;
      border-radius: 50%; background: var(--bg-elevated);
      display: flex; align-items: center; justify-content: center;
      font-size: .8125rem; font-weight: 700;
      color: var(--text-secondary); overflow: hidden; flex-shrink: 0;
    }
    .inbox-item-av img { width:100%;height:100%;object-fit:cover; }
    .inbox-item-text { flex: 1; min-width: 0; }
    .inbox-item-name { font-size: .8125rem; font-weight: 600; color: var(--text-primary); }
    .inbox-item-desc { font-size: .75rem; color: var(--text-muted); }
    .inbox-item-actions { display: flex; gap: .375rem; flex-shrink: 0; }

    /* ── STREAK ── */
    .streak-row {
      display: flex; align-items: center; gap: .625rem;
      padding: .75rem 1rem;
    }
    .streak-icon { font-size: 1.5rem; flex-shrink: 0; }
    .streak-info { flex: 1; }
    .streak-days { font-size: 1rem; font-weight: 800; color: var(--text-primary); }
    .streak-label { font-size: .6875rem; color: var(--text-muted); }
    .streak-bar-track { height: 4px; background: var(--bg-elevated); border-radius: 2px; overflow: hidden; margin-top: .375rem; }
    .streak-bar-fill  { height: 100%; background: var(--fire); border-radius: 2px; transition: width .6s; }

    /* ── MINI RANKING ── */
    .mini-rank-item {
      display: flex; align-items: center; gap: .625rem;
      padding: .5rem .875rem;
      border-bottom: 1px solid var(--border);
    }
    .mini-rank-item:last-child { border-bottom: none; }
    .mini-rank-pos { width: 20px; font-size: .75rem; font-weight: 700; color: var(--text-muted); text-align: center; flex-shrink: 0; }
    .mini-rank-av {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--bg-elevated);
      display: flex; align-items: center; justify-content: center;
      font-size: .6875rem; font-weight: 700; color: var(--text-secondary);
      overflow: hidden; flex-shrink: 0;
    }
    .mini-rank-av img { width:100%;height:100%;object-fit:cover; }
    .mini-rank-name { flex: 1; font-size: .8125rem; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mini-rank-pts  { font-size: .75rem; font-weight: 700; color: var(--accent-dim); flex-shrink: 0; }
  </style>
</head>
<body>

<!-- TOP BAR -->

<!-- BOTTOM NAV (4 items) -->
<nav class="nav" aria-label="Nawigacja główna">

<!-- Notifications dropdown (injected into top bar) -->
<div id="notif-dropdown" class="notif-dropdown hidden">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:.875rem 1rem;border-bottom:1px solid var(--border);">
    <span style="font-size:.875rem;font-weight:700;color:var(--text-primary);">Powiadomienia</span>
    <button id="notif-mark-all" style="font-size:.75rem;color:var(--brand);font-weight:600;background:none;border:none;cursor:pointer;">Oznacz jako przeczytane</button>
  </div>
  <div id="notif-list" style="overflow-y:auto;max-height:360px;"></div>
</div>

<!-- MAIN CONTENT -->
<main class="content-area">
  <div class="page home-layout" id="home-content">

    <!-- LEFT: User Card -->
    <aside class="home-left">
      <div class="user-card" id="user-card">
        <div class="user-card-cover"></div>
        <div class="user-card-body">
          <!-- Skeleton -->
          <div id="user-card-skeleton">
            <div class="user-card-av"><div class="skeleton" style="width:100%;height:100%;border-radius:50%;"></div></div>
            <div class="skeleton" style="height:14px;width:60%;border-radius:4px;margin:.5rem auto;"></div>
            <div class="skeleton" style="height:10px;width:40%;border-radius:4px;margin:0 auto .75rem;"></div>
            <div class="skeleton" style="height:4px;border-radius:2px;margin-bottom:.375rem;"></div>
          </div>
          <!-- Content -->
          <div id="user-card-content" class="hidden">
            <div class="user-card-av" id="uc-avatar">W</div>
            <div class="user-card-name" id="uc-name">—</div>
            <div class="user-card-rank" id="uc-rank">Rookie</div>
            <div class="user-card-xp-track">
              <div class="user-card-xp-fill" id="uc-xp-fill" style="width:0%;"></div>
            </div>
            <div class="user-card-xp-label">
              <span id="uc-level">Poziom 1</span>
              <span id="uc-xp">0 XP</span>
            </div>
            <div class="user-card-stats">
              <div class="user-card-stat">
                <span class="user-card-stat-val" id="uc-posts">0</span>
                <span class="user-card-stat-label">Posty</span>
              </div>
              <div class="user-card-stat">
                <span class="user-card-stat-val" id="uc-wins">0</span>
                <span class="user-card-stat-label">Wygrane</span>
              </div>
              <div class="user-card-stat">
                <span class="user-card-stat-val" id="uc-xp-pts">0</span>
                <span class="user-card-stat-label">XP</span>
              </div>
            </div>
            <div class="user-card-divider"></div>
            <a href="profile.html" class="user-card-link">Edytuj profil</a>
          </div>
        </div>
      </div>

      <!-- Streak -->
      <div class="user-card" style="margin-top:.875rem;">
        <div class="rpg-panel-header">
          <div class="rpg-panel-title">🔥 Seria</div>
        </div>
        <div class="streak-row">
          <div class="streak-icon">🔥</div>
          <div class="streak-info">
            <div class="streak-days"><span id="streak-days">0</span> dni</div>
            <div class="streak-label">Aktywna seria logowań</div>
            <div class="streak-bar-track" style="margin-top:.375rem;">
              <div class="streak-bar-fill" id="streak-bar" style="width:0%;"></div>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <!-- CENTER: Challenges + Inbox -->
    <section class="home-center">

      <!-- Challenge cards -->
      <div style="margin-bottom:1rem;">
        <div class="section-header">
          <div class="section-title">⚔ Wyzwania dnia</div>
          <a href="challenges.html" class="section-link">Wszystkie →</a>
        </div>
        <div class="ch-scroll-wrap">
          <div class="ch-scroll" id="ch-cards"></div>
        </div>
      </div>

      <!-- Received challenges -->
      <div id="inbox-section" style="display:none;margin-bottom:1rem;">
        <div class="section-header">
          <div class="section-title">📥 Wyzwania dla Ciebie</div>
          <span id="inbox-count" style="font-size:.75rem;font-weight:700;color:var(--brand);"></span>
        </div>
        <div id="inbox-list"></div>
      </div>

      <!-- Active challenges -->
      <div id="active-section" style="display:none;margin-bottom:1rem;">
        <div class="section-header">
          <div class="section-title">🎯 Aktywne wyzwania</div>
        </div>
        <div id="active-list"></div>
      </div>

      <!-- Quick actions -->
      <div style="display:flex;gap:.625rem;margin-bottom:1rem;">
        <a href="feed.html" class="btn btn-outline" style="flex:1;justify-content:center;gap:.5rem;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          </svg>
          Kroniki
        </a>
        <a href="search.html" class="btn btn-outline" style="flex:1;justify-content:center;gap:.5rem;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          Szukaj
        </a>
        <a href="achievements.html" class="btn btn-outline" style="flex:1;justify-content:center;gap:.5rem;">
          🏅
          Odznaki
        </a>
      </div>

    </section>

    <!-- RIGHT: Mini ranking -->
    <aside class="home-right">
      <div class="user-card">
        <div class="rpg-panel-header">
          <div class="rpg-panel-title">👑 Top Wojownicy</div>
          <a href="ranking.html" class="rpg-panel-link">Pełny</a>
        </div>
        <div id="mini-ranking"></div>
      </div>
    </aside>

  </div>
</main>

<script type="module">
  import { checkAuth, logout, getCurrentUserData } from './js/auth.js';
  import { auth, db, COL, getRank, getLevel, getRankProgress, RANKS } from './js/firebase.js';
  import { checkDailyLogin } from './js/xp.js';
  import { CHALLENGES_DATA } from './js/challenge-system.js';
  import { injectMessengerBadge } from './js/messenger.js';
  import {
    collection, query, where, orderBy, limit,
    onSnapshot, getDocs, doc, getDoc, updateDoc, serverTimestamp,
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  // ── Notif bell toggle ──────────────────────────────────────────
  document.getElementById('notif-bell-btn')?.addEventListener('click', (e) => {
    e.stopPropagation();
    document.getElementById('notif-dropdown')?.classList.toggle('hidden');
  });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#notif-bell-btn') && !e.target.closest('#notif-dropdown')) {
      document.getElementById('notif-dropdown')?.classList.add('hidden');
    }
  });

  checkAuth(async (user) => {
    // Messenger badge
    injectMessengerBadge(user.uid);

    // Inject notification bell using existing notifications.js
    const { injectNotifBell } = await import('./js/notifications.js');
    // Wire up existing notif bell to top-bar bell button
    _wireNotifBell(user.uid);

    checkDailyLogin(user.uid).catch(() => {});

    // Load user data
    const skTimer = setTimeout(() => {
      document.getElementById('user-card-skeleton')?.classList.add('hidden');
      document.getElementById('user-card-content')?.classList.remove('hidden');
    }, 2000);

    let userData = null;
    try { userData = await getCurrentUserData(user.uid, user); } catch {}
    userData ??= { uid: user.uid, displayName: user.displayName || 'Wojownik', photoURL: user.photoURL || '', points: 0 };

    clearTimeout(skTimer);
    _renderUserCard(user, userData);
    _updateTopBarAvatar(user, userData);
    _renderChallengeCards();
    _listenInbox(user.uid);
    _listenActive(user.uid);
    _listenStreak(user.uid, userData);
    _loadMiniRanking(user.uid);
  });

  // ── Top bar avatar ─────────────────────────────────────────────
  function _updateTopBarAvatar(user, data) {
    const el = document.getElementById('top-bar-avatar');
    if (!el) return;
    const name = data.displayName || user.displayName || 'W';
    const init = name.charAt(0).toUpperCase();
    if (data.photoURL) {
      el.innerHTML = `<img src="${_esc(data.photoURL)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="Avatar"/>`;
    } else {
      el.textContent = init;
    }
  }

  // ── Notifications bell wiring ─────────────────────────────────
  function _wireNotifBell(uid) {
    const { initNotifications, markAllRead } = _loadNotifModule(uid);
    document.getElementById('notif-mark-all')?.addEventListener('click', () => markAllRead?.(uid));
  }
  async function _loadNotifModule(uid) {
    const mod = await import('./js/notifications.js');
    mod.initNotifications(uid);
    // Sync badge with top bar
    const origUpdate = document.querySelectorAll.bind(document);
    return mod;
  }

  // ── User Card ─────────────────────────────────────────────────
  function _renderUserCard(user, data) {
    document.getElementById('user-card-skeleton')?.classList.add('hidden');
    document.getElementById('user-card-content')?.classList.remove('hidden');

    const name    = data.displayName || user.displayName || 'Wojownik';
    const points  = Number(data.points) || 0;
    const level   = getLevel(points);
    const rankObj = getRank(points);
    const progress = getRankProgress(points);
    const rankIdx  = RANKS.findIndex(r => r.id === rankObj.id);
    const next     = RANKS[rankIdx + 1];
    const xpIn     = Math.max(0, points - rankObj.min);
    const xpNeed   = Math.max(1, (next?.min ?? points + 500) - rankObj.min);
    const init     = name.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();

    const avEl = document.getElementById('uc-avatar');
    if (avEl) {
      if (data.photoURL) {
        avEl.innerHTML = `<img src="${_esc(data.photoURL)}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.textContent='${init}'"/>`;
      } else { avEl.textContent = init; }
    }

    const s = (id, v) => { const e = document.getElementById(id); if(e) e.textContent = v; };
    s('uc-name',  name);
    s('uc-rank',  `${rankObj.emoji} ${rankObj.label} · Poz. ${level}`);
    s('uc-level', `Poziom ${level}`);
    s('uc-xp',    `${xpIn.toLocaleString('pl-PL')} / ${xpNeed.toLocaleString('pl-PL')} XP`);
    s('uc-posts', String(data.postsCount || 0));
    s('uc-wins',  String(data.challengesCompleted || 0));
    s('uc-xp-pts', points.toLocaleString('pl-PL'));
    setTimeout(() => {
      const f = document.getElementById('uc-xp-fill');
      if (f) f.style.width = progress + '%';
    }, 400);

    _updateTopBarAvatar(user, data);
  }

  // ── Challenge cards ───────────────────────────────────────────
  function _renderChallengeCards() {
    const scroll = document.getElementById('ch-cards');
    if (!scroll || !CHALLENGES_DATA?.length) return;
    CHALLENGES_DATA.slice(0,8).forEach(ch => {
      const card = document.createElement('a');
      card.href      = 'challenges.html';
      card.className = 'ch-card-mini';
      card.innerHTML = `
        <div class="ch-card-mini-img">${ch.badge || '⚔️'}</div>
        <div class="ch-card-mini-body">
          <div class="ch-card-mini-title">${_esc(ch.title)}</div>
          <div class="ch-card-mini-xp">+${ch.xp} XP</div>
        </div>`;
      scroll.appendChild(card);
    });
  }

  // ── Inbox (received challenges) ───────────────────────────────
  function _listenInbox(uid) {
    const q = query(
      collection(db, 'challenge_invites'),
      where('targetId', '==', uid),
      where('status', '==', 'pending'),
      orderBy('createdAt', 'desc'), limit(10)
    );
    onSnapshot(q, snap => {
      const section = document.getElementById('inbox-section');
      const list    = document.getElementById('inbox-list');
      const count   = document.getElementById('inbox-count');
      if (!section || !list) return;
      if (snap.empty) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      if (count) count.textContent = `${snap.size} nowych`;
      list.innerHTML = '';
      snap.forEach(d => {
        const inv = { id: d.id, ...d.data() };
        const ini = (inv.challengerName||'W').charAt(0).toUpperCase();
        const item = document.createElement('div');
        item.className = 'inbox-item';
        item.innerHTML = `
          <div class="inbox-item-av">
            ${inv.challengerPhoto ? `<img src="${_esc(inv.challengerPhoto)}" alt="Avatar" onerror="this.parentElement.textContent='${ini}'"/>` : ini}
          </div>
          <div class="inbox-item-text">
            <div class="inbox-item-name">${_esc(inv.challengerName||'Wojownik')}</div>
            <div class="inbox-item-desc">${inv.challengeBadge||'⚔️'} ${_esc(inv.challengeTitle)} · +${inv.challengeXP||0} XP</div>
          </div>
          <div class="inbox-item-actions">
            <button class="btn-accept" data-id="${inv.id}" data-cid="${inv.challengeId}">✓</button>
            <button class="btn-reject" data-id="${inv.id}">✕</button>
          </div>`;
        item.querySelector('.btn-accept')?.addEventListener('click', () => _respondInvite(inv.id, 'accepted'));
        item.querySelector('.btn-reject')?.addEventListener('click', () => _respondInvite(inv.id, 'rejected'));
        list.appendChild(item);
      });
    }, err => console.warn('[inbox]', err.code));
  }

  async function _respondInvite(inviteId, status) {
    try {
      await updateDoc(doc(db, 'challenge_invites', inviteId), {
        status, respondedAt: serverTimestamp(),
      });
    } catch(e) { console.warn('[respondInvite]', e.code); }
  }

  // ── Active challenges ─────────────────────────────────────────
  function _listenActive(uid) {
    const q = query(
      collection(db, 'challenge_invites'),
      where('targetId', '==', uid),
      where('status', '==', 'accepted'),
      limit(5)
    );
    onSnapshot(q, snap => {
      const section = document.getElementById('active-section');
      const list    = document.getElementById('active-list');
      if (!section || !list) return;
      if (snap.empty) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      list.innerHTML = '';
      snap.forEach(d => {
        const inv = { id: d.id, ...d.data() };
        const item = document.createElement('div');
        item.className = 'inbox-item';
        item.innerHTML = `
          <div class="inbox-item-av" style="font-size:1.25rem;">${inv.challengeBadge||'⚔️'}</div>
          <div class="inbox-item-text">
            <div class="inbox-item-name">${_esc(inv.challengeTitle)}</div>
            <div class="inbox-item-desc">Od: ${_esc(inv.challengerName||'?')} · +${inv.challengeXP||0} XP</div>
          </div>
          <a href="challenges.html" class="btn btn-primary btn-sm">Idź →</a>`;
        list.appendChild(item);
      });
    }, () => {});
  }

  // ── Streak ────────────────────────────────────────────────────
  async function _listenStreak(uid, userData) {
    const streak = userData?.streak || 0;
    const el = document.getElementById('streak-days');
    const bar = document.getElementById('streak-bar');
    if (el)  el.textContent = streak;
    if (bar) setTimeout(() => { bar.style.width = Math.min(100, (streak / 30) * 100) + '%'; }, 500);
  }

  // ── Mini ranking ──────────────────────────────────────────────
  async function _loadMiniRanking(myUid) {
    const container = document.getElementById('mini-ranking');
    if (!container) return;
    try {
      const snap = await getDocs(query(
        collection(db, COL.USERS),
        orderBy('points','desc'),
        limit(5)
      ));
      container.innerHTML = '';
      const medals = ['🥇','🥈','🥉','4.','5.'];
      snap.docs.forEach((d, i) => {
        const u   = d.data();
        const ini = (u.displayName||'W').charAt(0).toUpperCase();
        const row = document.createElement('div');
        row.className = 'mini-rank-item';
        const isMe = d.id === myUid;
        row.innerHTML = `
          <div class="mini-rank-pos">${medals[i]||''}</div>
          <div class="mini-rank-av">
            ${u.photoURL ? `<img src="${_esc(u.photoURL)}" alt="Av" onerror="this.parentElement.textContent='${ini}'"/>` : ini}
          </div>
          <div class="mini-rank-name" style="${isMe ? 'color:var(--brand);font-weight:800;' : ''}">${_esc(u.displayName||'Wojownik')}</div>
          <div class="mini-rank-pts">${(u.points||0).toLocaleString('pl-PL')}</div>`;
        row.style.cursor = 'pointer';
        row.addEventListener('click', () => { window.location.href = d.id === myUid ? 'profile.html' : `user.html?uid=${d.id}`; });
        container.appendChild(row);
      });
    } catch(e) { console.warn('[miniRanking]', e.code); }
  }

  // ── Notif badge wiring ────────────────────────────────────────
  // Wire notification badge to top bar after initNotifications runs
  (function wireNotifBadge() {
    const origQSA = document.querySelectorAll.bind(document);
    // Poll for badge updates from notifications.js
    setInterval(() => {
      const badge = document.querySelector('.notif-badge') || document.querySelector('.notif-bell-badge');
      const topBadge = document.getElementById('notif-top-badge');
      if (badge && topBadge) {
        const visible = badge.style.display !== 'none';
        topBadge.textContent   = badge.textContent;
        topBadge.style.display = visible ? 'flex' : 'none';
      }
    }, 500);
  })();

  function _esc(s){if(typeof s!=='string')return '';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
