<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekend Warrior Social</title>
  <link rel="stylesheet" href="src/styles/foundation.css">
  <style>
    #auth-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #fff;
      z-index: 9999;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <div id="auth-loading">Sprawdzanie sesji...</div>

  <div class="app-layout" id="app-layout" style="display: none;">
    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-logo">WWS</div>
      <div class="topbar-actions">
        <button class="topbar-action-btn" aria-label="Logout" onclick="logout()">X</button>
      </div>
    </header>

    <!-- Main content -->
    <main class="main"></main>

    <!-- Bottom navigation -->
    <nav class="bottom-nav">
      <a href="#/" class="nav-item" data-route="/">Arena</a>
      <a href="#/kroniki" class="nav-item" data-route="/kroniki">Kroniki</a>
      <a href="#/misje" class="nav-item" data-route="/misje">Misje</a>
      <a href="#/chwala" class="nav-item" data-route="/chwala">Chwała</a>
      <a href="#/bohater" class="nav-item" data-route="/bohater">Bohater</a>
    </nav>
  </div>

  <script type="module">
    import { logout, redirectIfNotLogged } from './src/js/core/auth.js';
    import { initRouter, navigateTo, defineRoute } from './src/js/core/router.js';
    import { renderArena } from './src/arena/arena.js';
    import { renderKroniki, renderMisje, renderChwala, renderBohater } from './src/placeholders.js';

    window.navigateTo = navigateTo;
    window.logout = logout;
    window.currentUser = null;
    window.currentUserData = null;

    // Define routes
    defineRoute('/', renderArena);
    defineRoute('/kroniki', renderKroniki);
    defineRoute('/misje', renderMisje);
    defineRoute('/chwala', renderChwala);
    defineRoute('/bohater', renderBohater);

    // Auth guard - redirect if not logged in, otherwise show app
    redirectIfNotLogged((user, userData) => {
      window.currentUser = user;
      window.currentUserData = userData;

      document.getElementById('auth-loading').style.display = 'none';
      document.getElementById('app-layout').style.display = 'flex';

      initRouter();
    });
  </script>
</body>
</html>
