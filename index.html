<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#080B14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Warrior OS">
  <meta name="description" content="Warrior OS 2.0 — System rozwijania wojownika">
  <meta property="og:title" content="⚔️ Warrior OS">
  <meta property="og:description" content="Rozwój. Rywalizacja. Społeczność.">
  
  <title>Warrior OS 2.0</title>
  
  <!-- Preload fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" as="style">
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Trajan+Pro&display=swap" as="style">
  
  <!-- Main CSS -->
  <link rel="stylesheet" href="src/styles/variables.css">
  <link rel="stylesheet" href="src/styles/reset.css">
  <link rel="stylesheet" href="src/styles/typography.css">
  <link rel="stylesheet" href="src/styles/layout.css">
  <link rel="stylesheet" href="src/styles/warrior-os-surrealist.css">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-weight='bold'>⚔️</text></svg>">
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════════════════
       ATMOSPHERIC LAYERS (Fixed Background)
       ═══════════════════════════════════════════════════════════════════ -->
  
  <div class="atmosphere" aria-hidden="true"></div>
  <div class="fog-layer" aria-hidden="true"></div>
  <div class="noise-layer" aria-hidden="true"></div>
  
  <!-- ═══════════════════════════════════════════════════════════════════
       LAYOUT WRAPPER
       ═══════════════════════════════════════════════════════════════════ -->
  
  <div class="app-wrapper">
    
    <!-- ─────────────────────────────────────────────────────────────────
         TOP BAR (Sticky, Always Visible)
         ───────────────────────────────────────────────────────────────── -->
    
    <header class="top-bar" role="banner">
      <div class="top-bar-content">
        
        <!-- Logo -->
        <div class="top-bar-logo">
          <span class="logo-icon">⚔️</span>
          <span class="logo-text">WWS</span>
        </div>
        
        <!-- Top Bar Actions (Right side) -->
        <div class="top-bar-actions">
          
          <!-- Notifications Button -->
          <button 
            class="top-bar-btn notification-btn" 
            id="notification-trigger"
            aria-label="Powiadomienia"
            aria-expanded="false"
            aria-controls="notification-panel"
          >
            <svg class="icon-notification" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <span class="notification-badge" id="notification-count" style="display: none;">3</span>
          </button>
          
          <!-- Messages Button -->
          <button 
            class="top-bar-btn messages-btn"
            aria-label="Wiadomości"
            onclick="app.navigate('/messages')"
          >
            <svg class="icon-messages" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            <span class="message-badge">2</span>
          </button>
          
          <!-- Profile Button -->
          <button 
            class="top-bar-btn profile-btn"
            aria-label="Profil"
            onclick="app.navigate('/profile/me')"
          >
            <svg class="icon-profile" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </button>
          
        </div>
        
      </div>
    </header>
    
    <!-- ─────────────────────────────────────────────────────────────────
         NOTIFICATION PANEL (Dropdown from top)
         ───────────────────────────────────────────────────────────────── -->
    
    <div 
      class="notification-panel" 
      id="notification-panel"
      role="region"
      aria-label="Powiadomienia"
      style="display: none;"
    >
      <div class="notification-panel-header">
        <h3>Powiadomienia</h3>
        <button class="btn-close" id="notification-close" aria-label="Zamknij powiadomienia">✕</button>
      </div>
      <div class="notification-list" id="notification-list">
        <!-- Notifications will be injected here -->
        <div class="notification-item notification-item--new">
          <div class="notification-icon">🏆</div>
          <div class="notification-content">
            <div class="notification-title">Osiągnięcie odblokowane!</div>
            <div class="notification-message">Ukończyłeś 10 misji</div>
            <div class="notification-time">2 min temu</div>
          </div>
        </div>
        
        <div class="notification-item">
          <div class="notification-icon">⚔️</div>
          <div class="notification-content">
            <div class="notification-title">Shadow dołączył do wyzwania</div>
            <div class="notification-message">30 dni bez cukru</div>
            <div class="notification-time">15 min temu</div>
          </div>
        </div>
        
        <div class="notification-item">
          <div class="notification-icon">🔥</div>
          <div class="notification-content">
            <div class="notification-title">Seria rosnąca!</div>
            <div class="notification-message">Masz 12 dniową serię. Nie przerwij!</div>
            <div class="notification-time">1 godzinę temu</div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- ─────────────────────────────────────────────────────────────────
         MAIN CONTENT AREA
         ───────────────────────────────────────────────────────────────── -->
    
    <main class="content-area" id="content-area">
      <!-- Screens will be injected here by router -->
      <div class="screen-loading">
        <div class="spinner"></div>
        <p>Ładowanie...</p>
      </div>
    </main>
    
    <!-- ─────────────────────────────────────────────────────────────────
         BOTTOM NAVIGATION (Sticky, Always Visible)
         ───────────────────────────────────────────────────────────────── -->
    
    <nav class="bottom-nav" role="navigation" aria-label="Główna nawigacja">
      <div class="bottom-nav-content">
        
        <!-- Nav Item: Arena -->
        <a 
          href="#/arena" 
          class="nav-item" 
          data-route="/arena"
          aria-current="page"
        >
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
          </svg>
          <span class="nav-label">ARENA</span>
        </a>
        
        <!-- Nav Item: Kroniki (Feed) -->
        <a 
          href="#/posts" 
          class="nav-item"
          data-route="/posts"
        >
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
          </svg>
          <span class="nav-label">KRONIKI</span>
        </a>
        
        <!-- Nav Item: Misje (Hero) -->
        <a 
          href="#/missions" 
          class="nav-item nav-item-hero"
          data-route="/missions"
        >
          <svg class="nav-icon-hero" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2L3 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z"/>
          </svg>
          <span class="nav-label">MISJE</span>
        </a>
        
        <!-- Nav Item: Chwała (Ranking) -->
        <a 
          href="#/ranking" 
          class="nav-item"
          data-route="/ranking"
        >
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="8" r="7"></circle>
            <path d="M8 19h8"></path>
            <path d="M6 21h12"></path>
            <path d="M12 11v3"></path>
          </svg>
          <span class="nav-label">CHWAŁA</span>
        </a>
        
        <!-- Nav Item: Bohater (Profile) -->
        <a 
          href="#/profile/me" 
          class="nav-item"
          data-route="/profile"
        >
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <span class="nav-label">BOHATER</span>
        </a>
        
      </div>
    </nav>
    
  </div>
  
  <!-- ═══════════════════════════════════════════════════════════════════
       SCRIPTS
       ═══════════════════════════════════════════════════════════════════ -->
  
  <!-- Firebase SDK (CDN) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
  
  <!-- Core Application -->
  <script src="src/services/firebase/firebase.js"></script>
  <script src="src/router.js"></script>
  <script src="src/app.js"></script>
  
  <!-- Service Worker (PWA) -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(err => {
        console.log('SW registration failed:', err);
      });
    }
  </script>
  
</body>
</html>
