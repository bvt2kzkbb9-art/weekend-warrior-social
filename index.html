<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050506" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com/firebasejs/ https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://firestore.googleapis.com https://firebase.googleapis.com https://identitytoolkit.googleapis.com https://cloudinary.com https://res.cloudinary.com; frame-src https://apis.google.com; child-src https://apis.google.com;">
  <meta name="description" content="Weekend Warrior Social — Arena" />
  <title>Arena — Weekend Warrior Social</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WWS Arena" />
  <link rel="apple-touch-icon" href="assets/icons/icon-512.svg" />
  <!-- OG / Social -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="Weekend Warrior Social" />
  <meta property="og:description" content="Portal społecznościowy dla wojowników weekendu. Wyzwania, ranking, osiągnięcia." />
  <meta property="og:image"       content="assets/icons/icon-512.svg" />
  <meta name="twitter:card"       content="summary" />
  <meta name="twitter:title"      content="Weekend Warrior Social ⚔️" />
  <meta name="twitter:description"content="Dołącz. Walcz. Zwyciężaj." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/design-system.css" />
</head>
<body>

<div class="app-layout">

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- FIXED TOP HEADER -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <header class="app-header" role="banner">
    <div class="app-header-left">
      <span class="app-header-logo">⚔ WWS</span>
    </div>
    <div class="app-header-right">
      <button class="header-icon-btn" id="notifications-btn" aria-label="Powiadomienia">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <div class="badge-dot hidden"></div>
      </button>
      <button class="header-icon-btn" id="messages-btn" aria-label="Wiadomości">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <div class="badge-dot hidden"></div>
      </button>
      <button class="header-icon-btn" id="profile-btn" aria-label="Profil">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- SCROLLABLE CONTENT AREA -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <main class="app-content" role="main">
    <div class="content-area page">

      <!-- Skeleton loader -->
      <div id="skeleton">
        <div style="display:flex; flex-direction:column; align-items:center; gap:2rem; padding:2rem 0;">
          <div class="skeleton" style="width:100px; height:100px; border-radius:50%;"></div>
          <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; width:100%; padding:0 0.5rem;">
            <div class="skeleton" style="height:100px; border-radius:var(--radius-lg);"></div>
            <div class="skeleton" style="height:100px; border-radius:var(--radius-lg);"></div>
            <div class="skeleton" style="height:100px; border-radius:var(--radius-lg);"></div>
          </div>
          <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:0.75rem; width:100%; padding:0 0.5rem;">
            <div class="skeleton" style="height:80px; border-radius:var(--radius-lg);"></div>
            <div class="skeleton" style="height:80px; border-radius:var(--radius-lg);"></div>
            <div class="skeleton" style="height:80px; border-radius:var(--radius-lg);"></div>
            <div class="skeleton" style="height:80px; border-radius:var(--radius-lg);"></div>
          </div>
        </div>
      </div>

      <!-- Arena Dashboard (hidden until data loads) -->
      <div id="dashboard" class="hidden">

        <!-- Welcome logo -->
        <div style="text-align: center; padding: 2rem 0 1.5rem; margin-bottom: 1.5rem;">
          <div style="font-size: 3rem; margin-bottom: 0.5rem;">⚔</div>
          <h1 style="font-size: 1.25rem; font-family: var(--font-heading); letter-spacing: 0.1em;">WEEKEND WARRIOR</h1>
          <p style="font-size: 0.875rem; color: var(--text-secondary); margin: 0;">Social Arena</p>
        </div>

        <!-- Stats Grid (3 columns) -->
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 2rem;">
          <div class="card" style="padding: 1rem; text-align: center;">
            <div id="stat-xp" style="font-size: 1.75rem; font-weight: 700; color: var(--gold); margin-bottom: 0.25rem;">0</div>
            <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em;">XP</div>
          </div>
          <div class="card" style="padding: 1rem; text-align: center;">
            <div id="stat-level" style="font-size: 1.75rem; font-weight: 700; color: var(--info); margin-bottom: 0.25rem;">1</div>
            <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em;">Level</div>
          </div>
          <div class="card" style="padding: 1rem; text-align: center;">
            <div id="stat-streak" style="font-size: 1.75rem; font-weight: 700; color: var(--success); margin-bottom: 0.25rem;">0</div>
            <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em;">Streak</div>
          </div>
        </div>

        <!-- Quick Actions (4 icons) -->
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin-bottom: 2rem;">
          <a href="feed.html" class="card" style="padding: 1rem; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; text-decoration: none; color: var(--text-primary); text-align: center; cursor: pointer;">
            <span style="font-size: 2rem;">📝</span>
            <span style="font-size: 0.65rem; color: var(--text-secondary);">Post</span>
          </a>
          <div class="card" style="padding: 1rem; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; text-align: center; opacity: 0.6;">
            <span style="font-size: 2rem;">📸</span>
            <span style="font-size: 0.65rem; color: var(--text-secondary);">Photo</span>
          </div>
          <a href="challenges.html" class="card" style="padding: 1rem; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; text-decoration: none; color: var(--text-primary); text-align: center; cursor: pointer;">
            <span style="font-size: 2rem;">⚔</span>
            <span style="font-size: 0.65rem; color: var(--text-secondary);">Challenge</span>
          </a>
          <a href="messages.html" class="card" style="padding: 1rem; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; text-decoration: none; color: var(--text-primary); text-align: center; cursor: pointer;">
            <span style="font-size: 2rem;">💬</span>
            <span style="font-size: 0.65rem; color: var(--text-secondary);">Chat</span>
          </a>
        </div>

        <!-- Battle/Activity Cards -->
        <div id="dashboard-content" style="display: grid; gap: 0.75rem;">
          <!-- Populated by JavaScript -->
        </div>

      </div>

    </div>
  </main>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- FIXED BOTTOM NAVIGATION -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <nav class="app-nav" role="navigation" aria-label="Główna nawigacja">
    <a href="index.html" class="nav-item active" aria-current="page" data-page="arena">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="1"/><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/>
      </svg>
      <span>Arena</span>
    </a>
    <a href="feed.html" class="nav-item" data-page="kroniki">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>Kroniki</span>
    </a>
    <a href="challenges.html" class="nav-item" data-page="misje">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v20M2 12h20"/>
        <circle cx="12" cy="12" r="1"/>
      </svg>
      <span>Misje</span>
    </a>
    <a href="ranking.html" class="nav-item" data-page="chwala">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
        <polyline points="17 6 23 6 23 12"/>
      </svg>
      <span>Chwała</span>
    </a>
    <a href="profile.html" class="nav-item" data-page="bohater">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>Bohater</span>
    </a>
  </nav>

</div>

<script type="module">
  import { initDashboard } from './js/dashboard.js';

  // Setup navigation
  document.querySelectorAll('.nav-item').forEach(link => {
    link.addEventListener('click', (e) => {
      document.querySelectorAll('.nav-item').forEach(l => l.classList.remove('active'));
      e.currentTarget.classList.add('active');
    });
  });

  // Setup header buttons
  document.getElementById('profile-btn').addEventListener('click', () => {
    window.location.href = 'profile.html';
  });

  document.getElementById('messages-btn').addEventListener('click', () => {
    window.location.href = 'messages.html';
  });

  // Load dashboard
  initDashboard();
</script>

<!-- Service Worker Registration -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('[SW] Registered:', reg.scope))
        .catch(err => console.warn('[SW] Registration failed:', err));
    });
  }
</script>

</body>
</html>
