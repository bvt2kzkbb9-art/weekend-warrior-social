<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#06050A"/>
  <meta name="apple-mobile-web-app-title" content="Messages"/>
  <title>Messages — Weekend Warrior Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/rpg-theme.css"/>
  <link rel="stylesheet" href="css/messenger.css"/>
  <style>
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      padding-bottom: 0;
    }

    /* ─── HEADER ──────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      flex-shrink: 0;
      height: 56px;
    }
    .header-title {
      font-family: var(--font-heading);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--gold);
    }
    .header-actions {
      display: flex;
      gap: 1rem;
    }
    .header-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.25rem;
      cursor: pointer;
      transition: all var(--t);
    }
    .header-btn:hover { color: var(--gold); }

    /* ─── TABS ────────────────────────────────────────────── */
    .msg-tabs {
      display: flex;
      gap: 0;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 0 1rem;
    }
    .msg-tab {
      flex: 1;
      padding: 1rem 0.5rem;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--text-muted);
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all var(--t);
      text-align: center;
      position: relative;
    }
    .msg-tab:hover { color: var(--text-primary); }
    .msg-tab.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }
    .msg-tab-badge {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      min-width: 16px;
      height: 16px;
      background: var(--gold);
      color: #000;
      border-radius: 50%;
      font-size: 0.5rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-heading);
    }

    /* ─── CONTENT ─────────────────────────────────────────── */
    main {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .msg-section {
      display: none;
      overflow-y: auto;
      flex: 1;
    }
    .msg-section.active { display: flex; flex-direction: column; }

    /* ─── CONVERSATION LIST ────────────────────────────────── */
    .conv-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: all var(--t);
    }
    .conv-item:hover { background: var(--bg-elevated); }
    .conv-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-border));
      flex-shrink: 0;
      position: relative;
    }
    .conv-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .conv-online {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 12px;
      height: 12px;
      background: #4ADE80;
      border: 2px solid var(--bg-card);
      border-radius: 50%;
    }
    .conv-info {
      flex: 1;
      min-width: 0;
    }
    .conv-name {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.875rem;
      color: var(--text-primary);
    }
    .conv-preview {
      font-size: 0.75rem;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .conv-time {
      font-size: 0.625rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    /* ─── NOTIFICATIONS ────────────────────────────────────── */
    .notif-item {
      display: flex;
      gap: 1rem;
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      transition: all var(--t);
    }
    .notif-item:hover { background: var(--bg-elevated); }
    .notif-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-border));
      flex-shrink: 0;
    }
    .notif-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .notif-body {
      flex: 1;
      min-width: 0;
    }
    .notif-title {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.875rem;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }
    .notif-text {
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.4;
    }
    .notif-time {
      font-size: 0.625rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }
    .notif-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }
    .notif-btn {
      padding: 0.375rem 0.75rem;
      background: var(--gold);
      border: none;
      border-radius: var(--r-sm);
      color: #000;
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.625rem;
      cursor: pointer;
      transition: all var(--t);
    }
    .notif-btn:active { transform: scale(0.95); }
    .notif-btn-secondary {
      background: var(--bg-elevated);
      border: 1px solid var(--border-mid);
      color: var(--text-primary);
    }

    /* ─── EMPTY STATE ─────────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
    }
    .empty-state-icon { font-size: 3rem; margin-bottom: 1rem; }

    /* ─── BOTTOM NAV ──────────────────────────────────────── */
    nav.bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      z-index: 100;
    }
    .nav-icon {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.6rem;
      font-family: var(--font-heading);
      transition: all var(--t);
    }
    .nav-icon:hover { color: var(--gold); }
    .nav-icon.active { color: var(--gold); }
    .nav-icon svg { width: 24px; height: 24px; }
  </style>
</head>
<body>
<div class="bg-orbs" aria-hidden="true"></div>

<!-- ════════════════════════════════════════════
     HEADER
════════════════════════════════════════════ -->
<header>
  <div class="header-title">💬 Messages</div>
  <div class="header-actions">
    <button class="header-btn" id="search-btn">🔎</button>
  </div>
</header>

<!-- ════════════════════════════════════════════
     TABS
════════════════════════════════════════════ -->
<div class="msg-tabs">
  <button class="msg-tab active" data-tab="chats">
    Czaty
    <span class="msg-tab-badge" id="chats-badge" style="display:none;">0</span>
  </button>
  <button class="msg-tab" data-tab="notifications">
    Powiadomienia
    <span class="msg-tab-badge" id="notif-badge" style="display:none;">0</span>
  </button>
  <button class="msg-tab" data-tab="requests">Zaproszenia</button>
</div>

<!-- ════════════════════════════════════════════
     CONTENT
════════════════════════════════════════════ -->
<main>

  <!-- CHATS TAB -->
  <div class="msg-section active" id="chats-tab">
    <div id="chats-list">
      <div class="empty-state">
        <div class="empty-state-icon">💬</div>
        <div>Brak czatów</div>
      </div>
    </div>
  </div>

  <!-- NOTIFICATIONS TAB -->
  <div class="msg-section" id="notifications-tab">
    <div id="notifications-list">
      <div class="empty-state">
        <div class="empty-state-icon">🔔</div>
        <div>Brak powiadomień</div>
      </div>
    </div>
  </div>

  <!-- REQUESTS TAB -->
  <div class="msg-section" id="requests-tab">
    <div id="requests-list">
      <div class="empty-state">
        <div class="empty-state-icon">👥</div>
        <div>Brak zaproszeń</div>
      </div>
    </div>
  </div>

</main>

<!-- ════════════════════════════════════════════
     BOTTOM NAVIGATION
════════════════════════════════════════════ -->
<nav class="bottom-nav">
  <a href="home.html" class="nav-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    <span>Home</span>
  </a>
  <a href="explore.html" class="nav-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>
    <span>Explore</span>
  </a>
  <a href="create.html" class="nav-icon">
    <svg viewBox="0 0 24 24" fill="var(--gold)" opacity="0.5"><circle cx="12" cy="12" r="10"/></svg>
    <span>Create</span>
  </a>
  <a href="messages.html" class="nav-icon active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span>Messages</span>
  </a>
  <a href="profile.html" class="nav-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/></svg>
    <span>Profile</span>
  </a>
</nav>

<!-- SCRIPTS -->
<script type="module">
  import { auth, db } from './js/firebase.js';
  import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import { collection, query, where, orderBy, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
  import { initTheme, injectLightModeCSS } from './js/weekly-ranking.js';
  import { initMessenger, setOnlinePresence } from './js/messenger.js';

  injectLightModeCSS();
  initTheme();

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }

    setOnlinePresence(user.uid, true);

    // Tab switching
    document.querySelectorAll('.msg-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.msg-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.msg-section').forEach(s => s.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + '-tab').classList.add('active');
      });
    });

    // Load conversations
    const convQuery = query(
      collection(db, 'conversations'),
      where('participants', 'array-contains', user.uid),
      orderBy('lastMessageAt', 'desc')
    );

    onSnapshot(convQuery, (snap) => {
      const list = document.getElementById('chats-list');
      if (snap.empty) {
        list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💬</div><div>Brak czatów. Zacznij rozmawiać!</div></div>';
        return;
      }
      list.innerHTML = snap.docs.map(doc => {
        const conv = doc.data();
        const otherUserId = conv.participants.find(p => p !== user.uid);
        return `<div class="conv-item" onclick="window.location.href='chat.html?id=${doc.id}'">
          <div class="conv-avatar" style="background-image:url('${conv.participantAvatars?.[otherUserId] || 'https://via.placeholder.com/48'}');background-size:cover;">
            ${conv.isOnline ? '<div class="conv-online"></div>' : ''}
          </div>
          <div class="conv-info">
            <div class="conv-name">${conv.participantNames?.[otherUserId] || 'User'}</div>
            <div class="conv-preview">${conv.lastMessage || 'Brak wiadomości'}</div>
          </div>
          <div class="conv-time">${new Date(conv.lastMessageAt?.seconds * 1000).toLocaleDateString('pl')}</div>
        </div>`;
      }).join('');
    });

    // Load notifications
    const notifQuery = query(
      collection(db, 'notifications'),
      where('recipientId', '==', user.uid),
      orderBy('createdAt', 'desc')
    );

    onSnapshot(notifQuery, (snap) => {
      const list = document.getElementById('notifications-list');
      if (snap.empty) {
        list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔔</div><div>Brak powiadomień</div></div>';
        return;
      }
      list.innerHTML = snap.docs.map(doc => {
        const notif = doc.data();
        return `<div class="notif-item">
          <div class="notif-avatar" style="background-image:url('${notif.senderAvatar || 'https://via.placeholder.com/44'}');background-size:cover;"></div>
          <div class="notif-body">
            <div class="notif-title">${notif.senderName}</div>
            <div class="notif-text">${notif.message}</div>
            <div class="notif-time">${new Date(notif.createdAt?.seconds * 1000).toLocaleDateString('pl')}</div>
          </div>
        </div>`;
      }).join('');
    });

    initMessenger();
  });

  window.addEventListener('beforeunload', () => {
    if (auth.currentUser) setOnlinePresence(auth.currentUser.uid, false);
  });
</script>
</body>
</html>
