<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050506" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com/firebasejs/; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://firestore.googleapis.com https://firebase.googleapis.com https://cloudinary.com https://res.cloudinary.com;">
  <meta name="description" content="Weekend Warrior Social — Wiadomości" />
  <title>Wiadomości — Weekend Warrior Social</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WWS Arena" />
  <link rel="apple-touch-icon" href="assets/icons/icon-512.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="bg-orbs" aria-hidden="true"></div>

<!-- Navigation -->
<nav class="nav" aria-label="Główna nawigacja">
  <span class="nav-brand">⚔ WWS</span>

  <a href="index.html" class="nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <span>Start</span>
  </a>

  <a href="feed.html" class="nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
    </svg>
    <span>Feed</span>
  </a>

  <a href="ranking.html" class="nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
      <polyline points="17 6 23 6 23 12"/>
    </svg>
    <span>Ranking</span>
  </a>

  <a href="messages.html" class="nav-item active" aria-current="page">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
    </svg>
    <span id="nav-messages">Moje</span>
    <span id="unread-badge" class="nav-badge hidden">0</span>
  </a>

  <a href="profile.html" class="nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
    <span>Profil</span>
  </a>

  <div class="nav-actions">
    <button id="logout-btn" class="btn btn-ghost btn-sm" style="color:var(--text-muted);">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Wyloguj
    </button>
  </div>
</nav>

<!-- Main content -->
<main class="content-area page">

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- MESSAGES LIST VIEW -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <div id="messages-list" class="messages-container">

    <!-- Header -->
    <div class="messages-header">
      <h1 class="messages-title">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        Wiadomości
      </h1>
      <button id="new-chat-btn" class="btn btn-ghost btn-sm" aria-label="Nowa rozmowa">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </button>
    </div>

    <!-- Search -->
    <div class="messages-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
      </svg>
      <input
        id="search-input"
        type="text"
        class="messages-search-input"
        placeholder="Szukaj wojownika..."
        aria-label="Szukaj wojownika"
      />
    </div>

    <!-- Active warriors (Stories) -->
    <div id="active-warriors" class="active-warriors hidden">
      <h3 class="active-warriors-title">Aktywni</h3>
      <div class="active-warriors-list" id="active-warriors-list">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- Conversations list -->
    <div id="conversations-list" class="conversations-list">
      <!-- Populated by JS -->
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="messages-empty hidden">
      <div class="messages-empty-icon">💬</div>
      <h2 class="messages-empty-title">Brak rozmów</h2>
      <p class="messages-empty-text">Zacznij nową rozmowę klikając przycisk + powyżej</p>
    </div>

  </div>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- CHAT VIEW -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <div id="chat-view" class="chat-view hidden">

    <!-- Chat header -->
    <div class="chat-header">
      <button id="back-btn" class="btn btn-ghost btn-sm" aria-label="Powrót">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <div class="chat-header-info">
        <div class="chat-header-avatar">
          <img id="chat-avatar" src="" alt="Avatar" class="avatar av-sm" />
        </div>
        <div class="chat-header-content">
          <h2 id="chat-name" class="chat-header-name">Nazwa</h2>
          <p id="chat-status" class="chat-header-status">offline</p>
        </div>
      </div>
    </div>

    <!-- Messages container -->
    <div id="messages-area" class="messages-area">
      <!-- Messages populated by JS -->
    </div>

    <!-- Message input -->
    <div class="message-input-wrap">
      <textarea
        id="message-input"
        class="message-input"
        placeholder="Napisz wiadomość..."
        aria-label="Wpisz wiadomość"
        rows="1"
      ></textarea>
      <button id="send-btn" class="message-send-btn" aria-label="Wyślij" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"
             stroke="none">
          <path d="M16.6915026,12.4744748 L3.50612381,13.2599618 C3.19218622,13.2599618 3.03521743,13.4170592 3.03521743,13.5741566 L1.15159189,20.0151496 C0.8376543,20.8006365 0.99,21.89 1.77946707,22.52 C2.41,22.99 3.50612381,23.1 4.13399899,22.8429026 L21.714504,14.0454487 C22.6563168,13.5741566 23.1272231,12.6315722 22.6563168,11.6889879 L4.13399899,1.16346272 C3.34915502,0.9 2.40734225,1.00636533 1.77946707,1.4776575 C0.994623095,2.10604706 0.837654326,3.0486314 1.15159189,3.98721575 L3.03521743,10.4282088 C3.03521743,10.5853061 3.19218622,10.7424035 3.50612381,10.7424035 L16.6915026,11.5278905 C16.6915026,11.5278905 17.1624089,11.5278905 17.1624089,12.0991827 C17.1624089,12.6704748 16.6915026,12.4744748 16.6915026,12.4744748 Z"/>
        </svg>
      </button>
    </div>

  </div>

  <!-- New conversation modal -->
  <div id="new-chat-modal" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-handle"></div>
      <h2 class="modal-title">Nowa rozmowa</h2>

      <input
        id="new-chat-search"
        type="text"
        class="form-input"
        placeholder="Wyszukaj wojownika..."
        aria-label="Wyszukaj wojownika"
        style="margin-bottom: 1rem;"
      />

      <div id="new-chat-results" class="new-chat-results">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

</main>

<script type="module">
  import { initMessagesPage } from './js/messages.js';
  initMessagesPage();
</script>

<!-- Service Worker Registration -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('[SW] Registered:', reg.scope))
        .catch(err => console.warn('[SW] Registration failed:', err));
    });
  }
</script>

</body>
</html>
