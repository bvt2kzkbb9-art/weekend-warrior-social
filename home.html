<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#06050A"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="WWS Home"/>
  <meta name="description" content="Weekend Warrior Social — Home Feed"/>
  <title>Home — Weekend Warrior Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/rpg-theme.css"/>
  <style>
    /* ─── STORIES BAR ─────────────────────────────────────── */
    .stories-bar {
      display: flex;
      gap: 0.75rem;
      padding: 1rem;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin-bottom: 1rem;
    }
    .story-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
      cursor: pointer;
      text-decoration: none;
      color: var(--text-primary);
      transition: transform var(--t);
    }
    .story-item:active { transform: scale(0.95); }
    .story-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      background: linear-gradient(135deg, var(--gold-border), transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      overflow: hidden;
    }
    .story-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .story-name {
      font-size: 0.625rem;
      font-family: var(--font-heading);
      font-weight: 700;
      text-align: center;
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ─── QUICK CREATE ────────────────────────────────────── */
    .quick-create {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      margin-bottom: 1rem;
      border-radius: var(--r-lg);
      margin-left: 1rem;
      margin-right: 1rem;
    }
    .quick-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-border));
      flex-shrink: 0;
    }
    .quick-input {
      flex: 1;
      background: var(--bg-elevated);
      border: 1px solid var(--border-mid);
      border-radius: var(--r-full);
      padding: 0.75rem 1rem;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 0.875rem;
      cursor: pointer;
      transition: all var(--t);
    }
    .quick-input:hover {
      border-color: var(--gold);
      color: var(--text-primary);
    }
    .quick-create-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--gold);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-size: 1.5rem;
      cursor: pointer;
      transition: all var(--t);
    }
    .quick-create-btn:active { transform: scale(0.9); }

    /* ─── FEED POSTS ──────────────────────────────────────── */
    .feed-post {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      margin: 0 1rem 1rem 1rem;
      overflow: hidden;
    }
    .post-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .post-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-border));
      overflow: hidden;
      flex-shrink: 0;
    }
    .post-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .post-meta {
      flex: 1;
      min-width: 0;
    }
    .post-name {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.875rem;
      color: var(--text-primary);
    }
    .post-time {
      font-size: 0.625rem;
      color: var(--text-muted);
    }
    .post-content {
      padding: 1rem;
      color: var(--text-primary);
      line-height: 1.5;
      word-break: break-word;
    }
    .post-image {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
      display: block;
    }
    .post-stats {
      display: flex;
      justify-content: space-around;
      padding: 0.75rem 1rem;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .post-actions {
      display: flex;
      gap: 0;
    }
    .post-action {
      flex: 1;
      padding: 0.75rem;
      background: none;
      border: none;
      border-right: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.75rem;
      font-family: var(--font-heading);
      transition: all var(--t);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .post-action:last-child { border-right: none; }
    .post-action:hover {
      color: var(--gold);
      background: rgba(212, 175, 55, 0.08);
    }
    .post-action.active { color: var(--gold); }

    /* ─── CHALLENGE DAY ────────────────────────────────────── */
    .challenge-day {
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.12), rgba(212, 175, 55, 0.06));
      border: 1px solid var(--gold-border);
      border-radius: var(--r-lg);
      padding: 1.5rem 1rem;
      margin: 0 1rem 1rem 1rem;
      text-align: center;
    }
    .challenge-day-label {
      font-size: 0.625rem;
      font-family: var(--font-heading);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }
    .challenge-day-title {
      font-size: 1.25rem;
      font-family: var(--font-heading);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }
    .challenge-day-desc {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }
    .challenge-day-btn {
      padding: 0.75rem 2rem;
      background: var(--gold);
      border: none;
      border-radius: var(--r-full);
      color: #000;
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all var(--t);
    }
    .challenge-day-btn:active { transform: scale(0.95); }

    /* ─── EMPTY STATE ─────────────────────────────────────── */
    .empty-state {
      padding: 3rem 1rem;
      text-align: center;
    }
    .empty-state-icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state-title {
      font-family: var(--font-heading);
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }
    .empty-state-desc {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    /* ─── BOTTOM NAV ──────────────────────────────────────── */
    nav.bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 100;
    }
    .nav-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
      flex: 1;
      height: 100%;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.6rem;
      font-family: var(--font-heading);
      transition: all var(--t);
      position: relative;
    }
    .nav-icon:hover { color: var(--gold); }
    .nav-icon.active { color: var(--gold); }
    .nav-icon svg {
      width: 24px;
      height: 24px;
    }
    .nav-badge {
      position: absolute;
      top: 4px;
      right: 2px;
      min-width: 16px;
      height: 16px;
      background: var(--gold);
      color: #000;
      border-radius: 50%;
      font-size: 0.5rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-heading);
    }

    /* ─── CONTENT PADDING ─────────────────────────────────── */
    main { padding-bottom: 70px; }
  </style>
</head>
<body>
<div class="bg-orbs" aria-hidden="true"></div>

<!-- ════════════════════════════════════════════
     TOP HEADER
════════════════════════════════════════════ -->
<header style="position:sticky;top:0;z-index:90;background:var(--bg-card);border-bottom:1px solid var(--border);padding:1rem;display:flex;align-items:center;justify-content:space-between;">
  <div style="font-family:var(--font-heading);font-size:1.25rem;font-weight:700;color:var(--gold);">⚔ WWS</div>
  <div style="display:flex;gap:1rem;align-items:center;">
    <button id="search-btn" style="background:none;border:none;color:var(--text-muted);font-size:1.25rem;cursor:pointer;">🔍</button>
    <button id="notif-btn" style="background:none;border:none;color:var(--text-muted);font-size:1.25rem;cursor:pointer;position:relative;">🔔</button>
  </div>
</header>

<!-- ════════════════════════════════════════════
     MAIN CONTENT
════════════════════════════════════════════ -->
<main>

  <!-- Stories bar -->
  <section class="stories-bar">
    <div class="story-item">
      <div class="story-avatar" style="background:var(--gold);">➕</div>
      <div class="story-name">Twoja</div>
    </div>
    <!-- More stories rendered by JS -->
  </section>

  <!-- Quick Create -->
  <section class="quick-create">
    <div class="quick-avatar"></div>
    <input type="text" class="quick-input" id="quick-input" placeholder="Co nowego?"/>
    <button class="quick-create-btn" id="quick-create-btn">➕</button>
  </section>

  <!-- Challenge of the Day -->
  <section class="challenge-day">
    <div class="challenge-day-label">⚔️ Wyzwanie dnia</div>
    <div class="challenge-day-title" id="challenge-day-title">Ładowanie...</div>
    <div class="challenge-day-desc" id="challenge-day-desc"></div>
    <button class="challenge-day-btn" id="challenge-day-btn">Rzuć wyzwanie</button>
  </section>

  <!-- Feed Posts -->
  <section id="feed-posts">
    <!-- Posts rendered by JS -->
    <div class="empty-state">
      <div class="empty-state-icon">📝</div>
      <div class="empty-state-title">Brak postów</div>
      <div class="empty-state-desc">Zacznij obserwować innych aby widzieć ich posty</div>
    </div>
  </section>

</main>

<!-- ════════════════════════════════════════════
     BOTTOM NAVIGATION
════════════════════════════════════════════ -->
<nav class="bottom-nav">
  <a href="home.html" class="nav-icon active" title="Home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <span>Home</span>
  </a>

  <a href="explore.html" class="nav-icon" title="Explore">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 16 14"/>
    </svg>
    <span>Explore</span>
  </a>

  <a href="create.html" class="nav-icon" title="Create" style="font-size:1.5rem;">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <circle cx="12" cy="12" r="10" fill="var(--gold)"/><path d="M12 6v12M6 12h12" stroke="#000" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <span>Create</span>
  </a>

  <a href="messages.html" class="nav-icon" title="Messages">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <span>Messages</span>
    <span class="nav-badge" id="msg-badge" style="display:none;">0</span>
  </a>

  <a href="profile.html" class="nav-icon" title="Profile">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
    </svg>
    <span>Profile</span>
  </a>
</nav>

<!-- SCRIPTS -->
<script type="module">
  import { auth, db } from './js/firebase.js';
  import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import { collection, query, where, orderBy, limit, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
  import { initTheme, injectLightModeCSS } from './js/weekly-ranking.js';
  import { injectNotifBell } from './js/notifications.js';

  injectLightModeCSS();
  initTheme();

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }

    // Load feed posts
    const q = query(
      collection(db, 'posts'),
      where('visibility', '==', 'public'),
      orderBy('createdAt', 'desc'),
      limit(20)
    );

    onSnapshot(q, (snap) => {
      const container = document.getElementById('feed-posts');
      if (snap.empty) {
        container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📝</div><div class="empty-state-title">Brak postów</div></div>`;
        return;
      }
      container.innerHTML = snap.docs.map(doc => {
        const p = doc.data();
        return `<div class="feed-post">
          <div class="post-header">
            <div class="post-avatar"><img src="${p.authorAvatar || 'https://via.placeholder.com/44'}" alt=""/></div>
            <div class="post-meta">
              <div class="post-name">${p.authorName}</div>
              <div class="post-time">${new Date(p.createdAt?.seconds * 1000).toLocaleDateString('pl')}</div>
            </div>
          </div>
          ${p.content ? `<div class="post-content">${p.content}</div>` : ''}
          ${p.imageUrl ? `<img src="${p.imageUrl}" alt="post" class="post-image"/>` : ''}
          <div class="post-stats">
            <span>❤️ ${p.likes?.length || 0}</span>
            <span>💬 ${p.comments?.length || 0}</span>
          </div>
          <div class="post-actions">
            <button class="post-action">❤️ Polub</button>
            <button class="post-action">💬 Komentuj</button>
            <button class="post-action">↗️ Udostępnij</button>
          </div>
        </div>`;
      }).join('');
    });

    // Quick create button
    document.getElementById('quick-create-btn').addEventListener('click', () => {
      window.location.href = 'create.html';
    });

    // Challenge of the day
    injectNotifBell(user.uid, 'notif-btn');
  });

  // Logout on beforeunload
  window.addEventListener('beforeunload', () => {
    if (auth.currentUser) {
      const { updateDoc, doc } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');
      updateDoc(doc(db, 'users', auth.currentUser.uid), { isOnline: false }).catch(() => {});
    }
  });
</script>
</body>
</html>
