<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#06050A"/>
  <meta name="description" content="Szczegóły wyzwania — Weekend Warrior Social"/>
  <title>Wyzwanie — Weekend Warrior Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="css/design-system.css"/>
  <link rel="stylesheet" href="css/layout.css"/>
  <link rel="stylesheet" href="css/components.css"/>
  <link rel="stylesheet" href="css/premium-components.css"/>
  <link rel="stylesheet" href="css/animations.css"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/rpg-theme.css"/>
  <link rel="stylesheet" href="css/unified-system.css"/>
  <style>
    .challenge-details {
      background: rgba(30,30,40,0.6);
      border: 1.5px solid rgba(212,175,55,0.2);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .detail-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .detail-item {
      background: rgba(0,0,0,0.3);
      padding: 0.75rem;
      border-radius: 6px;
      border: 1px solid rgba(212,175,55,0.1);
    }
    .detail-label {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.25rem;
    }
    .detail-value {
      font-size: 1rem;
      color: #FFFFFF;
      font-weight: 700;
    }
    .detail-highlight {
      color: #D4AF37;
    }
    .opponents-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .opponent-card-large {
      background: rgba(30,30,40,0.6);
      border: 1.5px solid rgba(212,175,55,0.2);
      border-radius: 8px;
      padding: 1.25rem;
      text-align: center;
    }
    .opponent-card-large.player {
      border-color: rgba(76,175,80,0.4);
    }
    .opponent-card-large.opponent {
      border-color: rgba(244,67,54,0.4);
    }
    .opponent-avatar-large {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(212,175,55,0.3), rgba(107,79,187,0.2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 0.75rem;
    }
    .opponent-name-large {
      font-weight: 700;
      color: #FFFFFF;
      font-size: 1.1rem;
      margin-bottom: 0.25rem;
    }
    .opponent-level-large {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 0.75rem;
    }
    .chat-section {
      background: rgba(30,30,40,0.6);
      border: 1.5px solid rgba(212,175,55,0.2);
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .chat-header {
      font-weight: 700;
      color: #FFFFFF;
      margin-bottom: 1rem;
      font-size: 1rem;
    }
    .chat-messages {
      height: 300px;
      overflow-y: auto;
      background: rgba(0,0,0,0.3);
      border-radius: 6px;
      padding: 1rem;
      margin-bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .chat-message {
      padding: 0.75rem;
      background: rgba(212,175,55,0.1);
      border-left: 3px solid rgba(212,175,55,0.4);
      border-radius: 4px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.9);
    }
    .chat-message.system {
      background: rgba(33,150,243,0.1);
      border-left-color: rgba(33,150,243,0.4);
      color: rgba(255,255,255,0.7);
      font-style: italic;
    }
    .chat-input-box {
      display: flex;
      gap: 0.5rem;
    }
    .chat-input {
      flex: 1;
      padding: 0.75rem;
      background: rgba(30,30,40,0.8);
      border: 1.5px solid rgba(212,175,55,0.2);
      border-radius: 6px;
      color: #FFFFFF;
      font-family: inherit;
      font-size: 0.85rem;
    }
    .chat-input:focus {
      outline: none;
      border-color: rgba(212,175,55,0.5);
      box-shadow: 0 0 8px rgba(212,175,55,0.2);
    }
    .chat-send-btn {
      padding: 0.75rem 1.5rem;
      background: rgba(33,150,243,0.8);
      color: #FFFFFF;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.85rem;
      transition: all 0.3s ease;
    }
    .chat-send-btn:hover {
      background: rgba(33,150,243,1);
    }
    .result-section {
      background: rgba(30,30,40,0.6);
      border: 1.5px solid rgba(212,175,55,0.2);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .result-title {
      font-weight: 700;
      color: #FFFFFF;
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
    }
    .result-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .btn-winner {
      padding: 1rem;
      background: rgba(76,175,80,0.8);
      color: #FFFFFF;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }
    .btn-winner:hover {
      background: rgba(76,175,80,1);
    }
    .btn-loser {
      padding: 1rem;
      background: rgba(244,67,54,0.8);
      color: #FFFFFF;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }
    .btn-loser:hover {
      background: rgba(244,67,54,1);
    }
    .result-status {
      padding: 1.5rem;
      background: rgba(156,39,176,0.1);
      border: 1.5px solid rgba(156,39,176,0.3);
      border-radius: 8px;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .status-icon {
      font-size: 2rem;
      margin-bottom: 0.75rem;
    }
    .status-text {
      color: #FFFFFF;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .status-subtext {
      color: rgba(255,255,255,0.6);
      font-size: 0.85rem;
    }
  </style>
</head>

<!-- MAIN CONTENT -->
<main class="page-container">

  <!-- Page header -->
  <div class="page-header">
    <div class="page-header-title">
      <div class="page-title" id="challenge-title">⚔️ Wyzwanie</div>
      <div class="page-subtitle" id="challenge-category">Szczegóły bitwy</div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Challenge details -->
  <div class="challenge-details" id="details-container">
    <!-- Loaded by JavaScript -->
  </div>

  <!-- Opponents -->
  <div class="opponents-section" id="opponents-container">
    <!-- Loaded by JavaScript -->
  </div>

  <!-- Chat section -->
  <div class="chat-section" id="chat-section" style="display:none;">
    <div class="chat-header">💬 Rozmowa przed wyzwaniem</div>
    <div class="chat-messages" id="chat-messages">
      <div class="chat-message system">Czat otwarty. Możesz porozmawiaćze swoim oponentem.</div>
    </div>
    <div class="chat-input-box">
      <input type="text" class="chat-input" id="message-input" placeholder="Napisz wiadomość...">
      <button class="chat-send-btn" onclick="sendMessage()">Wyślij</button>
    </div>
  </div>

  <!-- Result section -->
  <div class="result-section" id="result-section" style="display:none;">
    <div class="result-title">Podaj wynik wyzwania</div>
    <div class="result-buttons">
      <button class="btn-winner" onclick="recordWin()">🏆 Ja wygrałem</button>
      <button class="btn-loser" onclick="recordLoss()">Ja przegrałem</button>
    </div>
  </div>

  <!-- Completed status -->
  <div class="result-status" id="completed-status" style="display:none;">
    <div class="status-icon">🏆</div>
    <div class="status-text" id="completed-status-text">Wyzwanie ukończone!</div>
    <div class="status-subtext" id="completed-status-xp">Zdobyłeś 500 XP</div>
  </div>

  <div style="height: 1rem;"></div>
</main>
