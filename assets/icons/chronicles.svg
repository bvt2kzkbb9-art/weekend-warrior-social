    <!-- Left scroll roller -->
    <circle cx="7" cy="10" r="2.2" fill="none"/>
    <line x1="7" y1="8" x2="7" y2="12"/>
    <!-- Right scroll roller -->
    <circle cx="25" cy="10" r="2.2" fill="none"/>
