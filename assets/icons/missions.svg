<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Premium Crossed Swords - Most Prestigious -->
  <g stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left sword blade -->
    <path d="M 8 22 L 10 8 L 12 6"/>
    <!-- Left sword guard -->
    <line x1="7" y1="23" x2="13" y2="23"/>
    <!-- Left sword grip -->
    <rect x="9" y="23.5" width="1.6" height="3.2" rx="0.4" fill="none"/>
    <!-- Right sword blade -->
    <path d="M 24 22 L 22 8 L 20 6"/>
    <!-- Right sword guard -->
    <line x1="19" y1="23" x2="25" y2="23"/>
    <!-- Right sword grip -->
    <rect x="21.4" y="23.5" width="1.6" height="3.2" rx="0.4" fill="none"/>
    <!-- Center ornament/crossguard point -->
    <circle cx="16" cy="15" r="2" fill="none"/>
    <!-- Inner accent -->
    <circle cx="16" cy="15" r="0.8" fill="currentColor" opacity="0.5"/>
  </g>
</svg>