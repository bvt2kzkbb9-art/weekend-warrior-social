<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Crossed swords - Missions (main prestige icon) -->
  <defs>
    <linearGradient id="swordPremium" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5DEB3;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#E8E8E8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C0C0C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#808080;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E5C84A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C89B3C;stop-opacity:1" />
    </linearGradient>
    <filter id="goldGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.3" />
    </filter>
  </defs>

  <!-- Left sword (main) -->
  <g>
    <!-- Blade -->
    <path d="M7 18L6 7C6 6.5 6.5 6 7 6L8 4L8.5 6C9 6 9.5 6.5 9.5 7L8.5 18"
          fill="url(#swordPremium)" stroke="currentColor" stroke-width="0.8" stroke-linejoin="round"/>

    <!-- Blade highlight (shine) -->
    <line x1="7.3" y1="8" x2="8.2" y2="17" stroke="currentColor" stroke-width="0.4" opacity="0.4"/>

    <!-- Guard -->
    <rect x="6.5" y="17" width="2.5" height="1" fill="url(#goldAccent)" stroke="currentColor" stroke-width="0.5"/>

    <!-- Grip -->
    <rect x="7" y="18.2" width="1.5" height="2" rx="0.3" fill="url(#goldAccent)" stroke="currentColor" stroke-width="0.5"/>

    <!-- Pommel -->
    <circle cx="7.75" cy="20.3" r="0.5" fill="url(#goldAccent)" stroke="currentColor" stroke-width="0.4"/>
  </g>

  <!-- Right sword (secondary) -->
  <g>
    <!-- Blade -->
    <path d="M17 18L18 7C18 6.5 17.5 6 17 6L16 4L15.5 6C15 6 14.5 6.5 14.5 7L15.5 18"
          fill="url(#swordPremium)" stroke="currentColor" stroke-width="0.8" stroke-linejoin="round"/>

    <!-- Blade highlight -->
    <line x1="16.7" y1="8" x2="15.8" y2="17" stroke="currentColor" stroke-width="0.4" opacity="0.4"/>

    <!-- Guard -->
    <rect x="15" y="17" width="2.5" height="1" fill="url(#goldAccent)" stroke="currentColor" stroke-width="0.5"/>

    <!-- Grip -->
    <rect x="15.5" y="18.2" width="1.5" height="2" rx="0.3" fill="url(#goldAccent)" stroke="currentColor" stroke-width="0.5"/>

    <!-- Pommel -->
    <circle cx="16.25" cy="20.3" r="0.5" fill="url(#goldAccent)" stroke="currentColor" stroke-width="0.4"/>
  </g>

  <!-- Center circle (X intersection point) -->
  <circle cx="12" cy="12" r="1.5" fill="none" stroke="url(#goldAccent)" stroke-width="0.8" opacity="0.8" filter="url(#goldGlow)"/>

  <!-- Inner glow -->
  <circle cx="12" cy="12" r="0.8" fill="currentColor" opacity="0.3"/>

  <!-- Decorative corner sparkles -->
  <circle cx="10" cy="10" r="0.3" fill="currentColor" opacity="0.5"/>
  <circle cx="14" cy="10" r="0.3" fill="currentColor" opacity="0.5"/>
  <circle cx="10" cy="14" r="0.3" fill="currentColor" opacity="0.5"/>
  <circle cx="14" cy="14" r="0.3" fill="currentColor" opacity="0.5"/>
</svg>