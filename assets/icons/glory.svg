<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Royal crown - Glory icon -->
  <defs>
    <linearGradient id="crownGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#E5C84A;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B7B1F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="jewel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4444;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#CC0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#880000;stop-opacity:1" />
    </linearGradient>
    <filter id="crownShine">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.4" />
    </filter>
  </defs>

  <!-- Crown band -->
  <path d="M5 14C5 14 5 16 6 17C7 18 8 18 9 17.5L9 14"
        fill="url(#crownGold)" stroke="currentColor" stroke-width="0.8" stroke-linejoin="round"/>

  <path d="M9 14L9 17.5L12 19L15 17.5L15 14"
        fill="url(#crownGold)" stroke="currentColor" stroke-width="0.8" stroke-linejoin="round"/>

  <path d="M15 14L15 17.5C16 18 17 18 18 17C19 16 19 14 19 14"
        fill="url(#crownGold)" stroke="currentColor" stroke-width="0.8" stroke-linejoin="round"/>

  <!-- Crown points -->
  <!-- Left point -->
  <path d="M7 14L6.5 8C6.5 7 7 6 8 6L9 8L9 14"
        fill="url(#crownGold)" stroke="currentColor" stroke-width="0.7" stroke-linejoin="round"/>

  <!-- Center point (highest) -->
  <path d="M12 14L11.5 4C11.5 3 12 2 13 2L12.5 4L12 14"
        fill="url(#crownGold)" stroke="currentColor" stroke-width="0.7" stroke-linejoin="round"/>
  <path d="M12 14L12.5 4L13 2L13.5 4L13 14"
        fill="url(#crownGold)" stroke="currentColor" stroke-width="0.7" stroke-linejoin="round"/>

  <!-- Right point -->
  <path d="M17 14L17.5 8L18 6C19 6 19.5 7 19.5 8L19 14"
        fill="url(#crownGold)" stroke="currentColor" stroke-width="0.7" stroke-linejoin="round"/>

  <!-- Jewels on band -->
  <circle cx="8" cy="15.5" r="0.7" fill="url(#jewel)" stroke="currentColor" stroke-width="0.4"/>
  <circle cx="12" cy="16" r="0.8" fill="url(#jewel)" stroke="currentColor" stroke-width="0.4"/>
  <circle cx="16" cy="15.5" r="0.7" fill="url(#jewel)" stroke="currentColor" stroke-width="0.4"/>

  <!-- Jewels on points -->
  <circle cx="8" cy="8" r="0.6" fill="url(#jewel)" stroke="currentColor" stroke-width="0.3"/>
  <circle cx="12" cy="5" r="0.7" fill="url(#jewel)" stroke="currentColor" stroke-width="0.3"/>
  <circle cx="16" cy="8" r="0.6" fill="url(#jewel)" stroke="currentColor" stroke-width="0.3"/>

  <!-- Crown shine -->
  <ellipse cx="10" cy="10" rx="2" ry="2.5" fill="currentColor" opacity="0.2" filter="url(#crownShine)"/>
</svg>