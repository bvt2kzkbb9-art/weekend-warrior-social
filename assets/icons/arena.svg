<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shield with crossed swords - Arena icon -->
  <defs>
    <linearGradient id="shieldGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E5C84A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B7B1F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="swordSteel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B8B8B8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#808080;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield body -->
  <path d="M7 4C7 4 6 6 6 8C6 12 8 16 12 18C16 16 18 12 18 8C18 6 17 4 17 4C12.5 5 7.5 5 7 4Z"
        fill="url(#shieldGold)" stroke="currentColor" stroke-width="0.8" stroke-linejoin="round"/>

  <!-- Shield border/rim -->
  <path d="M7 4C12.5 5 7.5 5 17 4"
        stroke="currentColor" stroke-width="0.7" fill="none" stroke-linecap="round"/>

  <!-- Left sword -->
  <line x1="8" y1="9" x2="14" y2="15" stroke="url(#swordSteel)" stroke-width="0.9" stroke-linecap="round" filter="url(#metalShine)"/>
  <path d="M14 15L15 16L13.5 15.5"
        fill="currentColor" stroke="currentColor" stroke-width="0.5"/>

  <!-- Right sword -->
  <line x1="16" y1="9" x2="10" y2="15" stroke="url(#swordSteel)" stroke-width="0.9" stroke-linecap="round"/>
  <path d="M10 15L9 16L10.5 15.5"
        fill="currentColor" stroke="currentColor" stroke-width="0.5"/>

  <!-- Sword guards -->
  <circle cx="12" cy="12" r="0.8" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.7"/>

  <!-- Shield shine -->
  <ellipse cx="10" cy="9" rx="1.5" ry="2" fill="currentColor" opacity="0.25"/>

  <!-- Center crest -->
  <circle cx="12" cy="11" r="0.5" fill="currentColor" opacity="0.5"/>
</svg>