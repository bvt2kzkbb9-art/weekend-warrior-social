<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Warrior helmet for profile -->
  <defs>
    <linearGradient id="helmetSteel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A89B6F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7A6B4E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main helmet dome -->
  <path d="M7 10C7 7 9.5 5 12 5C14.5 5 17 7 17 10L17 12C17 13 16.5 14 16 14.5L8 14.5C7.5 14 7 13 7 12Z"
        fill="url(#helmetSteel)" stroke="currentColor" stroke-width="0.8" stroke-linejoin="round"/>

  <!-- Face opening -->
  <path d="M9 11C9 10.5 10 9.5 12 9.5C14 9.5 15 10.5 15 11"
        stroke="currentColor" stroke-width="0.7" fill="none" stroke-linecap="round"/>

  <!-- Nose guard/crest -->
  <path d="M12 9.5L12 13L11.5 13L12.5 13"
        stroke="currentColor" stroke-width="0.7" fill="none" stroke-linecap="round"/>

  <!-- Left cheek piece -->
  <path d="M9 11L8 12L8.5 13.5"
        stroke="currentColor" stroke-width="0.7" fill="none" stroke-linecap="round"/>

  <!-- Right cheek piece -->
  <path d="M15 11L16 12L15.5 13.5"
        stroke="currentColor" stroke-width="0.7" fill="none" stroke-linecap="round"/>

  <!-- Plume/crest top decoration -->
  <path d="M11.5 5L12 3.5L12.5 5"
        stroke="currentColor" stroke-width="0.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom rim (metallic edge) -->
  <path d="M8 14.5L16 14.5"
        stroke="currentColor" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Metallic highlight -->
  <ellipse cx="10" cy="8" rx="1.2" ry="1.5" fill="currentColor" opacity="0.3"/>

  <!-- Eye holes (subtle) -->
  <circle cx="10.5" cy="10.5" r="0.4" fill="currentColor" opacity="0.4"/>
  <circle cx="13.5" cy="10.5" r="0.4" fill="currentColor" opacity="0.4"/>
</svg>