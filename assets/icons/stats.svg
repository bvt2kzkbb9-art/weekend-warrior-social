<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Statistics/Bar Chart -->
  <g stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Baseline -->
    <line x1="6" y1="24" x2="26" y2="24"/>
    <!-- Bar 1 (short) -->
    <rect x="8" y="18" width="3.5" height="6" rx="0.4"/>
    <!-- Bar 2 (medium) -->
    <rect x="14" y="13" width="3.5" height="11" rx="0.4"/>
    <!-- Bar 3 (tall) -->
    <rect x="20" y="8" width="3.5" height="16" rx="0.4"/>
  </g>
</svg>
