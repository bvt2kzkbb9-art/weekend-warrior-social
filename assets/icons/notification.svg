<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Metallic bell for medieval notifications -->
  <defs>
    <linearGradient id="bellGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E5C84A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C89B3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6914;stop-opacity:1" />
    </linearGradient>
    <filter id="metalShine">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" />
    </filter>
  </defs>

  <!-- Bell body -->
  <path d="M7 8C7 8 6 10 6 12C6 14 6.5 16 8 17.5L8 18C8 19 8.9 20 10 20L14 20C15.1 20 16 19 16 18L16 17.5C17.5 16 18 14 18 12C18 10 17 8 17 8Z"
        fill="url(#bellGold)" stroke="currentColor" stroke-width="0.8" stroke-linejoin="round"/>

  <!-- Bell rim (metallic edge) -->
  <path d="M7 8C7 8 7.5 7.5 8 7C8.5 6.5 9.5 6.5 10 7C10.5 7.5 11 7.5 12 7.5C13 7.5 13.5 7.5 14 7C14.5 6.5 15.5 6.5 16 7C16.5 7.5 17 8 17 8"
        stroke="currentColor" stroke-width="0.7" fill="none" stroke-linecap="round"/>

  <!-- Bell highlight (shine) -->
  <ellipse cx="10" cy="11" rx="1.5" ry="2.5" fill="currentColor" opacity="0.3" filter="url(#metalShine)"/>

  <!-- Clapper (tongue) inside -->
  <circle cx="12" cy="15" r="1" fill="currentColor" opacity="0.6"/>

  <!-- Top loop/mount -->
  <path d="M10 7C10 6 10.8 5 12 5C13.2 5 14 6 14 7"
        stroke="currentColor" stroke-width="0.8" fill="none" stroke-linecap="round"/>
</svg>