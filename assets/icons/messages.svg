<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Elegant parchment scroll for messages -->
  <defs>
    <linearGradient id="parchmentGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E5C84A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C89B3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A67B2E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Parchment roll bottom -->
  <path d="M4 15C3 15 3 16 4 16L20 16C21 16 21 15 20 15Z"
        fill="url(#parchmentGold)" stroke="currentColor" stroke-width="0.8"/>

  <!-- Parchment roll top -->
  <path d="M4 9C3 9 3 8 4 8L20 8C21 8 21 9 20 9Z"
        fill="url(#parchmentGold)" stroke="currentColor" stroke-width="0.8"/>

  <!-- Parchment body -->
  <path d="M5 8L5 16C5 17 5.5 18 6.5 18.5L7 19L17 19L17.5 18.5C18.5 18 19 17 19 16L19 8"
        fill="url(#parchmentGold)" stroke="currentColor" stroke-width="0.8" stroke-linejoin="round"/>

  <!-- Parchment texture lines -->
  <line x1="7" y1="10" x2="17" y2="10" stroke="currentColor" stroke-width="0.5" opacity="0.4"/>
  <line x1="6.5" y1="12" x2="17.5" y2="12" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
  <line x1="7" y1="14" x2="16" y2="14" stroke="currentColor" stroke-width="0.5" opacity="0.4"/>

  <!-- Metallic shine on parchment -->
  <ellipse cx="10" cy="11.5" rx="2" ry="1.5" fill="currentColor" opacity="0.25"/>

  <!-- Wax seal (decorative) -->
  <circle cx="12" cy="17.5" r="1.2" fill="currentColor" opacity="0.5"/>
  <circle cx="12" cy="17.5" r="0.8" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.6"/>
</svg>