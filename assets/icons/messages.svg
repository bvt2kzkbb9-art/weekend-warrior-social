<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Premium Parchment Scroll -->
  <g stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top roll -->
    <path d="M 8 9 Q 6 9 6 11 L 26 11 Q 26 9 24 9"/>
    <!-- Bottom roll -->
    <path d="M 8 23 Q 6 23 6 21 L 26 21 Q 26 23 24 23"/>
    <!-- Left edge -->
    <line x1="8" y1="9" x2="8" y2="23"/>
    <!-- Right edge -->
    <line x1="24" y1="9" x2="24" y2="23"/>
    <!-- Diagonal corner ribbons (seal effect) -->
    <path d="M 12 9 L 10 7 Q 9 6 10.5 6 L 12 7.5"/>
    <path d="M 20 9 L 22 7 Q 23 6 21.5 6 L 20 7.5"/>
    <!-- Wax seal bottom center -->
    <circle cx="16" cy="22.5" r="2" fill="none"/>
    <circle cx="16" cy="22.5" r="0.8" fill="currentColor" opacity="0.7"/>
  </g>
</svg>