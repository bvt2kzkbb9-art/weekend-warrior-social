<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rankings/Leaderboard -->
  <g stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Podium step 1 (first place) -->
    <path d="M 12 10 L 12 22 L 20 22 L 20 10" fill="none"/>
    <!-- Medal/first place indicator on top -->
    <circle cx="16" cy="8" r="2" fill="none"/>
    <!-- Step 2 (second place) -->
    <rect x="6" y="15" width="4" height="7" rx="0.5"/>
    <!-- Medal -->
    <circle cx="8" cy="13" r="1.5" fill="none"/>
    <!-- Step 3 (third place) -->
    <rect x="22" y="18" width="4" height="4" rx="0.5"/>
    <!-- Medal -->
    <circle cx="24" cy="16" r="1.2" fill="none"/>
  </g>
</svg>
