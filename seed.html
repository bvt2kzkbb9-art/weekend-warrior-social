<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Seed Firestore</title>
</head>
<body>

<h2>Dodawanie quizów...</h2>

<script type="module">
  import { db } from './js/firebase.js';
  import { collection, addDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  async function seed() {
    const quiz = {
      title: "Matematyka Hazardu",
      category: "hazard",
      maxQuestions: 5,
      questions: [
        {
          question: "Czy po 10 przegranych z rzędu szansa wygranej wzrasta?",
          answers: ["Tak", "Nie"],
          correctIndex: 1,
          xp: 10,
          explanation: "Każde losowanie jest niezależne."
        },
        {
          question: "Kto ma przewagę w kasynie?",
          answers: ["Gracz", "Kasyno"],
          correctIndex: 1,
          xp: 10,
          explanation: "Kasyno ma matematyczną przewagę."
        }
      ]
    };

    await addDoc(collection(db, "quizzes"), quiz);
    document.body.innerHTML = "<h2>🔥 Quiz dodany do Firestore!</h2>";
  }

  seed();
</script>

</body>
</html>
