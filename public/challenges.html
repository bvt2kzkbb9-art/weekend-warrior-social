<!-- Content -->
<main class="content-area" style="position:relative;z-index:1;">
  <div class="challenges-page">

    <div class="challenges-header">
      <div style="font-family:var(--font-display);font-size:clamp(1.125rem,4vw,1.75rem);font-weight:900;
           letter-spacing:.1em;color:var(--gold-400);text-shadow:0 0 30px var(--gold-glow-lg);margin-bottom:.2rem;">
        🐍 Misje Areny
      </div>
      <div class="label-caps" style="margin-bottom:.875rem;">Wybierz swoją próbę, Wojowniku</div>
    </div>

    <!-- Challenges grid -->
    <div id="challenges-grid" class="challenges-grid">
      <!-- filled by JS -->
    </div>

    <div style="height:1rem;"></div>
  </div>
</main>

<!-- ══════════════════════════════════════════
     CHALLENGE MODAL
══════════════════════════════════════════ -->
<div id="ch-modal-backdrop" class="ch-modal-backdrop hidden">
  <div class="ch-modal" id="ch-modal">
    <img id="modal-img" src="" alt="" class="ch-modal-img" style="display:none;"/>
    <div class="ch-modal-body">
      <div id="modal-badge" class="ch-modal-badge"></div>
      <div id="modal-title" class="ch-modal-title"></div>
      <div id="modal-desc" class="ch-modal-desc"></div>
      <div class="ch-modal-stats">
        <div class="ch-modal-stat">
          <span id="modal-xp" class="ch-modal-stat-val">+0 XP</span>
          <span class="ch-modal-stat-label">Nagroda</span>
        </div>
        <div class="ch-modal-stat">
          <span id="modal-diff" class="ch-modal-stat-val">—</span>
          <span class="ch-modal-stat-label">Poziom</span>
        </div>
        <div class="ch-modal-stat">
          <span id="modal-cat" class="ch-modal-stat-val">—</span>
          <span class="ch-modal-stat-label">Kategoria</span>
        </div>
      </div>
      <div class="ch-modal-actions">
        <button id="modal-quiz-btn" class="rpg-btn rpg-btn-gold" style="flex:1;">🧠 Przystąp do Quizu</button>
        <button id="modal-close-btn" class="rpg-btn rpg-btn-outline" style="flex:1;">✖ Zamknij</button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     QUIZ OVERLAY — PRÓBA WOJOWNIKA
══════════════════════════════════════════ -->
<div id="quiz-overlay" class="quiz-overlay hidden">
  <div class="quiz-container">

    <!-- Quiz header -->
    <div class="quiz-header">
      <span class="quiz-eyebrow">⚔ Próba Wojownika</span>
      <div id="quiz-ch-title" class="quiz-title">—</div>
      <div class="quiz-progress-row">
        <div class="quiz-progress-track">
          <div id="quiz-progress-fill" class="quiz-progress-fill" style="width:0%;"></div>
        </div>
        <span id="quiz-progress-label" class="quiz-progress-label">0 / 0</span>
      </div>
    </div>

    <!-- Question parchment -->
    <div class="quiz-parchment" id="quiz-parchment-wrap">
      <div id="quiz-q-num" class="quiz-q-num">Pytanie 1</div>
      <div id="quiz-question" class="quiz-question">—</div>
    </div>

    <!-- Answers -->
    <div id="quiz-answers" class="quiz-answers"></div>

    <!-- Feedback -->
    <div id="quiz-feedback" class="quiz-feedback hidden"></div>

    <!-- Result -->
    <div id="quiz-result" class="quiz-result hidden">
      <div id="quiz-result-icon" class="quiz-result-icon">🏆</div>
      <div id="quiz-result-title" class="quiz-result-title">—</div>
      <div id="quiz-result-msg" class="quiz-result-message">—</div>
      <div id="quiz-xp-earned" class="quiz-xp-earned">⭐ +0 XP</div>
      <div style="display:flex;gap:.625rem;justify-content:center;flex-wrap:wrap;margin-top:.5rem;">
        <button id="quiz-back-btn" class="rpg-btn rpg-btn-gold">⚔ Wróć do Misji</button>
        <button id="quiz-retry-btn" class="rpg-btn rpg-btn-outline" style="display:none;">🔄 Spróbuj ponownie</button>
      </div>
    </div>

  </div>
</div>

<!-- Level-up overlay -->
<div id="level-up-overlay" class="level-up-overlay hidden">
  <div class="level-up-burst">🎉 AWANS!</div>
  <div id="level-up-text" class="level-up-burst" style="font-size:clamp(1.25rem,4vw,2rem);"></div>
  <div class="level-up-sub">Nowy poziom osiągnięty, Wojowniku!</div>
</div>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>
</body>
