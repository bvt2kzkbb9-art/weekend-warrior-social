<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050506" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com/firebasejs/; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://firestore.googleapis.com https://firebase.googleapis.com https://res.cloudinary.com;">
  <meta name="description" content="Weekend Warrior Social — Osiągnięcia" />
  <title>Osiągnięcia — Weekend Warrior Social</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/design-system.css" />
</head>
<body>

<div class="app-layout">

  <!-- FIXED TOP HEADER -->
  <header class="app-header" role="banner">
    <div class="app-header-left">
      <span class="app-header-logo">⚔ WWS</span>
    </div>
    <div class="app-header-right">
      <button class="header-icon-btn" id="notifications-btn" aria-label="Powiadomienia">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <div class="badge-dot hidden"></div>
      </button>
      <button class="header-icon-btn" id="messages-btn" aria-label="Wiadomości">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <div class="badge-dot hidden"></div>
      </button>
      <button class="header-icon-btn" id="profile-btn" aria-label="Profil">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- SCROLLABLE CONTENT AREA -->
  <main class="app-content" role="main">
    <div class="content-area page">

      <!-- Header -->
      <div class="achievements-header">
        <div class="achievements-title">🏆 Osiągnięcia</div>
        <div class="achievements-subtitle" id="ach-summary-sub">Ładowanie...</div>
      </div>

      <!-- ── SKELETON ── -->
      <div id="ach-skeleton">
        <div class="ach-summary-card">
          <div class="skeleton" style="width:48px;height:48px;border-radius:8px;flex-shrink:0;"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:0.5rem;">
            <div class="skeleton" style="height:28px;width:80px;border-radius:4px;"></div>
            <div class="skeleton" style="height:12px;width:150px;border-radius:4px;"></div>
            <div class="skeleton" style="height:6px;width:100%;border-radius:3px;margin-top:0.25rem;"></div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-top:1rem;">
          <div class="skeleton" style="height:110px;border-radius:var(--r-lg);"></div>
          <div class="skeleton" style="height:110px;border-radius:var(--r-lg);"></div>
          <div class="skeleton" style="height:110px;border-radius:var(--r-lg);"></div>
          <div class="skeleton" style="height:110px;border-radius:var(--r-lg);"></div>
          <div class="skeleton" style="height:110px;border-radius:var(--r-lg);"></div>
          <div class="skeleton" style="height:110px;border-radius:var(--r-lg);"></div>
        </div>
      </div>

      <!-- ── CONTENT ── -->
      <div id="achievements-content" class="hidden">

        <!-- Summary card -->
        <div class="ach-summary-card">
          <div class="ach-summary-icon">🏆</div>
          <div class="ach-summary-info">
            <div class="ach-summary-count">
              <span id="ach-count">0</span>
              <span style="font-size:1rem;color:var(--text-muted);font-weight:500;">
                / <span id="ach-total">0</span>
              </span>
            </div>
            <div class="ach-summary-label">Odblokowanych osiągnięć</div>
            <div class="ach-summary-bar-wrap">
              <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.25rem;">
                <div class="progress-track" style="flex:1;">
                  <div id="ach-summary-bar" class="progress-fill" style="width:0%;"></div>
                </div>
                <span id="ach-summary-pct"
                      style="font-size:0.75rem;font-weight:700;color:var(--gold);min-width:30px;text-align:right;">
                  0%
                </span>
              </div>
            </div>
          </div>
        </div>

        <!-- Achievements by category -->
        <div id="achievements-container"></div>

        <!-- Bottom padding -->
        <div style="height:1rem;"></div>

      </div>

    </div>
  </main>

  <!-- FIXED BOTTOM NAVIGATION - Note: Achievements not in main nav, accessible from Profile -->
  <nav class="app-nav" role="navigation" aria-label="Główna nawigacja">
    <a href="index.html" class="nav-item" data-page="arena">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="1"/><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/>
      </svg>
      <span>Arena</span>
    </a>
    <a href="feed.html" class="nav-item" data-page="kroniki">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>Kroniki</span>
    </a>
    <a href="challenges.html" class="nav-item" data-page="misje">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v20M2 12h20"/>
        <circle cx="12" cy="12" r="1"/>
      </svg>
      <span>Misje</span>
    </a>
    <a href="ranking.html" class="nav-item" data-page="chwala">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
        <polyline points="17 6 23 6 23 12"/>
      </svg>
      <span>Chwała</span>
    </a>
    <a href="profile.html" class="nav-item" data-page="bohater">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>Bohater</span>
    </a>
  </nav>

</div>

<script type="module">
  import { initAchievementsPage } from './js/achievements.js';

  document.getElementById('profile-btn').addEventListener('click', () => {
    window.location.href = 'profile.html';
  });

  document.getElementById('messages-btn').addEventListener('click', () => {
    window.location.href = 'messages.html';
  });

  initAchievementsPage();
</script>

<!-- Service Worker Registration -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('[SW] Registered:', reg.scope))
        .catch(err => console.warn('[SW] Registration failed:', err));
    });
  }
</script>

</body>
</html>
