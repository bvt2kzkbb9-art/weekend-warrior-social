<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#06050A"/>
  <title>Komnata Chwały — Weekend Warrior Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="css/style.css"/>
  
  <style>
    .ach-page { max-width: 680px; margin: 0 auto; padding: 0 .875rem; }

    .ach-section-title {
      font-family: var(--font-heading);
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--gold-700);
      padding: .875rem 0 .5rem;
      display: flex;
      align-items: center;
      gap: .625rem;
    }
    .ach-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border-dim), transparent);
    }

    .ach-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: .625rem;
      margin-bottom: .25rem;
    }

    .ach-card {
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      border-radius: var(--r-lg);
      padding: 1rem .75rem .875rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .375rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: all var(--dur-base) var(--ease-out);
      cursor: default;
      animation: card-entrance .4s var(--ease-out) both;
    }
    .ach-card.unlocked {
      border-color: var(--border-gold);
      background: linear-gradient(135deg, rgba(212,175,55,.07) 0%, var(--bg-card) 60%);
    }
    .ach-card.unlocked:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(212,175,55,.18);
      border-color: var(--border-active);
    }
    .ach-card.locked { opacity: .38; filter: grayscale(1); }
    .ach-card.unlocked::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold-700), transparent);
    }

    .ach-icon {
      font-size: 2rem;
      line-height: 1;
      filter: drop-shadow(0 0 8px rgba(212,175,55,.3));
    }
    .ach-card.locked .ach-icon { filter: none; }

    .ach-name {
      font-family: var(--font-heading);
      font-size: .525rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--gold-500);
      line-height: 1.3;
    }
    .ach-card.locked .ach-name { color: var(--text-faint); }

    .ach-desc {
      font-family: var(--font-body);
      font-size: .75rem;
      color: var(--text-muted);
      font-style: italic;
      line-height: 1.4;
    }

    .ach-xp-tag {
      display: inline-flex;
      align-items: center;
      gap: .25rem;
      background: rgba(212,175,55,.1);
      border: 1px solid rgba(212,175,55,.2);
      border-radius: 12px;
      padding: 2px 8px;
      font-family: var(--font-heading);
      font-size: .45rem;
      font-weight: 700;
      color: var(--gold-500);
      margin-top: .1rem;
    }
    .ach-card.locked .ach-xp-tag { opacity: 0; }

    .ach-check {
      position: absolute;
      top: .5rem; right: .5rem;
      font-size: .75rem;
      line-height: 1;
      opacity: .8;
    }

    /* Progress summary bar */
    .ach-summary {
      background: var(--bg-panel);
      border: 1px solid var(--border-panel);
      border-radius: var(--r-lg);
      padding: 1rem 1.125rem;
      margin-bottom: .875rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .ach-summary-icon { font-size: 1.75rem; flex-shrink: 0; }
    .ach-summary-info { flex: 1; min-width: 0; }
    .ach-summary-title {
      font-family: var(--font-heading);
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .08em;
      color: var(--text-bright);
      margin-bottom: .25rem;
    }
    .ach-summary-track {
      height: 8px;
      background: rgba(212,175,55,.08);
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid rgba(212,175,55,.1);
      margin-bottom: .25rem;
    }
    .ach-summary-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-700), var(--gold-400), var(--gold-300));
      border-radius: 4px;
      box-shadow: 0 0 10px rgba(212,175,55,.4);
      transition: width 1.2s var(--ease-out);
    }
    .ach-summary-label {
      font-family: var(--font-heading);
      font-size: .5rem;
      color: var(--text-muted);
      letter-spacing: .08em;
    }
    .ach-summary-count {
      font-family: var(--font-heading);
      font-size: 1.25rem;
      font-weight: 900;
      color: var(--gold-400);
      text-shadow: 0 0 20px var(--gold-glow);
      line-height: 1;
      text-align: center;
      flex-shrink: 0;
    }
    .ach-summary-count small {
      display: block;
      font-size: .45rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: .1rem;
    }
  </style>
</head>

<!-- Nav -->


<main class="content-area" style="position:relative;z-index:1;">
  <div class="ach-page">

    <!-- Header -->
    <div style="text-align:center;padding:1.25rem 0 .875rem;">
      <div style="font-family:var(--font-display);font-size:clamp(1.125rem,4vw,1.75rem);
           font-weight:900;letter-spacing:.1em;color:var(--gold-400);
           text-shadow:0 0 30px var(--gold-glow-lg);margin-bottom:.2rem;">🏅 Komnata Chwały</div>
      <div class="label-caps">Odznaki i osiągnięcia Twojego wojownika</div>
    </div>

    <!-- Progress summary -->
    <div id="ach-summary" class="ach-summary">
      <div class="ach-summary-icon">🛡</div>
      <div class="ach-summary-info">
        <div class="ach-summary-title">Twój postęp w Arenie</div>
        <div class="ach-summary-track">
          <div id="ach-progress-fill" class="ach-summary-fill" style="width:0%;"></div>
        </div>
        <div id="ach-progress-label" class="ach-summary-label">Ładowanie...</div>
      </div>
      <div class="ach-summary-count">
        <span id="ach-earned-num">0</span>
        <small>odblok.</small>
      </div>
    </div>

    <!-- Skeleton -->
    <div id="ach-skeleton">
      <div class="ach-section-title">Ładowanie...</div>
      <div class="ach-grid">
        <div class="ach-card locked"><div class="skeleton" style="width:48px;height:48px;border-radius:50%;margin-bottom:.25rem;"></div><div class="skeleton" style="height:10px;width:70%;border-radius:3px;margin-bottom:.25rem;"></div><div class="skeleton" style="height:9px;width:90%;border-radius:3px;"></div></div>
        <div class="ach-card locked"><div class="skeleton" style="width:48px;height:48px;border-radius:50%;margin-bottom:.25rem;"></div><div class="skeleton" style="height:10px;width:65%;border-radius:3px;margin-bottom:.25rem;"></div><div class="skeleton" style="height:9px;width:85%;border-radius:3px;"></div></div>
        <div class="ach-card locked"><div class="skeleton" style="width:48px;height:48px;border-radius:50%;margin-bottom:.25rem;"></div><div class="skeleton" style="height:10px;width:75%;border-radius:3px;margin-bottom:.25rem;"></div><div class="skeleton" style="height:9px;width:80%;border-radius:3px;"></div></div>
        <div class="ach-card locked"><div class="skeleton" style="width:48px;height:48px;border-radius:50%;margin-bottom:.25rem;"></div><div class="skeleton" style="height:10px;width:60%;border-radius:3px;margin-bottom:.25rem;"></div><div class="skeleton" style="height:9px;width:88%;border-radius:3px;"></div></div>
        <div class="ach-card locked"><div class="skeleton" style="width:48px;height:48px;border-radius:50%;margin-bottom:.25rem;"></div><div class="skeleton" style="height:10px;width:72%;border-radius:3px;margin-bottom:.25rem;"></div><div class="skeleton" style="height:9px;width:82%;border-radius:3px;"></div></div>
        <div class="ach-card locked"><div class="skeleton" style="width:48px;height:48px;border-radius:50%;margin-bottom:.25rem;"></div><div class="skeleton" style="height:10px;width:68%;border-radius:3px;margin-bottom:.25rem;"></div><div class="skeleton" style="height:9px;width:90%;border-radius:3px;"></div></div>
      </div>
    </div>

    <!-- Achievement sections (filled by JS) -->
    <div id="ach-sections"></div>

<!-- Unlock toast (custom overlay for achievement unlock) -->
<div id="unlock-overlay" class="level-up-overlay hidden">

  <div id="unlock-name" class="level-up-burst" style="font-size:clamp(1rem,3vw,1.5rem);margin-top:.5rem;"></div>
  <div class="level-up-sub">Nowa odznaka odblokowana!</div>
</div>

<script type="module">
  import { checkAuth, logout } from './js/auth.js';
  import { db, COL } from './js/firebase.js';
  import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  injectLightModeCSS();
  initTheme();

  document.getElementById('logout-btn').addEventListener('click', logout);

  /**
   * Źródło prawdy: dokładnie te same IDs co achievements.js ACHIEVEMENTS
   * Pole `check` pozwala wykryć osiągnięcia lokalnie (bez czekania na backend)
   * nawet jeśli nie zostały jeszcze zapisane w Firestore.
   */
  const ALL_ACHIEVEMENTS = [
    // ── Aktywność ──────────────────────────────────────────
    { id:'first_post',      cat:'Aktywność',  icon:'📝', name:'Pierwsze słowo',           desc:'Opublikuj swój pierwszy post na arenie.',        xp:  50, check: d => (d.postsCount    ?? 0) >= 1  },
    { id:'five_posts',      cat:'Aktywność',  icon:'✍️', name:'Narrator areny',           desc:'Opublikuj 5 postów.',                             xp: 100, check: d => (d.postsCount    ?? 0) >= 5  },
    { id:'ten_posts',       cat:'Aktywność',  icon:'📖', name:'Kronikarz bitew',          desc:'Opublikuj 10 postów.',                            xp: 150, check: d => (d.postsCount    ?? 0) >= 10 },
    { id:'fifty_posts',     cat:'Aktywność',  icon:'🗡️', name:'Głos Areny',              desc:'Opublikuj 50 postów.',                            xp: 400, check: d => (d.postsCount    ?? 0) >= 50 },
    { id:'first_comment',   cat:'Aktywność',  icon:'💬', name:'Pierwszy głos',           desc:'Dodaj swój pierwszy komentarz.',                  xp:  30, check: d => (d.commentsCount ?? 0) >= 1  },
    { id:'twenty_comments', cat:'Aktywność',  icon:'🗣️', name:'Mówca areny',            desc:'Dodaj 20 komentarzy.',                            xp: 150, check: d => (d.commentsCount ?? 0) >= 20 },
    // ── Społeczność ─────────────────────────────────────────
    { id:'first_like',      cat:'Społeczność', icon:'❤️', name:'Pierwsze uznanie',        desc:'Otrzymaj pierwszego lajka.',                      xp:  20, check: d => (d.likesReceived ?? 0) >= 1  },
    { id:'ten_likes',       cat:'Społeczność', icon:'🔥', name:'Wojownik popularny',      desc:'Otrzymaj 10 lajków.',                             xp:  80, check: d => (d.likesReceived ?? 0) >= 10 },
    { id:'fifty_likes',     cat:'Społeczność', icon:'⭐', name:'Gwiazda areny',           desc:'Otrzymaj 50 lajków.',                             xp: 200, check: d => (d.likesReceived ?? 0) >= 50 },
    // ── Rangi ───────────────────────────────────────────────
    { id:'rank_warrior',    cat:'Rangi',      icon:'🥈', name:'Warrior',                  desc:'Osiągnij rangę Warrior (500 pkt).',               xp: 100, check: d => (d.points        ?? 0) >= 500   },
    { id:'rank_champion',   cat:'Rangi',      icon:'🥇', name:'Champion',                 desc:'Osiągnij rangę Champion (2000 pkt).',             xp: 300, check: d => (d.points        ?? 0) >= 2000  },
    { id:'rank_legend',     cat:'Rangi',      icon:'💎', name:'Legend',                   desc:'Osiągnij rangę Legend (10000 pkt).',              xp:1000, check: d => (d.points        ?? 0) >= 10000 },
    // ── Specjalne ───────────────────────────────────────────
    { id:'golden_circle',   cat:'Specjalne',  icon:'🌕', name:'Władca Złotego Kręgu',    desc:'Zdobądź 1000 punktów XP.',                        xp: 150, check: d => (d.points        ?? 0) >= 1000  },
    { id:'light_guardian',  cat:'Specjalne',  icon:'🌟', name:'Strażnik Światła',        desc:'Zdobądź 3000 punktów XP.',                        xp: 300, check: d => (d.points        ?? 0) >= 3000  },
    { id:'dragon_slayer',   cat:'Specjalne',  icon:'🐉', name:'Pogromca Dwugłowego Węża',desc:'Zdobądź 5000 punktów XP.',                        xp: 500, check: d => (d.points        ?? 0) >= 5000  },
    { id:'two_worlds',      cat:'Specjalne',  icon:'⚔️', name:'Rycerz Dwóch Światów',   desc:'Zdobądź 7500 punktów XP.',                        xp: 750, check: d => (d.points        ?? 0) >= 7500  },
    // ── Tajemnicze (secret — pokazane jako ??? jeśli niezablokowane) ──
    { id:'golden_disc',     cat:'Tajemnicze', icon:'🏅', name:'Wezwanie na Arenę Złotego Dysku', desc:'Tajemnicze osiągnięcie. Odkryj je sam!', xp:  50, secret:true, check: d => (d.points ?? 0) >= 250 },
    { id:'chaos_serpents',  cat:'Tajemnicze', icon:'🌀', name:'Pojedynek z Wężami Chaosu',       desc:'Tajemnicze osiągnięcie. Odkryj je sam!', xp:  80, secret:true, check: d => (d.postsCount ?? 0) >= 3 && (d.commentsCount ?? 0) >= 5 },
    { id:'flower_order',    cat:'Tajemnicze', icon:'🌸', name:'Wyzwanie Kwiatowego Zakonu',      desc:'Tajemnicze osiągnięcie. Odkryj je sam!', xp: 120, secret:true, check: d => (d.likesReceived ?? 0) >= 25 },
    { id:'sun_circle',      cat:'Tajemnicze', icon:'☀️', name:'Bitwa o Krąg Słońca',            desc:'Tajemnicze osiągnięcie. Odkryj je sam!', xp: 200, secret:true, check: d => (d.points ?? 0) >= 4000 },
  ];

  const CAT_ICONS = {
    'Aktywność':'📝', 'Społeczność':'❤️', 'Rangi':'👑',
    'Specjalne':'⭐', 'Tajemnicze':'🔮',
  };

  checkAuth(async (user) => {
    injectMessengerBadge(user.uid);
    let earned = new Set();
    let userData = {};

    const skTimer = setTimeout(() => {
      const sk = document.getElementById('ach-skeleton');
      if (sk) { sk.remove(); _renderSummary(earned, userData); _renderSections(earned, userData); }
    }, 2000);

    try {
      const snap = await getDoc(doc(db, COL.USERS, user.uid));
      userData   = snap.data() || {};
      earned     = new Set(userData.achievements || []);
    } catch(e) { console.warn('[ach]', e); }

    clearTimeout(skTimer);
    const sk = document.getElementById('ach-skeleton');
    if (sk) sk.remove();
    _renderSummary(earned, userData);
    _renderSections(earned, userData);
  });

  /**
   * Zlicza jako odblokowane: obecne w earned[] LUB check() == true
   * To pozwala pokazać osiągnięcia które zostały spełnione ale
   * nie zostały jeszcze zapisane przez achievements.js (race condition).
   */
  function _isUnlocked(ach, earned, data) {
    return earned.has(ach.id) || (ach.check && ach.check(data));
  }

  function _renderSummary(earned, data) {
    const total = ALL_ACHIEVEMENTS.length;
    const count = ALL_ACHIEVEMENTS.filter(a => _isUnlocked(a, earned, data)).length;
    const pct   = Math.round((count / total) * 100);
    setTimeout(() => {
      const fill = document.getElementById('ach-progress-fill');
      if (fill) fill.style.width = pct + '%';
    }, 300);
    const label = document.getElementById('ach-progress-label');
    if (label) label.textContent = `${count} z ${total} odblokowanych · ${pct}% ukończono`;
    const num = document.getElementById('ach-earned-num');
    if (num) num.textContent = count;
  }

  function _renderSections(earned, data) {
    const container = document.getElementById('ach-sections');
    if (!container) return;
    container.innerHTML = '';

    const categories = [...new Set(ALL_ACHIEVEMENTS.map(a => a.cat))];
    categories.forEach(cat => {
      const items = ALL_ACHIEVEMENTS.filter(a => a.cat === cat);
      const section = document.createElement('div');

      const unlockedInCat = items.filter(a => _isUnlocked(a, earned, data)).length;
      section.innerHTML = `
        <div class="ach-section-title">
          ${CAT_ICONS[cat] ?? '◆'} ${cat}
          <span style="font-size:.5rem;font-weight:500;color:var(--text-muted);
                text-transform:none;letter-spacing:0;margin-left:auto;margin-right:0;">
            ${unlockedInCat}/${items.length}
          </span>
        </div>`;

      const grid = document.createElement('div');
      grid.className = 'ach-grid';

      items.forEach((ach, i) => {
        const unlocked = _isUnlocked(ach, earned, data);
        const isSecret = ach.secret && !unlocked;

        const card = document.createElement('div');
        card.className = 'ach-card ' + (unlocked ? 'unlocked' : 'locked');
        card.style.animationDelay = (i * .05) + 's';
        card.title = unlocked
          ? ach.desc
          : isSecret ? 'Tajemnicze osiągnięcie — odkryj je sam!'
          : `Zablokowane — ${ach.desc}`;

        card.innerHTML = `
          ${unlocked ? '<div class="ach-check">✅</div>' : ''}
          <div class="ach-icon">${isSecret ? '🔒' : (unlocked ? ach.icon : '🔒')}</div>
          <div class="ach-name">${isSecret ? '???' : (unlocked ? ach.name : ach.name)}</div>
          <div class="ach-desc">${isSecret ? 'Tajemnicze osiągnięcie' : (unlocked ? ach.desc : ach.desc)}</div>
          <div class="ach-xp-tag">+${ach.xp} XP</div>`;

        grid.appendChild(card);
      });

      section.appendChild(grid);
      container.appendChild(section);
    });
  }
</script>
<script type="module">
  // ── Top Bar wiring (wspólne dla wszystkich stron) ──────────────
  (async function _initTopBar() {
    try {
      const { checkAuth, getCurrentUserData } = await import('./js/auth.js');
      const { db, COL } = await import('./js/firebase.js');
      const { injectMessengerBadge } = await import('./js/messenger.js');
      const { initNotifications } = await import('./js/notifications.js');
      const { doc, getDoc } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');

      checkAuth(async (user) => {
        // Messenger badge
        injectMessengerBadge(user.uid);

        // Notifications
        initNotifications(user.uid);

        // Avatar
        try {
          const snap = await getDoc(doc(db, COL.USERS, user.uid));
          const data = snap.exists() ? snap.data() : {};
          const avEl = document.getElementById('top-bar-avatar');
          if (avEl) {
            if (data.photoURL) {
              avEl.innerHTML = `<img src="${data.photoURL}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="Avatar"/>`;
            } else {
              avEl.textContent = (data.displayName || user.displayName || 'W').charAt(0).toUpperCase();
            }
          }
          // Sync notif badge to top bar
          const _syncBadge = () => {
            const src = document.querySelector('.notif-bell-badge');
            const dst = document.getElementById('notif-top-badge');
            if (src && dst) {
              dst.textContent   = src.textContent;
              dst.style.display = src.style.display !== 'none' && src.textContent !== '0' && src.textContent !== '' ? 'flex' : 'none';
            }
          };
          const obs = new MutationObserver(_syncBadge);
          setTimeout(() => {
            const b = document.querySelector('.notif-bell-badge');
            if (b) obs.observe(b, { childList:true, attributes:true, attributeFilter:['style'] });
            _syncBadge();
          }, 800);
        } catch {}

        // Notif dropdown toggle
        document.getElementById('notif-bell-btn')?.addEventListener('click', (e) => {
          e.stopPropagation();
          document.getElementById('notif-dropdown')?.classList.toggle('hidden');
        });
        document.addEventListener('click', (e) => {
          if (!e.target.closest('#notif-bell-btn') && !e.target.closest('#notif-dropdown')) {
            document.getElementById('notif-dropdown')?.classList.add('hidden');
          }
        });
        document.getElementById('notif-mark-all')?.addEventListener('click', async () => {
          const { markAllRead } = await import('./js/notifications.js');
          await markAllRead(user.uid);
        });
      });
    } catch(e) { console.warn('[topBar]', e.message); }
  })();
</script>
</body>
</html>
