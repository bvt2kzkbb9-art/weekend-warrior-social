<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#06050A"/>
  <title>Zaprzysiężenie Wojownika — Weekend Warrior Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/rpg-theme.css"/>
  <style>
    .register-bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .register-bg::before {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 40%;
      background: linear-gradient(180deg, transparent, rgba(212,175,55,.04));
    }
    .oath-scroll {
      background: linear-gradient(135deg, rgba(28,21,9,.9), rgba(19,15,7,.95));
      border: 1px solid var(--border-gold);
      border-radius: var(--r-lg);
      padding: .875rem 1rem;
      margin: .5rem 0;
      font-family: var(--font-body);
      font-size: .875rem;
      font-style: italic;
      color: var(--text-muted);
      line-height: 1.65;
      text-align: center;
      position: relative;
    }
    .oath-scroll::before { content: '◈'; position:absolute;top:.5rem;left:.75rem;font-size:.5rem;color:var(--gold-700);opacity:.6; }
    .oath-scroll::after  { content: '◈'; position:absolute;top:.5rem;right:.75rem;font-size:.5rem;color:var(--gold-700);opacity:.6; }
    .strength-bar { height: 4px; border-radius: 2px; margin-top: .375rem; transition: width .3s; }
    .pw-hint { font-size: .625rem; font-family: var(--font-heading); letter-spacing:.06em; }
  </style>
</head>
<body>
<div class="bg-orbs" aria-hidden="true"></div>
<div class="register-bg" aria-hidden="true"></div>
<div class="particles" aria-hidden="true">
  <div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div>
  <div class="particle"></div>
</div>

<div class="auth-page" style="position:relative;z-index:1;padding:1rem;">
  <div class="auth-card" style="max-width:440px;">

    <div class="auth-header">
      <span style="font-size:1.75rem;display:block;text-align:center;margin-bottom:.75rem;">🛡</span>
      <div class="auth-brand">Zaprzysiężenie</div>
      <div class="auth-subtitle">Wojownika · Weekend Warrior Social</div>
    </div>

    <div class="auth-form" id="register-form">
      <div class="oath-scroll">
        Przysięgam walczyć z honorem,<br>
        mierzyć siły na zamiary<br>
        i nigdy nie porzucać Areny.
      </div>

      <div class="form-group">
        <label class="form-label" for="display-name">⚔ Imię Wojownika</label>
        <input type="text" id="display-name" class="form-input"
          placeholder="Jak będą Cię wołać na Arenie?"
          maxlength="40" autocomplete="name" required/>
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-email">✉ Adres Krwi (e-mail)</label>
        <input type="email" id="reg-email" class="form-input"
          placeholder="wojownik@arena.pl"
          autocomplete="email" required/>
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-password">🔑 Słowo Mocy (hasło)</label>
        <input type="password" id="reg-password" class="form-input"
          placeholder="Min. 6 znaków" autocomplete="new-password"
          minlength="6" required/>
        <div style="background:var(--bg-input);border-radius:2px;height:4px;margin-top:.375rem;overflow:hidden;">
          <div id="pw-strength-bar" class="strength-bar" style="width:0%;background:var(--fire);"></div>
        </div>
        <div id="pw-strength-label" class="pw-hint" style="color:var(--text-faint);margin-top:.25rem;"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-confirm">🔒 Potwierdź Słowo Mocy</label>
        <input type="password" id="reg-confirm" class="form-input"
          placeholder="Powtórz hasło" autocomplete="new-password"
          minlength="6" required/>
      </div>

      <div id="reg-error" class="form-error" style="display:none;text-align:center;"></div>

      <button id="reg-btn" class="btn btn-primary btn-md btn-full">
        🛡 Zaprzysiężenie
      </button>

      <div style="font-family:var(--font-heading);font-size:.5rem;
           letter-spacing:.1em;text-align:center;color:var(--text-faint);padding:.25rem 0;">
        — lub —
      </div>

      <button id="google-reg-btn" class="btn btn-outline btn-md btn-full" style="gap:.625rem;">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Zaprzysiężenie przez Google
      </button>

      <div class="auth-link">
        Masz już konto?
        <a href="login.html">Wejdź przez Bramę →</a>
      </div>
    </div>

  </div>
</div>

<script type="module">
import { initRegisterForm, redirectIfLogged } from './js/auth.js';
redirectIfLogged('index.html');
initRegisterForm();
</script>
</body>
</html>
