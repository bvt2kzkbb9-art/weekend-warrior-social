<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="darkGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Deep black background -->
  <rect width="512" height="512" rx="96" fill="#050404"/>
  <!-- Purple glow underneath border -->
  <rect x="4" y="4" width="504" height="504" rx="94" fill="none" stroke="#A855F7" stroke-width="6" opacity="0.2"/>
  <!-- Gold border accent -->
  <rect x="4" y="4" width="504" height="504" rx="94" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.3"/>
  <!-- Gold circle glow with purple tint -->
  <circle cx="256" cy="220" r="160" fill="none" stroke="#A855F7" stroke-width="2" opacity="0.12"/>
  <!-- Crossed swords -->
  <g transform="translate(256,220)">
    <!-- Sword 1 (top-left to bottom-right) -->
    <line x1="-90" y1="-90" x2="90" y2="90" stroke="#D4AF37" stroke-width="18" stroke-linecap="round" filter="url(#darkGlow)"/>
    <!-- Sword 2 (top-right to bottom-left) -->
    <line x1="90" y1="-90" x2="-90" y2="90" stroke="#D4AF37" stroke-width="18" stroke-linecap="round" filter="url(#darkGlow)"/>
    <!-- Center gem with glow -->
    <circle cx="0" cy="0" r="16" fill="#D4AF37" filter="url(#darkGlow)"/>
    <circle cx="0" cy="0" r="10" fill="#050404"/>
    <circle cx="0" cy="0" r="5" fill="#FFD700"/>
    <!-- Sword handles - darker gold -->
    <rect x="-12" y="72" width="24" height="36" rx="4" fill="#7A5C10"/>
    <rect x="72" y="-12" width="36" height="24" rx="4" fill="#7A5C10"/>
    <rect x="-12" y="-108" width="24" height="36" rx="4" fill="#7A5C10"/>
    <rect x="-108" y="-12" width="36" height="24" rx="4" fill="#7A5C10"/>
    <!-- Cross guards -->
    <rect x="-6" y="58" width="12" height="6" rx="2" fill="#D4AF37" transform="rotate(45)"/>
    <rect x="-6" y="58" width="12" height="6" rx="2" fill="#D4AF37" transform="rotate(-45)"/>
  </g>
  <!-- WWS text with gold glow -->
  <text x="256" y="400" font-family="Georgia,serif" font-size="52" font-weight="700"
        fill="#D4AF37" text-anchor="middle" letter-spacing="8" filter="url(#darkGlow)">WWS</text>
  <text x="256" y="440" font-family="Georgia,serif" font-size="20"
        fill="#7A5C10" text-anchor="middle" letter-spacing="4">WARRIOR</text>
</svg>
