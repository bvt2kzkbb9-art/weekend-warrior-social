<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#06050A"/>
  <meta name="apple-mobile-web-app-title" content="Explore"/>
  <title>Explore — Weekend Warrior Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  
  
  <style>
    body { padding-bottom: 70px; }

    /* ─── HEADER ──────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 90;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title {
      font-family: var(--font-heading);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--gold);
    }
    .header-actions {
      display: flex;
      gap: 1rem;
    }
    .header-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.25rem;
      cursor: pointer;
      transition: all var(--t);
    }
    .header-btn:hover { color: var(--gold); }

    /* ─── TABS ────────────────────────────────────────────── */
    .explore-tabs {
      display: flex;
      gap: 0;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 0 1rem;
    }
    .explore-tab {
      flex: 1;
      padding: 1rem 0.5rem;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--text-muted);
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all var(--t);
      text-align: center;
    }
    .explore-tab:hover { color: var(--text-primary); }
    .explore-tab.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    /* ─── FILTERS ─────────────────────────────────────────── */
    .filter-bar {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      background: var(--bg-elevated);
    }
    .filter-btn {
      padding: 0.5rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border-mid);
      border-radius: var(--r-full);
      color: var(--text-muted);
      font-family: var(--font-heading);
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--t);
      flex-shrink: 0;
    }
    .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
    .filter-btn.active {
      background: var(--gold);
      border-color: var(--gold);
      color: #000;
    }

    /* ─── CHALLENGE CARD ──────────────────────────────────── */
    .section-content {
      display: none;
      padding: 1rem;
    }
    .section-content.active { display: block; }

    .challenge-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }
    @media (min-width: 768px) {
      .challenge-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .challenge-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
      transition: all var(--t);
      cursor: pointer;
    }
    .challenge-card:active { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(212, 175, 55, 0.2); }

    .challenge-image {
      width: 100%;
      height: 160px;
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(212, 175, 55, 0.1));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      position: relative;
      overflow: hidden;
    }
    .challenge-difficulty {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      padding: 0.25rem 0.75rem;
      background: rgba(0, 0, 0, 0.7);
      border-radius: var(--r-full);
      font-size: 0.625rem;
      font-weight: 700;
      color: #fff;
    }

    .challenge-body {
      padding: 1rem;
    }
    .challenge-name {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.875rem;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }
    .challenge-desc {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .challenge-stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.625rem;
      color: var(--text-muted);
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.75rem;
    }
    .challenge-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .challenge-reward {
      font-family: var(--font-heading);
      font-weight: 700;
      color: var(--gold);
      font-size: 0.875rem;
    }
    .challenge-btn {
      padding: 0.5rem 1rem;
      background: var(--gold);
      border: none;
      border-radius: var(--r-md);
      color: #000;
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all var(--t);
    }
    .challenge-btn:active { transform: scale(0.95); }

    /* ─── LEADERBOARD ─────────────────────────────────────── */
    .leaderboard {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
      margin: 1rem;
    }
    .leaderboard-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .leaderboard-item:last-child { border-bottom: none; }

    .leaderboard-rank {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--gold);
      min-width: 32px;
      text-align: center;
    }
    .leaderboard-rank.first { color: #FFD700; }
    .leaderboard-rank.second { color: #C0C0C0; }
    .leaderboard-rank.third { color: #CD7F32; }

    .leaderboard-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-border));
      flex-shrink: 0;
    }
    .leaderboard-info {
      flex: 1;
      min-width: 0;
    }
    .leaderboard-name {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 0.875rem;
      color: var(--text-primary);
    }
    .leaderboard-level {
      font-size: 0.625rem;
      color: var(--text-muted);
    }
    .leaderboard-points {
      font-family: var(--font-heading);
      font-weight: 700;
      color: var(--gold);
      text-align: right;
    }

    /* ─── EMPTY STATE ─────────────────────────────────────── */
    .empty-state {
      padding: 3rem 1rem;
      text-align: center;
    }
    .empty-state-icon { font-size: 3rem; margin-bottom: 1rem; }
  </style>
  <link rel="stylesheet" href="css/unified-design-system.css"/>
  <link rel="stylesheet" href="css/animations.css"/>
  <link rel="stylesheet" href="css/utilities.css"/>
</head>
<body>
<div class="bg-orbs" aria-hidden="true"></div>

<!-- ════════════════════════════════════════════
     HEADER
════════════════════════════════════════════ -->
<header>
  <div class="header-title">🔍 Explore</div>
  <div class="header-actions">
    <button class="header-btn" id="search-btn" title="Szukaj">🔎</button>
    <button class="header-btn" id="filter-btn" title="Filtry">⚙️</button>
  </div>
</header>

<!-- ════════════════════════════════════════════
     TABS
════════════════════════════════════════════ -->
<div class="explore-tabs">
  <button class="explore-tab active" data-tab="challenges">⚔️ Wyzwania</button>
  <button class="explore-tab" data-tab="ranking">🏆 Ranking</button>
  <button class="explore-tab" data-tab="achievements">🎖️ Osiągnięcia</button>
</div>

<!-- ════════════════════════════════════════════
     FILTER BAR
════════════════════════════════════════════ -->
<div class="filter-bar" id="filter-bar">
  <button class="filter-btn active" data-filter="all">Wszystkie</button>
  <button class="filter-btn" data-filter="popular">Popularne</button>
  <button class="filter-btn" data-filter="newest">Najnowsze</button>
  <button class="filter-btn" data-filter="trending">Trending</button>
</div>

<!-- ════════════════════════════════════════════
     CHALLENGES TAB
════════════════════════════════════════════ -->
<div class="section-content active" id="challenges-tab">
  <div class="challenge-grid" id="challenges-grid">
    <!-- Challenges rendered by JS -->
    <div class="empty-state">
      <div class="empty-state-icon">⚔️</div>
      <div>Ładowanie wyzwań...</div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════
     RANKING TAB
════════════════════════════════════════════ -->
<div class="section-content" id="ranking-tab">
  <div class="leaderboard" id="leaderboard">
    <!-- Ranking rendered by JS -->
    <div class="empty-state">
      <div class="empty-state-icon">🏆</div>
      <div>Ładowanie rankingu...</div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════
     ACHIEVEMENTS TAB
════════════════════════════════════════════ -->
<div class="section-content" id="achievements-tab">
  <div id="achievements-grid">
    <!-- Achievements rendered by JS -->
    <div class="empty-state">
      <div class="empty-state-icon">🎖️</div>
      <div>Ładowanie osiągnięć...</div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════
     BOTTOM NAVIGATION
════════════════════════════════════════════ -->
<nav style="position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--bg-card);border-top:1px solid var(--border);display:flex;justify-content:space-around;z-index:100;">
  <a href="home.html" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.25rem;text-decoration:none;color:var(--text-muted);font-size:0.6rem;font-family:var(--font-heading);">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    <span>Home</span>
  </a>
  <a href="explore.html" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.25rem;text-decoration:none;color:var(--gold);font-size:0.6rem;font-family:var(--font-heading);">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px;"><circle cx="12" cy="12" r="9"/></svg>
    <span>Explore</span>
  </a>
  <a href="create.html" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.25rem;text-decoration:none;color:var(--text-muted);font-size:0.6rem;font-family:var(--font-heading);">
    <svg viewBox="0 0 24 24" fill="var(--gold)" style="width:24px;height:24px;opacity:0.5;"><circle cx="12" cy="12" r="10"/></svg>
    <span>Create</span>
  </a>
  <a href="messages.html" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.25rem;text-decoration:none;color:var(--text-muted);font-size:0.6rem;font-family:var(--font-heading);">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span>Messages</span>
  </a>
  <a href="profile.html" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.25rem;text-decoration:none;color:var(--text-muted);font-size:0.6rem;font-family:var(--font-heading);">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/></svg>
    <span>Profile</span>
  </a>
</nav>

<!-- SCRIPTS -->
<script type="module">
  import { auth, db } from './js/firebase.js';
  import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import { collection, query, orderBy, limit, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
  import { initTheme, injectLightModeCSS } from './js/weekly-ranking.js';

  injectLightModeCSS();
  initTheme();

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }

    // Tab switching
    document.querySelectorAll('.explore-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.explore-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + '-tab').classList.add('active');
      });
    });

    // Load challenges
    const challengesQuery = query(collection(db, 'challenges'), orderBy('createdAt', 'desc'), limit(50));
    onSnapshot(challengesQuery, (snap) => {
      const grid = document.getElementById('challenges-grid');
      if (snap.empty) {
        grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚔️</div><div>Brak wyzwań</div></div>';
        return;
      }
      grid.innerHTML = snap.docs.map(doc => {
        const c = doc.data();
        return `<div class="challenge-card">
          <div class="challenge-image">
            ⚔️
            <span class="challenge-difficulty">${c.difficulty?.toUpperCase() || 'MEDIUM'}</span>
          </div>
          <div class="challenge-body">
            <div class="challenge-name">${c.name}</div>
            <div class="challenge-desc">${c.description}</div>
            <div class="challenge-stats">
              <span>👥 ${c.participants?.length || 0} uczestników</span>
              <span>⭐ ${c.difficulty === 'easy' ? 'Łatwe' : c.difficulty === 'hard' ? 'Trudne' : 'Średnie'}</span>
            </div>
            <div class="challenge-footer">
              <div class="challenge-reward">+${c.reward || 100} XP</div>
              <button class="challenge-btn" onclick="window.location.href='explore.html?challenge=${doc.id}'">Weź udział</button>
            </div>
          </div>
        </div>`;
      }).join('');
    });

    // Load ranking
    const usersQuery = query(collection(db, 'users'), orderBy('xp', 'desc'), limit(100));
    onSnapshot(usersQuery, (snap) => {
      const leaderboard = document.getElementById('leaderboard');
      if (snap.empty) return;
      leaderboard.innerHTML = snap.docs.slice(0, 50).map((doc, idx) => {
        const u = doc.data();
        let rankClass = '';
        if (idx === 0) rankClass = 'first';
        else if (idx === 1) rankClass = 'second';
        else if (idx === 2) rankClass = 'third';
        return `<div class="leaderboard-item">
          <div class="leaderboard-rank ${rankClass}">${idx + 1}</div>
          <div class="leaderboard-avatar" style="background-image:url('${u.avatar || 'https://via.placeholder.com/44'}');background-size:cover;"></div>
          <div class="leaderboard-info">
            <div class="leaderboard-name">${u.displayName}</div>
            <div class="leaderboard-level">${u.rank?.label || 'Rookie'}</div>
          </div>
          <div class="leaderboard-points">${u.xp || 0} XP</div>
        </div>`;
      }).join('');
    });
  });
</script>
</body>
</html>
