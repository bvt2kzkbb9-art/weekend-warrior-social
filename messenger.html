<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#0A0A0B"/>
  <title>Wiadomości — Weekend Warrior Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="css/style.css"/>
  
  <link rel="stylesheet" href="css/messenger.css"/>
</head>
<body>

<!-- TOP BAR -->
<header class="top-bar">
  
  <a href="index.html" class="top-bar-brand">Wiadomości</a>
  <nav class="top-bar-actions" aria-label="Akcje górne">
    <a href="search.html" class="top-bar-btn" aria-label="Szukaj">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </a>
    <a href="messenger.html" class="top-bar-btn" aria-label="Wiadomości" id="msg-top-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
      </svg>
      <span id="msg-nav-badge" class="top-bar-badge" style="display:none;">0</span>
    </a>
    <button class="top-bar-btn" id="notif-bell-btn" aria-label="Powiadomienia">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 01-3.46 0"/>
      </svg>
      <span id="notif-top-badge" class="top-bar-badge" style="display:none;">0</span>
    </button>
    <a href="profile.html" class="top-bar-avatar" id="top-bar-avatar" aria-label="Mój profil">W</a>
  </nav>
</header>

<!-- Notifications dropdown -->
<div id="notif-dropdown" class="notif-dropdown hidden" role="dialog" aria-label="Powiadomienia">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:.875rem 1rem;border-bottom:1px solid var(--border);">
    <span style="font-size:.875rem;font-weight:700;color:var(--text-primary);">Powiadomienia</span>
    <button id="notif-mark-all" style="font-size:.75rem;color:var(--brand);font-weight:600;background:none;border:none;cursor:pointer;">Oznacz wszystkie</button>
  </div>
  <div id="notif-list" style="overflow-y:auto;max-height:360px;-webkit-overflow-scrolling:touch;"></div>
</div>


<nav class="nav" aria-label="Nawigacja główna">
  <a href="index.html" class="nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Arena</span>
  </a>
  <a href="feed.html" class="nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    <span>Kroniki</span>
  </a>
  <a href="challenges.html" class="nav-item nav-item-hero">
    <div class="nav-hero-shield">⚔</div>
    <span>Misje</span>
  </a>
  <a href="ranking.html" class="nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
    <span>Chwała</span>
  </a>
</nav>




<!-- Nav -->


<!-- Messenger Layout -->
<main style="height:calc(100vh - 56px);position:relative;z-index:1;overflow:hidden;">
  <div class="messenger-page" id="msg-content">

    <!-- Conversations sidebar -->
    <div class="conv-sidebar" id="conv-sidebar">
      <div class="conv-header">
        <span class="conv-header-title">💬 Wiadomości</span>
      </div>
      <div class="conv-list" id="conv-list">
        <!-- Skeleton -->
        <div id="conv-skeleton">
          <div style="padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem;border-bottom:1px solid var(--border);">
            <div class="skeleton" style="width:44px;height:44px;border-radius:50%;flex-shrink:0;"></div>
            <div style="flex:1;display:flex;flex-direction:column;gap:.375rem;">
              <div class="skeleton" style="height:13px;width:55%;border-radius:4px;"></div>
              <div class="skeleton" style="height:10px;width:80%;border-radius:4px;"></div>
            </div>
          </div>
          <div style="padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem;">
            <div class="skeleton" style="width:44px;height:44px;border-radius:50%;flex-shrink:0;"></div>
            <div style="flex:1;display:flex;flex-direction:column;gap:.375rem;">
              <div class="skeleton" style="height:13px;width:42%;border-radius:4px;"></div>
              <div class="skeleton" style="height:10px;width:65%;border-radius:4px;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty chat state -->
    <div class="chat-area" id="chat-empty">
      <div class="chat-empty-state">
        <div style="font-size:3rem;">⚔️</div>
        <div style="font-family:var(--font-hd);font-size:1.125rem;font-weight:700;color:var(--text-primary);">
          Wybierz rozmowę
        </div>
        <div style="font-size:.875rem;color:var(--text-muted);text-align:center;max-width:240px;">
          Wybierz konwersację z listy lub wejdź na profil wojownika i kliknij „Napisz".
        </div>
      </div>
    </div>

    <!-- Chat panel (hidden until conv selected) -->
    <div class="chat-area hidden" id="chat-panel">

      <!-- Header dynamically rendered -->
      <div id="chat-header" style="display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-bottom:1px solid var(--border);background:var(--bg-card);flex-shrink:0;">
        <!-- Rendered by JS -->
      </div>

      <!-- Messages -->
      <div id="msg-list" role="log" aria-live="polite" aria-label="Wiadomości">
        <!-- Rendered by JS -->
      </div>

      <!-- Compose -->
      <div class="msg-compose">
        <!-- Image preview -->
        <div class="msg-img-preview-wrap" id="msg-img-preview">
          <img src="" alt="Podgląd zdjęcia"/>
          <span style="font-size:.8125rem;color:var(--text-muted);flex:1;">Zdjęcie gotowe do wysłania</span>
          <button class="msg-img-remove" id="msg-img-remove" aria-label="Usuń zdjęcie">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        <!-- Input row -->
        <div class="msg-input-row">
          <!-- Image button -->
          <button class="msg-action-btn" id="msg-img-btn" aria-label="Wyślij zdjęcie" title="Wyślij zdjęcie">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </button>

          <!-- Text input -->
          <textarea
            id="msg-input"
            placeholder="Napisz wiadomość... @nick #tag lub link YouTube"
            rows="1"
            maxlength="1000"
            aria-label="Treść wiadomości"
          ></textarea>

          <!-- Send button -->
          <button class="msg-send-btn" id="msg-send" aria-label="Wyślij">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Hidden file input -->
      <input type="file" id="msg-img-input" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none;"/>
    </div>

  </div><!-- /.messenger-page -->
</main>

<script type="module">
  import { initTheme, injectLightModeCSS } from './js/weekly-ranking.js';
  import { initMessenger, setOnlinePresence, injectMessengerBadge } from './js/messenger.js';
  import { auth } from './js/firebase.js';
  import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

  // Ustaw presence online gdy załadujemy stronę
  injectLightModeCSS();
  initTheme();

  onAuthStateChanged(auth, (user) => {
    if (user) {
      setOnlinePresence(user.uid, true);
      injectMessengerBadge(user.uid);

      // Ustaw offline przy zamknięciu
      window.addEventListener('beforeunload', () => setOnlinePresence(user.uid, false));
      document.addEventListener('visibilitychange', () => {
        setOnlinePresence(user.uid, !document.hidden);
      });
    }
  });

  // Usuń skeleton po załadowaniu
  setTimeout(() => {
    document.getElementById('conv-skeleton')?.remove();
  }, 2000);

  initMessenger();

  // ── Top Bar init ─────────────────────────────────────────────
  (async function() {
    try {
      const { auth, db, COL } = await import('./js/firebase.js');
      const { injectMessengerBadge } = await import('./js/messenger.js');
      const { initNotifications } = await import('./js/notifications.js');
      const { doc, getDoc } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');
      const { onAuthStateChanged } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js');
      onAuthStateChanged(auth, async (user) => {
        if (!user) return;
        injectMessengerBadge(user.uid);
        initNotifications(user.uid);
        try {
          const snap = await getDoc(doc(db, COL.USERS, user.uid));
          const d    = snap.exists() ? snap.data() : {};
          const avEl = document.getElementById('top-bar-avatar');
          if (avEl) {
            if (d.photoURL) avEl.innerHTML = `<img src="${d.photoURL}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="Av"/>`;
            else avEl.textContent = (d.displayName||user.displayName||'W').charAt(0).toUpperCase();
          }
          const _sync = () => {
            const b = document.querySelector('.notif-bell-badge');
            const t = document.getElementById('notif-top-badge');
            if (b && t) { t.textContent=b.textContent; t.style.display=(b.style.display!=='none'&&b.textContent&&b.textContent!=='0')?'flex':'none'; }
          };
          setTimeout(() => { const b=document.querySelector('.notif-bell-badge'); if(b) new MutationObserver(_sync).observe(b,{childList:true,attributes:true}); _sync(); }, 1000);
        } catch(e) { console.warn('[topBar avatar]', e.message); }
      });
      document.getElementById('notif-bell-btn')?.addEventListener('click', e => { e.stopPropagation(); document.getElementById('notif-dropdown')?.classList.toggle('hidden'); });
      document.addEventListener('click', e => { if (!e.target.closest('#notif-bell-btn') && !e.target.closest('#notif-dropdown')) document.getElementById('notif-dropdown')?.classList.add('hidden'); });
      document.getElementById('notif-mark-all')?.addEventListener('click', async () => { const {markAllRead}=await import('./js/notifications.js'); const u=auth.currentUser; if(u) await markAllRead(u.uid); });
    } catch(e) { console.warn('[topBarInit]', e.message); }
  })();
</script>

</body>
</html>
