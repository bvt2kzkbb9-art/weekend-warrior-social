<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#0A0A0B"/>
  <title>Wiadomości — Weekend Warrior Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/rpg-theme.css"/>
  <link rel="stylesheet" href="css/messenger.css"/>
  <style>
    /* Custom messenger nav layout */
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .nav-top {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: .75rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      flex-shrink: 0;
      height: 56px;
    }

    .nav-brand {
      font-family: var(--font-hd);
      font-size: 1rem;
      font-weight: 700;
      color: var(--gold);
      flex-shrink: 0;
    }

    .nav-icons {
      display: flex;
      gap: .5rem;
      align-items: center;
      margin-left: auto;
      flex-shrink: 0;
    }

    .nav-icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg-elevated);
      border: 1px solid var(--border-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      transition: all var(--t);
      position: relative;
    }

    .nav-icon-btn:hover {
      color: var(--gold);
      border-color: var(--gold-border);
    }

    .nav-icon-btn svg {
      width: 18px;
      height: 18px;
    }

    .nav-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      min-width: 16px;
      height: 16px;
      border-radius: var(--r-full);
      background: var(--gold);
      color: #000;
      font-size: .5rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--bg-card);
      font-family: var(--font-hd);
    }

    main {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    @media (max-width: 640px) {
      .nav-top {
        gap: .5rem;
        padding: .5rem;
      }

      .nav-brand {
        font-size: .875rem;
      }

      .nav-icon-btn {
        width: 32px;
        height: 32px;
      }

      .nav-icon-btn svg {
        width: 16px;
        height: 16px;
      }
    }
  </style>
</head>
<body>

<div class="bg-orbs" aria-hidden="true"></div>

<!-- TOP NAV ONLY -->
<nav class="nav-top">
  <span class="nav-brand">⚔ WWS</span>

  <div class="nav-icons">
    <!-- Notifications bell -->
    <button class="nav-icon-btn" id="notif-btn" title="Powiadomienia" style="position: relative;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="nav-badge" id="notif-badge" style="display: none;">0</span>
    </button>

    <!-- Arena link -->
    <a href="index.html" class="nav-icon-btn" title="Arena">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.5 10c-.83 0-1.5-.67-1.5-1.5v-5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5z"/>
      </svg>
    </a>

    <!-- Logout -->
    <button id="logout-btn" class="nav-icon-btn" title="Wyloguj">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</nav>

<!-- MAIN MESSENGER CONTENT - FULL HEIGHT -->
<main>
  <div class="messenger-page" id="msg-content">

    <!-- Conversations sidebar -->
    <div class="conv-sidebar" id="conv-sidebar">
      <div class="conv-header">
        <span class="conv-header-title">💬 Wiadomości</span>
      </div>
      <div class="conv-list" id="conv-list">
        <!-- Skeleton -->
        <div id="conv-skeleton">
          <div style="padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem;border-bottom:1px solid var(--border);">
            <div class="skeleton" style="width:44px;height:44px;border-radius:50%;flex-shrink:0;"></div>
            <div style="flex:1;display:flex;flex-direction:column;gap:.375rem;">
              <div class="skeleton" style="height:13px;width:55%;border-radius:4px;"></div>
              <div class="skeleton" style="height:10px;width:80%;border-radius:4px;"></div>
            </div>
          </div>
          <div style="padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem;">
            <div class="skeleton" style="width:44px;height:44px;border-radius:50%;flex-shrink:0;"></div>
            <div style="flex:1;display:flex;flex-direction:column;gap:.375rem;">
              <div class="skeleton" style="height:13px;width:42%;border-radius:4px;"></div>
              <div class="skeleton" style="height:10px;width:65%;border-radius:4px;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty chat state -->
    <div class="chat-area" id="chat-empty">
      <div class="chat-empty-state">
        <div style="font-size:3rem;">⚔️</div>
        <div style="font-family:var(--font-hd);font-size:1.125rem;font-weight:700;color:var(--text-primary);">
          Wybierz rozmowę
        </div>
        <div style="font-size:.875rem;color:var(--text-muted);text-align:center;max-width:240px;">
          Wybierz konwersację z listy lub wejdź na profil wojownika i kliknij „Napisz".
        </div>
      </div>
    </div>

    <!-- Chat panel (hidden until conv selected) -->
    <div class="chat-area hidden" id="chat-panel">

      <!-- Header dynamically rendered -->
      <div id="chat-header" style="display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-bottom:1px solid var(--border);background:var(--bg-card);flex-shrink:0;">
        <!-- Rendered by JS -->
      </div>

      <!-- Messages -->
      <div id="msg-list" role="log" aria-live="polite" aria-label="Wiadomości">
        <!-- Rendered by JS -->
      </div>

      <!-- Compose -->
      <div class="msg-compose">
        <!-- Image preview -->
        <div class="msg-img-preview-wrap" id="msg-img-preview">
          <img src="" alt="Podgląd zdjęcia"/>
          <span style="font-size:.8125rem;color:var(--text-muted);flex:1;">Zdjęcie gotowe do wysłania</span>
          <button class="msg-img-remove" id="msg-img-remove" aria-label="Usuń zdjęcie">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        <!-- Input row -->
        <div class="msg-input-row">
          <!-- Image button -->
          <button class="msg-action-btn" id="msg-img-btn" aria-label="Wyślij zdjęcie" title="Wyślij zdjęcie">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </button>

          <!-- Text input -->
          <textarea
            id="msg-input"
            placeholder="Napisz wiadomość... @nick #tag lub link YouTube"
            rows="1"
            maxlength="1000"
            aria-label="Treść wiadomości"
          ></textarea>

          <!-- Send button -->
          <button class="msg-send-btn" id="msg-send" aria-label="Wyślij">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Hidden file input -->
      <input type="file" id="msg-img-input" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none;"/>
    </div>

  </div><!-- /.messenger-page -->
</main>

<script type="module">
  import { initTheme, injectLightModeCSS } from './js/weekly-ranking.js';
  import { initMessenger, setOnlinePresence, injectMessengerBadge } from './js/messenger.js';
  import { injectNotifBell } from './js/notifications.js';
  import { auth } from './js/firebase.js';
  import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

  injectLightModeCSS();
  initTheme();

  onAuthStateChanged(auth, (user) => {
    if (user) {
      setOnlinePresence(user.uid, true);
      injectMessengerBadge(user.uid, 'notif-badge');
      injectNotifBell(user.uid, 'notif-btn');

      window.addEventListener('beforeunload', () => setOnlinePresence(user.uid, false));
      document.addEventListener('visibilitychange', () => {
        setOnlinePresence(user.uid, !document.hidden);
      });
    }
  });

  document.getElementById('logout-btn')?.addEventListener('click', () => {
    auth.signOut();
    window.location.href = 'login.html';
  });

  setTimeout(() => {
    document.getElementById('conv-skeleton')?.remove();
  }, 2000);

  initMessenger();
</script>
</body>
</html>
