<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#0A0A0B"/>
  <title>💬 Messenger — Weekend Warrior Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/rpg-theme.css"/>
  <link rel="stylesheet" href="css/messenger.css"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg-primary, #0A0A0B);
      color: var(--text-primary, #EEEEEE);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    /* Layout */
    .messenger-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg-primary, #0A0A0B);
    }

    .top-bar {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border, #2a2a2a);
      background: var(--bg-card, #0F0F10);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      height: 56px;
    }

    .top-bar-title {
      font-size: 1.125rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .top-bar-actions {
      display: flex;
      gap: 0.5rem;
    }

    .top-bar-btn {
      background: none;
      border: none;
      color: var(--text-primary, #EEEEEE);
      cursor: pointer;
      padding: 0.5rem;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.2s;
    }

    .top-bar-btn:hover {
      background: var(--bg-elevated, #1a1a1b);
    }

    .messenger-main {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    /* Conversation List */
    .conv-sidebar {
      width: 100%;
      display: flex;
      flex-direction: column;
      background: var(--bg-card, #0F0F10);
      border-right: 1px solid var(--border, #2a2a2a);
    }

    .conv-sidebar.hidden {
      display: none;
    }

    .conv-sidebar-header {
      padding: 1rem;
      border-bottom: 1px solid var(--border, #2a2a2a);
      flex-shrink: 0;
    }

    .conv-sidebar-search {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg-elevated, #1a1a1b);
      border: 1px solid var(--border, #2a2a2a);
      border-radius: 20px;
      padding: 0.5rem 1rem;
      width: 100%;
    }

    .conv-sidebar-search input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-primary, #EEEEEE);
      outline: none;
      font-size: 0.875rem;
    }

    .conv-sidebar-search input::placeholder {
      color: var(--text-muted, #888);
    }

    .conv-sidebar-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .conv-item {
      padding: 0.75rem 0.5rem;
      border-bottom: 1px solid var(--border, #2a2a2a);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transition: background 0.15s;
      text-decoration: none;
      color: inherit;
    }

    .conv-item:hover {
      background: var(--bg-elevated, #1a1a1b);
    }

    .conv-item.active {
      background: rgba(212, 175, 55, 0.1);
    }

    .conv-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--bg-elevated, #1a1a1b);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .conv-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .conv-avatar.online::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 12px;
      height: 12px;
      background: #16C784;
      border: 2px solid var(--bg-card, #0F0F10);
      border-radius: 50%;
    }

    .conv-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .conv-name {
      font-weight: 500;
      font-size: 0.9375rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conv-preview {
      font-size: 0.8125rem;
      color: var(--text-muted, #888);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conv-item.unread .conv-name {
      font-weight: 700;
      color: var(--text-primary, #EEEEEE);
    }

    .conv-unread-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      background: var(--gold-500, #D4AF37);
      color: #000;
      border-radius: 50%;
      font-size: 0.6875rem;
      font-weight: 600;
      flex-shrink: 0;
    }

    /* Chat Area */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-primary, #0A0A0B);
    }

    .chat-panel.hidden {
      display: none;
    }

    .chat-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border, #2a2a2a);
      background: var(--bg-card, #0F0F10);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
      height: 56px;
    }

    .chat-back-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text-primary, #EEEEEE);
      cursor: pointer;
      padding: 0.5rem;
      width: 36px;
      height: 36px;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.2s;
    }

    @media (max-width: 768px) {
      .chat-back-btn {
        display: flex;
      }
    }

    .chat-header-profile {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex: 1;
      text-decoration: none;
      color: inherit;
      min-width: 0;
    }

    .chat-header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--bg-elevated, #1a1a1b);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      flex-shrink: 0;
      overflow: hidden;
    }

    .chat-header-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .chat-header-info {
      display: flex;
      flex-direction: column;
      gap: 0.125rem;
      min-width: 0;
    }

    .chat-header-name {
      font-weight: 500;
      font-size: 0.9375rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-header-status {
      font-size: 0.75rem;
      color: var(--text-muted, #888);
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .online-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #16C784;
      border-radius: 50%;
    }

    /* Messages */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .messages-area-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted, #888);
      text-align: center;
      padding: 2rem;
      font-size: 0.9375rem;
    }

    .msg-group {
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
      margin-bottom: 0.5rem;
    }

    .msg-group.mine {
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg-elevated, #1a1a1b);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.75rem;
      flex-shrink: 0;
      overflow: hidden;
    }

    .msg-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .msg-bubble-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      max-width: 75%;
    }

    .msg-group.mine .msg-bubble-wrap {
      align-items: flex-end;
    }

    .msg-bubble {
      padding: 0.5rem 0.75rem;
      border-radius: 16px;
      word-wrap: break-word;
      font-size: 0.875rem;
      line-height: 1.4;
    }

    .msg-bubble.mine {
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.9), rgba(184, 134, 11, 1));
      color: #0A0700;
    }

    .msg-bubble.other {
      background: var(--bg-elevated, #1a1a1b);
      color: var(--text-primary, #EEEEEE);
    }

    .msg-image {
      max-width: 100%;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 0.25rem;
    }

    .msg-time {
      font-size: 0.6875rem;
      color: var(--text-muted, #888);
      padding: 0 0.5rem;
    }

    /* Input */
    .input-area {
      border-top: 1px solid var(--border, #2a2a2a);
      background: var(--bg-card, #0F0F10);
      padding: 0.75rem 1rem;
      flex-shrink: 0;
    }

    .input-img-preview {
      display: none;
      margin-bottom: 0.75rem;
      padding: 0.5rem;
      border: 1px solid var(--border, #2a2a2a);
      border-radius: 8px;
      gap: 0.5rem;
      align-items: center;
    }

    .input-img-preview.show {
      display: flex;
    }

    .input-img-preview img {
      width: 40px;
      height: 40px;
      border-radius: 4px;
      object-fit: cover;
    }

    .input-img-remove {
      background: none;
      border: none;
      color: var(--text-muted, #888);
      cursor: pointer;
      padding: 0.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }

    .input-file-btn {
      background: none;
      border: none;
      color: var(--text-muted, #888);
      cursor: pointer;
      padding: 0.5rem;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.2s;
    }

    .input-file-btn:hover {
      background: var(--bg-elevated, #1a1a1b);
    }

    #msg-input {
      flex: 1;
      background: var(--bg-elevated, #1a1a1b);
      border: 1px solid var(--border, #2a2a2a);
      border-radius: 20px;
      color: var(--text-primary, #EEEEEE);
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      resize: none;
      font-family: inherit;
      max-height: 100px;
    }

    #msg-input::placeholder {
      color: var(--text-muted, #888);
    }

    #msg-input:focus {
      outline: none;
      border-color: rgba(212, 175, 55, 0.3);
      background: var(--bg-elevated, #1a1a1b);
    }

    .send-btn {
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.9), rgba(184, 134, 11, 1));
      border: none;
      color: #0A0700;
      cursor: pointer;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-weight: 500;
      font-size: 0.875rem;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover:not(:disabled) {
      opacity: 0.9;
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      border-top: 1px solid var(--border, #2a2a2a);
      background: var(--bg-card, #0F0F10);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
      text-decoration: none;
      color: var(--text-muted, #888);
      font-size: 0.7rem;
      padding: 0.5rem;
      flex: 1;
      transition: color 0.2s;
    }

    .nav-item:hover,
    .nav-item.active {
      color: var(--gold-500, #D4AF37);
    }

    .nav-actions {
      display: flex;
      gap: 0.5rem;
    }

    .logout-btn {
      background: none;
      border: none;
      color: var(--text-muted, #888);
      cursor: pointer;
      padding: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .logout-btn:hover {
      color: #EF4444;
    }

    /* Empty State */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted, #888);
      text-align: center;
      padding: 2rem;
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .empty-state-title {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .conv-sidebar {
        position: absolute;
        width: 100%;
        height: calc(100% - 56px - 60px);
        top: 56px;
        left: 0;
        right: 0;
        z-index: 50;
      }

      .conv-sidebar.hidden {
        display: none;
      }

      .chat-panel {
        position: absolute;
        width: 100%;
        height: calc(100% - 56px - 60px);
        top: 56px;
        left: 0;
        right: 0;
        z-index: 40;
      }

      .chat-panel.hidden {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .messenger-container {
        height: 100dvh;
      }

      .conv-name {
        font-size: 0.875rem;
      }

      .msg-bubble-wrap {
        max-width: 85%;
      }
    }

    /* Scrollbar */
    .conv-sidebar-list::-webkit-scrollbar,
    .messages-area::-webkit-scrollbar {
      width: 6px;
    }

    .conv-sidebar-list::-webkit-scrollbar-track,
    .messages-area::-webkit-scrollbar-track {
      background: transparent;
    }

    .conv-sidebar-list::-webkit-scrollbar-thumb,
    .messages-area::-webkit-scrollbar-thumb {
      background: var(--border, #2a2a2a);
      border-radius: 3px;
    }
  </style>
</head>
<body>

<div class="messenger-container">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-bar-title">
      💬 Messenger
    </div>
    <div class="top-bar-actions">
      <button class="top-bar-btn" id="notif-btn" aria-label="Powiadomienia" title="Powiadomienia">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </button>
      <button class="top-bar-btn" id="profile-btn" aria-label="Profil" title="Profil">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="messenger-main">

    <!-- Conversation List -->
    <div class="conv-sidebar" id="conv-sidebar">
      <div class="conv-sidebar-header">
        <div class="conv-sidebar-search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input id="search-input" type="text" placeholder="Szukaj rozmowy..." />
        </div>
      </div>
      <div class="conv-sidebar-list" id="conv-list">
        <div style="padding:2rem 1rem;text-align:center;color:var(--text-muted);font-size:0.875rem;">Ładowanie...</div>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-panel hidden" id="chat-panel">
      <div class="chat-header">
        <button class="chat-back-btn" id="chat-back-btn" aria-label="Wróć">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <a class="chat-header-profile" id="chat-profile-link" href="#" onclick="return false;">
          <div class="chat-header-avatar" id="chat-avatar">A</div>
          <div class="chat-header-info">
            <div class="chat-header-name" id="chat-name">Rozmowa</div>
            <div class="chat-header-status" id="chat-status">Offline</div>
          </div>
        </a>
      </div>

      <div class="messages-area" id="messages-area">
        <div class="messages-area-empty">Brak wiadomości. Zacznij rozmowę!</div>
      </div>

      <div class="input-area">
        <div class="input-img-preview" id="img-preview">
          <img src="" alt="Podgląd" />
          <span style="flex:1;font-size:0.8125rem;color:var(--text-muted);">Zdjęcie gotowe</span>
          <button class="input-img-remove" id="img-remove-btn" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="input-row">
          <button class="input-file-btn" id="file-btn" type="button" aria-label="Dodaj zdjęcie">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
            </svg>
          </button>
          <textarea id="msg-input" placeholder="Aa" rows="1" maxlength="1000"></textarea>
          <button class="send-btn" id="send-btn" type="button" disabled>Wyślij</button>
          <input type="file" id="file-input" accept="image/*" style="display:none;" />
        </div>
      </div>
    </div>

  </div>

</div>

<!-- BOTTOM NAVIGATION -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M14.5 10c-.83 0-1.5-.67-1.5-1.5v-5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5z"/></svg>
    <span>Arena</span>
  </a>
  <a href="feed.html" class="nav-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span>Kroniki</span>
  </a>
  <a href="challenges.html" class="nav-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M12 2v20M2 12h20" stroke-linecap="round"/><circle cx="12" cy="12" r="1"/></svg>
    <span>Misje</span>
  </a>
  <a href="ranking.html" class="nav-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
    <span>Chwała</span>
  </a>
  <a href="profile.html" class="nav-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Profil</span>
  </a>
  <div class="nav-actions">
    <button class="logout-btn" id="logout-btn" type="button" title="Wyloguj">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</nav>

<script type="module">
  import { initMessenger, setOnlinePresence } from './js/messenger.js';
  import { auth } from './js/firebase.js';
  import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import { injectNotifBell } from './js/notifications.js';

  let currentUser = null;

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = '/login.html';
      return;
    }
    
    currentUser = user;
    
    // Set online presence
    try {
      setOnlinePresence(user.uid, true);
      window.addEventListener('beforeunload', () => setOnlinePresence(user.uid, false));
      document.addEventListener('visibilitychange', () => {
        setOnlinePresence(user.uid, !document.hidden);
      });
    } catch (err) {
      console.error('Presence error:', err);
    }

    // Inject notification bell
    try {
      injectNotifBell(user.uid);
    } catch (err) {
      console.error('Notification bell error:', err);
    }

    // Initialize messenger
    try {
      initMessenger(user.uid);
    } catch (err) {
      console.error('Messenger init error:', err);
    }
  });

  // Button handlers
  document.getElementById('profile-btn')?.addEventListener('click', () => {
    window.location.href = 'profile.html';
  });

  document.getElementById('notif-btn')?.addEventListener('click', () => {
    // Notification panel (future feature)
    console.log('Notifications clicked');
  });

  document.getElementById('logout-btn')?.addEventListener('click', async () => {
    await auth.signOut();
    window.location.href = '/login.html';
  });
</script>

</body>
</html>
