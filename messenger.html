<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#0A0A0B"/>
  <title>💬 Messenger — Weekend Warrior Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/rpg-theme.css"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg-primary, #0A0A0B);
      color: var(--text-primary, #EEEEEE);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .messenger-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg-primary, #0A0A0B);
    }

    .top-bar {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border, #2a2a2a);
      background: var(--bg-card, #0F0F10);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      height: 56px;
      z-index: 100;
    }

    .top-bar-title {
      font-size: 1.125rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .top-bar-actions {
      display: flex;
      gap: 0.5rem;
    }

    .top-bar-btn {
      background: none;
      border: none;
      color: var(--text-primary, #EEEEEE);
      cursor: pointer;
      padding: 0.5rem;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.2s;
    }

    .top-bar-btn:hover {
      background: var(--bg-elevated, #1a1a1b);
    }

    .messenger-main {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    /* Conversation List */
    .conv-sidebar {
      width: 100%;
      display: flex;
      flex-direction: column;
      background: var(--bg-card, #0F0F10);
      border-right: 1px solid var(--border, #2a2a2a);
      overflow: hidden;
    }

    .conv-sidebar.hidden {
      display: none;
    }

    .conv-sidebar-header {
      padding: 1rem;
      border-bottom: 1px solid var(--border, #2a2a2a);
      flex-shrink: 0;
    }

    .conv-sidebar-search {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg-elevated, #1a1a1b);
      border: 1px solid var(--border, #2a2a2a);
      border-radius: 20px;
      padding: 0.5rem 1rem;
      width: 100%;
    }

    .conv-sidebar-search input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-primary, #EEEEEE);
      outline: none;
      font-size: 0.875rem;
    }

    .conv-sidebar-search input::placeholder {
      color: var(--text-muted, #888);
    }

    .conv-sidebar-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .conv-item {
      padding: 0.75rem 0.5rem;
      border-bottom: 1px solid var(--border, #2a2a2a);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transition: background 0.15s;
      text-decoration: none;
      color: inherit;
    }

    .conv-item:active {
      background: var(--bg-elevated, #1a1a1b);
    }

    .conv-item.active {
      background: rgba(212, 175, 55, 0.1);
    }

    .conv-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #D4AF37, #B8860B);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      font-size: 0.9rem;
      color: #0A0700;
    }

    .conv-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .conv-avatar.online::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 12px;
      height: 12px;
      background: #16C784;
      border: 2px solid var(--bg-card, #0F0F10);
      border-radius: 50%;
    }

    .conv-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .conv-name {
      font-weight: 500;
      font-size: 0.9375rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conv-preview {
      font-size: 0.8125rem;
      color: var(--text-muted, #888);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conv-item.unread .conv-name {
      font-weight: 700;
    }

    .conv-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.25rem;
    }

    .conv-time {
      font-size: 0.75rem;
      color: var(--text-muted, #888);
    }

    .conv-unread-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      background: var(--gold-500, #D4AF37);
      color: #000;
      border-radius: 50%;
      font-size: 0.65rem;
      font-weight: 700;
    }

    /* Chat Area */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-primary, #0A0A0B);
    }

    .chat-panel.hidden {
      display: none;
    }

    .chat-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border, #2a2a2a);
      background: var(--bg-card, #0F0F10);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
      height: 56px;
    }

    .chat-back-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text-primary, #EEEEEE);
      cursor: pointer;
      padding: 0.5rem;
      width: 36px;
      height: 36px;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.2s;
    }

    @media (max-width: 768px) {
      .chat-back-btn {
        display: flex;
      }
    }

    .chat-header-profile {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex: 1;
      text-decoration: none;
      color: inherit;
      min-width: 0;
      cursor: pointer;
    }

    .chat-header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #D4AF37, #B8860B);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      flex-shrink: 0;
      overflow: hidden;
      color: #0A0700;
    }

    .chat-header-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .chat-header-info {
      display: flex;
      flex-direction: column;
      gap: 0.125rem;
      min-width: 0;
    }

    .chat-header-name {
      font-weight: 500;
      font-size: 0.9375rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-header-status {
      font-size: 0.75rem;
      color: var(--text-muted, #888);
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .online-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #16C784;
      border-radius: 50%;
    }

    /* Messages */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .messages-area-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted, #888);
      text-align: center;
      padding: 2rem;
      font-size: 0.9375rem;
    }

    .msg-group {
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
      margin-bottom: 0.25rem;
    }

    .msg-group.mine {
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #D4AF37, #B8860B);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.75rem;
      flex-shrink: 0;
      overflow: hidden;
      color: #0A0700;
    }

    .msg-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .msg-bubble-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      max-width: 75%;
    }

    .msg-group.mine .msg-bubble-wrap {
      align-items: flex-end;
    }

    .msg-bubble {
      padding: 0.5rem 0.75rem;
      border-radius: 16px;
      word-wrap: break-word;
      font-size: 0.875rem;
      line-height: 1.4;
    }

    .msg-bubble.mine {
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.95), rgba(184, 134, 11, 1));
      color: #0A0700;
    }

    .msg-bubble.other {
      background: var(--bg-elevated, #1a1a1b);
      color: var(--text-primary, #EEEEEE);
    }

    .msg-image {
      max-width: 200px;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 0.25rem;
    }

    .msg-time {
      font-size: 0.65rem;
      color: var(--text-muted, #888);
      padding: 0 0.5rem;
    }

    /* Input */
    .input-area {
      border-top: 1px solid var(--border, #2a2a2a);
      background: var(--bg-card, #0F0F10);
      padding: 0.75rem 1rem;
      flex-shrink: 0;
    }

    .input-img-preview {
      display: none;
      margin-bottom: 0.75rem;
      padding: 0.5rem;
      border: 1px solid var(--border, #2a2a2a);
      border-radius: 8px;
      gap: 0.5rem;
      align-items: center;
    }

    .input-img-preview.show {
      display: flex;
    }

    .input-img-preview img {
      width: 40px;
      height: 40px;
      border-radius: 4px;
      object-fit: cover;
    }

    .input-img-remove {
      background: none;
      border: none;
      color: var(--text-muted, #888);
      cursor: pointer;
      padding: 0.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }

    .input-file-btn {
      background: none;
      border: none;
      color: var(--text-muted, #888);
      cursor: pointer;
      padding: 0.5rem;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.2s;
    }

    .input-file-btn:active {
      background: var(--bg-elevated, #1a1a1b);
    }

    #msg-input {
      flex: 1;
      background: var(--bg-elevated, #1a1a1b);
      border: 1px solid var(--border, #2a2a2a);
      border-radius: 20px;
      color: var(--text-primary, #EEEEEE);
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      resize: none;
      font-family: inherit;
      max-height: 100px;
    }

    #msg-input::placeholder {
      color: var(--text-muted, #888);
    }

    #msg-input:focus {
      outline: none;
      border-color: rgba(212, 175, 55, 0.3);
    }

    .send-btn {
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.95), rgba(184, 134, 11, 1));
      border: none;
      color: #0A0700;
      cursor: pointer;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.875rem;
      transition: opacity 0.2s;
      flex-shrink: 0;
      height: 36px;
    }

    .send-btn:active:not(:disabled) {
      opacity: 0.9;
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Scrollbar */
    .conv-sidebar-list::-webkit-scrollbar,
    .messages-area::-webkit-scrollbar {
      width: 6px;
    }

    .conv-sidebar-list::-webkit-scrollbar-track,
    .messages-area::-webkit-scrollbar-track {
      background: transparent;
    }

    .conv-sidebar-list::-webkit-scrollbar-thumb,
    .messages-area::-webkit-scrollbar-thumb {
      background: var(--border, #2a2a2a);
      border-radius: 3px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .conv-sidebar {
        position: absolute;
        width: 100%;
        height: calc(100% - 56px);
        top: 56px;
        left: 0;
        right: 0;
        z-index: 50;
      }

      .chat-panel {
        position: absolute;
        width: 100%;
        height: calc(100% - 56px);
        top: 56px;
        left: 0;
        right: 0;
        z-index: 40;
      }
    }

    @media (max-width: 480px) {
      .msg-bubble-wrap {
        max-width: 85%;
      }
    }
  </style>
</head>
<body>

<div class="messenger-container">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-bar-title">
      💬 Messenger
    </div>
    <div class="top-bar-actions">
      <button class="top-bar-btn" id="notif-btn" aria-label="Powiadomienia">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </button>
      <button class="top-bar-btn" id="profile-btn" aria-label="Profil">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="messenger-main">

    <!-- Conversation List -->
    <div class="conv-sidebar" id="conv-sidebar">
      <div class="conv-sidebar-header">
        <div class="conv-sidebar-search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input id="search-input" type="text" placeholder="Szukaj rozmowy..." />
        </div>
      </div>
      <div class="conv-sidebar-list" id="conv-list">
        <div style="padding:2rem 1rem;text-align:center;color:var(--text-muted);font-size:0.875rem;">Ładowanie...</div>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-panel hidden" id="chat-panel">
      <div class="chat-header">
        <button class="chat-back-btn" id="chat-back-btn" aria-label="Wróć">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <div class="chat-header-profile">
          <div class="chat-header-avatar" id="chat-avatar">A</div>
          <div class="chat-header-info">
            <div class="chat-header-name" id="chat-name">Rozmowa</div>
            <div class="chat-header-status" id="chat-status">Offline</div>
          </div>
        </div>
      </div>

      <div class="messages-area" id="messages-area">
        <div class="messages-area-empty">Brak wiadomości</div>
      </div>

      <div class="input-area">
        <div class="input-img-preview" id="img-preview">
          <img src="" alt="Podgląd" />
          <span style="flex:1;font-size:0.8125rem;color:var(--text-muted);">Zdjęcie gotowe</span>
          <button class="input-img-remove" id="img-remove-btn" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="input-row">
          <button class="input-file-btn" id="file-btn" type="button" aria-label="Dodaj zdjęcie">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
            </svg>
          </button>
          <textarea id="msg-input" placeholder="Aa" rows="1" maxlength="1000"></textarea>
          <button class="send-btn" id="send-btn" type="button" disabled>Wyślij</button>
          <input type="file" id="file-input" accept="image/*" style="display:none;" />
        </div>
      </div>
    </div>

  </div>

</div>

<script type="module">
  import { initMessenger, setOnlinePresence } from './js/messenger.js';
  import { auth } from './js/firebase.js';
  import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import { injectNotifBell } from './js/notifications.js';

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = '/login.html';
      return;
    }
    
    try {
      setOnlinePresence(user.uid, true);
      window.addEventListener('beforeunload', () => setOnlinePresence(user.uid, false));
      document.addEventListener('visibilitychange', () => {
        setOnlinePresence(user.uid, !document.hidden);
      });
    } catch (err) {
      console.error('[presence]', err);
    }

    try {
      injectNotifBell(user.uid);
    } catch (err) {
      console.error('[notification bell]', err);
    }

    try {
      initMessenger(user.uid);
    } catch (err) {
      console.error('[messenger init]', err);
    }
  });

  document.getElementById('profile-btn')?.addEventListener('click', () => {
    window.location.href = 'profile.html';
  });

  document.getElementById('logout-btn')?.addEventListener('click', async () => {
    await auth.signOut();
    window.location.href = '/login.html';
  });
</script>

</body>
</html>
