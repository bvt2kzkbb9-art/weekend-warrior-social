<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#0A0A0B"/>
  <title>Wiadomości — Weekend Warrior Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/rpg-theme.css"/>
  <link rel="stylesheet" href="css/premium-effects.css"/>
  <link rel="stylesheet" href="css/messenger.css"/>
  <link rel="stylesheet" href="css/reference-design.css"/>
  <link rel="stylesheet" href="css/guide-implementation.css"/>
</head>
<body>

<!-- TOP HEADER BAR -->
<header class="top-bar">
  <div class="top-bar-logo">⚔ WWS</div>
  <div class="top-bar-actions">
    <button class="top-bar-btn" id="notif-btn" aria-label="Powiadomienia">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span id="notif-badge"></span>
    </button>
    <button class="top-bar-btn" aria-label="Profil" onclick="window.location.href='profile.html'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </button>
  </div>
</header>

<div class="bg-orbs" aria-hidden="true"></div>

<!-- Nav -->
<nav class="bottom-nav" aria-label="Główna nawigacja">
  <a href="index.html" class="nav-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 10c-.83 0-1.5-.67-1.5-1.5v-5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5z"/></svg>
    <span>Arena</span>
  </a>
  <a href="feed.html" class="nav-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span>Kroniki</span>
  </a>
  <a href="challenges.html" class="nav-item-hero nav-item">
    <div class="nav-hero-shield">⚔</div>
    <span>Misje</span>
  </a>
  <a href="ranking.html" class="nav-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
    <span>Chwała</span>
  </a>
  <div class="nav-actions">
    <button id="logout-btn" class="btn btn-ghost btn-sm" style="padding:.5rem;color:var(--text-muted);" title="Wyloguj">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</nav>

<!-- Messenger Layout -->
<main style="padding:0;overflow:hidden;display:flex;flex-direction:column;height:calc(100vh - 56px - 60px);">
  <div class="messenger-page" id="msg-content" style="display:flex;flex-direction:column;height:100%;">

    <!-- SCREEN 1: Conversations List -->
    <div class="messenger-screen screen-conversations active" id="screen-conversations" style="display:flex;flex-direction:column;height:100%;width:100%;overflow:hidden;">
      <div class="conv-header">
        <span class="conv-header-title">💬 Wiadomości</span>
      </div>
      
      <!-- Conversations list -->
      <div class="conv-list" id="conv-list" style="flex:1;overflow-y:auto;">
        <div id="conv-skeleton"></div>
      </div>
    </div>

    <!-- SCREEN 2: Chat (fullscreen) -->
    <div class="messenger-screen screen-chat" id="screen-chat" style="display:none;flex-direction:column;height:100%;width:100%;overflow:hidden;">
      
      <!-- Chat header with back button -->
      <div class="chat-header-full" style="display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1rem;border-bottom:1px solid var(--border);background:var(--bg-card);flex-shrink:0;">
        <button class="chat-back-btn" id="chat-back" aria-label="Wróć" style="background:none;border:none;color:var(--text-primary);cursor:pointer;padding:0;width:32px;height:32px;display:flex;align-items:center;justify-content:center;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <div id="chat-header-info" style="flex:1;"></div>
      </div>

      <!-- Messages -->
      <div id="msg-list" role="log" aria-live="polite" aria-label="Wiadomości" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;padding:1rem;gap:0.5rem;">
      </div>

      <!-- Compose -->
      <div class="msg-compose" style="flex-shrink:0;border-top:1px solid var(--border);padding:0.75rem 1rem;background:var(--bg-card);">
        <!-- Image preview -->
        <div class="msg-img-preview-wrap" id="msg-img-preview" style="display:none;padding:0.5rem;margin-bottom:0.75rem;border:1px solid var(--border);border-radius:8px;">
          <img src="" alt="Podgląd zdjęcia" style="width:40px;height:40px;border-radius:4px;object-fit:cover;"/>
          <span style="font-size:.8125rem;color:var(--text-muted);flex:1;">Zdjęcie gotowe do wysłania</span>
          <button class="msg-img-remove" id="msg-img-remove" aria-label="Usuń zdjęcie" style="background:none;border:none;color:var(--text-muted);cursor:pointer;padding:0;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        <!-- Input row -->
        <div class="msg-input-row">
          <button class="msg-action-btn" id="msg-img-btn" aria-label="Wyślij zdjęcie" style="background:none;border:none;color:var(--text-muted);cursor:pointer;padding:0.5rem;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </button>
          <textarea id="msg-input" placeholder="Napisz wiadomość..." rows="1" maxlength="1000" style="flex:1;background:rgba(212,175,55,0.05);border:1px solid rgba(212,175,55,0.1);border-radius:6px;padding:0.5rem 0.75rem;color:var(--text-primary);resize:none;"></textarea>
          <button class="msg-send-btn" id="msg-send" aria-label="Wyślij" style="background:linear-gradient(180deg,rgba(212,175,55,1) 0%,rgba(184,134,11,0.9) 100%);border:none;color:white;cursor:pointer;padding:0.5rem;border-radius:6px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Hidden file input -->
      <input type="file" id="msg-img-input" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none;"/>
    </div>

  </div>
</main>

<script type="module">
  import { initTheme, injectLightModeCSS } from './js/weekly-ranking.js';
  import { initMessenger, setOnlinePresence, injectMessengerBadge } from './js/messenger.js';
  import { injectNotifBell } from './js/notifications.js';
  import { auth } from './js/firebase.js';
  import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

  // Ustaw presence online gdy załadujemy stronę
  injectLightModeCSS();
  initTheme();

  onAuthStateChanged(auth, (user) => {
    if (user) {
      setOnlinePresence(user.uid, true);
      injectMessengerBadge(user.uid);
      injectNotifBell(user.uid);

      // Ustaw offline przy zamknięciu
      window.addEventListener('beforeunload', () => setOnlinePresence(user.uid, false));
      document.addEventListener('visibilitychange', () => {
        setOnlinePresence(user.uid, !document.hidden);
      });
    }
  });

  // Usuń skeleton po załadowaniu
  setTimeout(() => {
    document.getElementById('conv-skeleton')?.remove();
  }, 2000);

  initMessenger();
</script>
  <script src="js/autohide-nav.js"></script>
</body>
</html>
