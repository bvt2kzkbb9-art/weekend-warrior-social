<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#0A0A0B"/>
  <title>Wiadomości — Weekend Warrior Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/navigation.css"/>
  <link rel="stylesheet" href="css/rpg-theme.css"/>
  <link rel="stylesheet" href="css/messenger.css"/>
</head>
<body>

<div class="bg-orbs" aria-hidden="true"></div>

<!-- Top Navigation -->
<header class="top-nav" aria-label="Górna nawigacja">
  <a href="index.html" class="top-nav-logo">
    <span>⚔</span>
    <span>WEEKEND WARRIOR</span>
  </a>
  <div class="top-nav-actions">
    <button class="top-nav-action" title="Powiadomienia" aria-label="Powiadomienia">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="nav-badge hide">0</span>
    </button>
    <button class="top-nav-action" title="Wiadomości" aria-label="Wiadomości">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span id="msg-nav-badge" class="nav-badge hide">0</span>
    </button>
    <a href="profile.html" class="top-nav-action" title="Profil" aria-label="Profil">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </a>
    <button id="logout-btn" class="top-nav-action" title="Wyloguj" aria-label="Wyloguj">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</header>

<!-- Bottom Navigation -->
<nav class="bottom-nav" aria-label="Główna nawigacja">
  <a href="index.html" class="bottom-nav-item" data-nav="arena">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14.5 10c-.83 0-1.5-.67-1.5-1.5v-5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5z"/>
      <path d="M20.5 10H19V8.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
    </svg>
    <span>Arena</span>
  </a>

  <a href="feed.html" class="bottom-nav-item" data-nav="kroniki">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
    </svg>
    <span>Kroniki</span>
  </a>

  <a href="challenges.html" class="bottom-nav-item hero-item" data-nav="misje">
    <div class="hero-shield">⚔</div>
    <span>Misje</span>
  </a>

  <a href="ranking.html" class="bottom-nav-item" data-nav="chwal">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="8" r="6"/>
      <path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/>
    </svg>
    <span>Chwała</span>
  </a>

  <a href="profile.html" class="bottom-nav-item" data-nav="bohater">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
    <span>Bohater</span>
  </a>
</nav>

<!-- Messenger Layout -->
<main style="height:calc(100vh - var(--nav-top-h) - var(--nav-bot-h));position:relative;z-index:1;overflow:hidden;">
  <div class="messenger-page" id="msg-content">

    <!-- Conversations sidebar -->
    <div class="conv-sidebar" id="conv-sidebar">
      <div class="conv-header">
        <span class="conv-header-title">💬 Wiadomości</span>
      </div>
      <div class="conv-list" id="conv-list">
        <!-- Skeleton -->
        <div id="conv-skeleton">
          <div style="padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem;border-bottom:1px solid var(--border);">
            <div class="skeleton" style="width:44px;height:44px;border-radius:50%;flex-shrink:0;"></div>
            <div style="flex:1;display:flex;flex-direction:column;gap:.375rem;">
              <div class="skeleton" style="height:13px;width:55%;border-radius:4px;"></div>
              <div class="skeleton" style="height:10px;width:80%;border-radius:4px;"></div>
            </div>
          </div>
          <div style="padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem;">
            <div class="skeleton" style="width:44px;height:44px;border-radius:50%;flex-shrink:0;"></div>
            <div style="flex:1;display:flex;flex-direction:column;gap:.375rem;">
              <div class="skeleton" style="height:13px;width:42%;border-radius:4px;"></div>
              <div class="skeleton" style="height:10px;width:65%;border-radius:4px;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty chat state -->
    <div class="chat-area" id="chat-empty">
      <div class="chat-empty-state">
        <div style="font-size:3rem;">⚔️</div>
        <div style="font-family:var(--font-hd);font-size:1.125rem;font-weight:700;color:var(--text-primary);">
          Wybierz rozmowę
        </div>
        <div style="font-size:.875rem;color:var(--text-muted);text-align:center;max-width:240px;">
          Wybierz konwersację z listy lub wejdź na profil wojownika i kliknij „Napisz".
        </div>
      </div>
    </div>

    <!-- Chat panel (hidden until conv selected) -->
    <div class="chat-area hidden" id="chat-panel">

      <!-- Header dynamically rendered -->
      <div id="chat-header" style="display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-bottom:1px solid var(--border);background:var(--bg-card);flex-shrink:0;">
        <!-- Rendered by JS -->
      </div>

      <!-- Messages -->
      <div id="msg-list" role="log" aria-live="polite" aria-label="Wiadomości">
        <!-- Rendered by JS -->
      </div>

      <!-- Compose -->
      <div class="msg-compose">
        <!-- Image preview -->
        <div class="msg-img-preview-wrap" id="msg-img-preview">
          <img src="" alt="Podgląd zdjęcia"/>
          <span style="font-size:.8125rem;color:var(--text-muted);flex:1;">Zdjęcie gotowe do wysłania</span>
          <button class="msg-img-remove" id="msg-img-remove" aria-label="Usuń zdjęcie">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        <!-- Input row -->
        <div class="msg-input-row">
          <!-- Image button -->
          <button class="msg-action-btn" id="msg-img-btn" aria-label="Wyślij zdjęcie" title="Wyślij zdjęcie">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </button>

          <!-- Text input -->
          <textarea
            id="msg-input"
            placeholder="Napisz wiadomość... @nick #tag lub link YouTube"
            rows="1"
            maxlength="1000"
            aria-label="Treść wiadomości"
          ></textarea>

          <!-- Send button -->
          <button class="msg-send-btn" id="msg-send" aria-label="Wyślij">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Hidden file input -->
      <input type="file" id="msg-img-input" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none;"/>
    </div>

  </div><!-- /.messenger-page -->
</main>

<script src="js/navigation.js"></script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
