<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#0A0A0B"/>
  <title>💬 Messenger — Weekend Warrior Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg-primary, #0A0A0B);
      color: var(--text-primary, #EEEEEE);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg-primary, #0A0A0B);
    }

    /* ═════════════════════════════════════════════════════════════ */
    /* HEADER — RPG Style */
    /* ═════════════════════════════════════════════════════════════ */
    .header {
      padding: 1rem;
      background: var(--bg-panel, #1a1c21);
      border-bottom: 1px solid var(--border-panel, rgba(212,175,55,.15));
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-title {
      font-family: var(--font-heading, sans-serif);
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: .12em;
      color: var(--gold-400, #D4AF37);
      text-shadow: 0 0 20px rgba(212,175,55,.3);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .header-actions {
      display: flex;
      gap: 0.5rem;
    }

    .header-btn {
      background: rgba(212,175,55,.08);
      border: 1px solid rgba(212,175,55,.15);
      color: var(--text-primary, #EEEEEE);
      cursor: pointer;
      padding: 0.5rem;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: all var(--dur-fast, 200ms) var(--ease-out, ease-out);
    }

    .header-btn:hover {
      background: rgba(212,175,55,.18);
      border-color: rgba(212,175,55,.3);
      box-shadow: 0 0 12px rgba(212,175,55,.2);
    }

    .header-btn:active {
      transform: scale(0.95);
    }

    /* ═════════════════════════════════════════════════════════════ */
    /* CONTENT */
    /* ═════════════════════════════════════════════════════════════ */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }

    .content::-webkit-scrollbar {
      width: 6px;
    }

    .content::-webkit-scrollbar-track {
      background: transparent;
    }

    .content::-webkit-scrollbar-thumb {
      background: rgba(212,175,55,.2);
      border-radius: 3px;
    }

    /* ═════════════════════════════════════════════════════════════ */
    /* SECTION LABELS */
    /* ═════════════════════════════════════════════════════════════ */
    .section-label {
      font-family: var(--font-heading, sans-serif);
      font-size: clamp(.75rem, 2vw, 1rem);
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--gold-500, #D4AF37);
      text-shadow: 0 0 20px rgba(212,175,55,.2);
      margin-bottom: 1rem;
      margin-top: 1.5rem;
    }

    .section-label:first-child {
      margin-top: 0;
    }

    /* ═════════════════════════════════════════════════════════════ */
    /* ONLINE USERS — Carousel Like Arena Challenges */
    /* ═════════════════════════════════════════════════════════════ */
    .online-list {
      display: flex;
      gap: .75rem;
      overflow-x: auto;
      padding: .25rem .75rem .75rem;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .online-list::-webkit-scrollbar {
      display: none;
    }

    .online-avatar {
      flex-shrink: 0;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-900, #3D3011), var(--gold-700, #8B6F00));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-heading, sans-serif);
      font-weight: 900;
      color: var(--gold-300, #FFE680);
      font-size: 1.5rem;
      overflow: hidden;
      cursor: pointer;
      transition: all var(--dur-base, 300ms) var(--ease-out, ease-out);
      border: 2px solid var(--border-active, rgba(212,175,55,.3));
      box-shadow: 0 0 0 4px rgba(212,175,55,.1), 0 0 24px rgba(212,175,55,.15);
      scroll-snap-align: start;
      animation: card-entrance .5s var(--ease-out, ease-out) both;
      position: relative;
    }

    @keyframes card-entrance {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .online-avatar:hover {
      border-color: var(--border-active, rgba(212,175,55,.5));
      box-shadow: 0 8px 32px rgba(212,175,55,.2), 0 0 0 4px rgba(212,175,55,.15);
      transform: translateY(-4px) scale(1.08);
    }

    .online-avatar:active {
      transform: translateY(-4px) scale(0.95);
    }

    .online-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .online-avatar::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 18px;
      height: 18px;
      background: #16C784;
      border: 3px solid var(--bg-panel, #1a1c21);
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(22,199,132,.5);
    }

    /* ═════════════════════════════════════════════════════════════ */
    /* CHAT CARDS */
    /* ═════════════════════════════════════════════════════════════ */
    .chats-section {
      display: grid;
      gap: 1rem;
      animation: cards-entrance 0.5s var(--ease-out, ease-out) both;
    }

    @keyframes cards-entrance {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .chat-card {
      background: var(--bg-panel, #1a1c21);
      border: 1.5px solid var(--border-panel, rgba(212,175,55,.15));
      border-radius: 12px;
      padding: 1rem;
      cursor: pointer;
      transition: all var(--dur-base, 300ms) var(--ease-out, ease-out);
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      position: relative;
      overflow: hidden;
    }

    .chat-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(212,175,55,.03) 0%, transparent 50%);
      pointer-events: none;
      opacity: 0;
      transition: opacity var(--dur-fast, 200ms);
    }

    .chat-card:hover {
      border-color: var(--border-active, rgba(212,175,55,.3));
      box-shadow: 0 8px 32px rgba(212,175,55,.2), 0 0 0 1px rgba(212,175,55,.15);
      transform: translateY(-4px) scale(1.02);
    }

    .chat-card:hover::before {
      opacity: 1;
    }

    .chat-card:active {
      transform: translateY(-4px) scale(0.98);
    }

    .chat-card.unread {
      border-color: rgba(212,175,55,.3);
    }

    .chat-card.unread .chat-name {
      color: var(--gold-300, #FFE680);
      font-weight: 900;
    }

    .chat-avatar-large {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-900, #3D3011), var(--gold-700, #8B6F00));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-heading, sans-serif);
      font-weight: 700;
      flex-shrink: 0;
      color: var(--gold-300, #FFE680);
      font-size: 1.5rem;
      overflow: hidden;
      border: 2px solid var(--border-active, rgba(212,175,55,.3));
      box-shadow: 0 0 0 4px rgba(212,175,55,.1), 0 0 16px rgba(212,175,55,.15);
    }

    .chat-avatar-large img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .chat-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .chat-name {
      font-family: var(--font-heading, sans-serif);
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: .06em;
      color: var(--text-bright, #EEEEEE);
      transition: color var(--dur-fast, 200ms);
    }

    .chat-preview {
      font-size: 0.875rem;
      color: var(--text-muted, #888);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-meta {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-top: 0.25rem;
    }

    .chat-time {
      font-family: var(--font-heading, sans-serif);
      font-size: .65rem;
      color: var(--gold-500, #D4AF37);
      font-weight: 700;
      letter-spacing: .08em;
    }

    .unread-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--gold-700, #8B6F00), var(--gold-400, #DAA520));
      color: #0A0700;
      border-radius: 50%;
      font-family: var(--font-heading, sans-serif);
      font-size: 0.7rem;
      font-weight: 900;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.5);
    }

    /* ═════════════════════════════════════════════════════════════ */
    /* EMPTY STATE */
    /* ═════════════════════════════════════════════════════════════ */
    .empty-state {
      padding: 3rem 1rem;
      text-align: center;
      color: var(--text-muted, #888);
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.6;
    }

    /* ═════════════════════════════════════════════════════════════ */
    /* CHAT MODAL */
    /* ═════════════════════════════════════════════════════════════ */
    .chat-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg-primary, #0A0A0B);
      z-index: 1000;
      flex-direction: column;
    }

    .chat-modal.active {
      display: flex;
    }

    .chat-header {
      padding: 1rem;
      background: var(--bg-panel, #1a1c21);
      border-bottom: 1px solid var(--border-panel, rgba(212,175,55,.15));
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .back-btn {
      background: rgba(212,175,55,.08);
      border: 1px solid rgba(212,175,55,.15);
      color: var(--text-primary, #EEEEEE);
      cursor: pointer;
      padding: 0.5rem;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: all var(--dur-fast, 200ms) var(--ease-out, ease-out);
    }

    .back-btn:hover {
      background: rgba(212,175,55,.18);
      box-shadow: 0 0 12px rgba(212,175,55,.2);
    }

    .back-btn:active {
      transform: scale(0.95);
    }

    .back-btn svg {
      width: 20px;
      height: 20px;
    }

    .chat-modal-info {
      flex: 1;
    }

    .chat-modal-name {
      font-family: var(--font-heading, sans-serif);
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: .06em;
      color: var(--gold-400, #D4AF37);
      text-shadow: 0 0 12px rgba(212,175,55,.2);
    }

    .chat-modal-status {
      font-family: var(--font-heading, sans-serif);
      font-size: .65rem;
      letter-spacing: .08em;
      color: var(--text-muted, #888);
    }

    /* ═════════════════════════════════════════════════════════════ */
    /* MESSAGES */
    /* ═════════════════════════════════════════════════════════════ */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .messages-container::-webkit-scrollbar {
      width: 6px;
    }

    .messages-container::-webkit-scrollbar-thumb {
      background: rgba(212,175,55,.2);
      border-radius: 3px;
    }

    .message {
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
      margin-bottom: 0.5rem;
    }

    .message.mine {
      flex-direction: row-reverse;
    }

    .message-bubble {
      max-width: 75%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      font-size: 0.9375rem;
      line-height: 1.4;
      animation: message-pop 0.2s var(--ease-out, ease-out) both;
    }

    @keyframes message-pop {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .message.mine .message-bubble {
      background: linear-gradient(135deg, var(--gold-900, #3D3011) 0%, var(--gold-700, #8B6F00) 40%, var(--gold-500, #D4AF37) 100%);
      color: #0A0700;
      box-shadow: 0 4px 16px rgba(212,175,55,.25);
    }

    .message .message-bubble {
      background: var(--bg-panel, #1a1c21);
      color: var(--text-primary, #EEEEEE);
      border: 1px solid rgba(212,175,55,.1);
    }

    .message-image {
      max-width: 180px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform var(--dur-fast, 200ms);
    }

    .message-image:hover {
      transform: scale(1.05);
    }

    .message-time {
      font-family: var(--font-heading, sans-serif);
      font-size: 0.65rem;
      color: var(--text-muted, #888);
      padding: 0 0.5rem;
    }

    /* ═════════════════════════════════════════════════════════════ */
    /* INPUT AREA */
    /* ═════════════════════════════════════════════════════════════ */
    .input-area {
      padding: 1rem;
      background: var(--bg-panel, #1a1c21);
      border-top: 1px solid var(--border-panel, rgba(212,175,55,.15));
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }

    .file-btn {
      background: rgba(212,175,55,.08);
      border: 1px solid rgba(212,175,55,.15);
      color: var(--text-muted, #888);
      cursor: pointer;
      padding: 0.5rem;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: all var(--dur-fast, 200ms) var(--ease-out, ease-out);
    }

    .file-btn:hover {
      background: rgba(212,175,55,.18);
      border-color: rgba(212,175,55,.3);
      box-shadow: 0 0 12px rgba(212,175,55,.2);
    }

    .file-btn:active {
      transform: scale(0.95);
    }

    .file-btn svg {
      width: 20px;
      height: 20px;
    }

    #msg-input {
      flex: 1;
      background: rgba(212,175,55,.05);
      border: 1px solid rgba(212,175,55,.15);
      border-radius: 8px;
      color: var(--text-primary, #EEEEEE);
      padding: 0.5rem 0.75rem;
      font-family: inherit;
      font-size: 0.875rem;
      resize: none;
      max-height: 100px;
      transition: all var(--dur-fast, 200ms);
    }

    #msg-input::placeholder {
      color: var(--text-muted, #888);
    }

    #msg-input:focus {
      outline: none;
      border-color: rgba(212,175,55,.3);
      background: rgba(212,175,55,.08);
      box-shadow: 0 0 16px rgba(212,175,55,.1);
    }

    .send-btn {
      background: linear-gradient(135deg, var(--gold-900, #3D3011) 0%, var(--gold-700, #8B6F00) 40%, var(--gold-500, #D4AF37) 100%);
      border: none;
      color: #0A0700;
      cursor: pointer;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-family: var(--font-heading, sans-serif);
      font-weight: 700;
      font-size: 0.875rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      transition: all var(--dur-fast, 200ms) var(--ease-out, ease-out);
      box-shadow: 0 4px 12px rgba(212,175,55,.2);
      position: relative;
      overflow: hidden;
    }

    .send-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background var(--dur-fast, 200ms);
    }

    .send-btn:hover:not(:disabled) {
      box-shadow: 0 6px 20px rgba(212,175,55,.35);
      transform: translateY(-1px);
    }

    .send-btn:hover:not(:disabled)::after {
      background: rgba(255,255,255,.1);
    }

    .send-btn:active:not(:disabled) {
      transform: scale(0.97);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @media (max-width: 480px) {
      .online-avatar {
        width: 72px;
        height: 72px;
        font-size: 1.25rem;
      }

      .chat-card {
        padding: 0.75rem;
      }

      .chat-avatar-large {
        width: 56px;
        height: 56px;
        font-size: 1.25rem;
      }

      .message-bubble {
        max-width: 85%;
      }
    }
  </style>
  <link rel="stylesheet" href="css/unified-design-system.css"/>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="header-title">💬 Messenger</div>
    <div class="header-actions">
      <button class="header-btn" id="notif-btn" aria-label="Powiadomienia">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </button>
      <button class="header-btn" id="profile-btn" aria-label="Profil">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- Online Users Carousel -->
    <div>
      <div class="section-label">🟢 Użytkownicy Online</div>
      <div class="online-list" id="online-list">
        <div style="padding:1rem;color:var(--text-muted);font-size:0.875rem;">Ładowanie...</div>
      </div>
    </div>

    <!-- Chat Cards -->
    <div>
      <div class="section-label">Rozmowy</div>
      <div class="chats-section" id="chats-list">
        <div class="empty-state">
          <div class="empty-icon">💬</div>
          <div>Brak rozmów</div>
        </div>
      </div>
    </div>

  </div>

</div>

<!-- CHAT MODAL -->
<div class="chat-modal" id="chat-modal">
  <div class="chat-header">
    <button class="back-btn" id="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </button>
    <div class="chat-modal-info">
      <div class="chat-modal-name" id="modal-name">Rozmowa</div>
      <div class="chat-modal-status" id="modal-status">Offline</div>
    </div>
  </div>

  <div class="messages-container" id="messages-container"></div>

  <div class="input-area">
    <button class="file-btn" id="file-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
      </svg>
    </button>
    <textarea id="msg-input" placeholder="Wiadomość..." rows="1" maxlength="1000"></textarea>
    <button class="send-btn" id="send-btn" disabled>Wyślij</button>
    <input type="file" id="file-input" accept="image/*" style="display:none;">
  </div>
</div>

<script type="module">
  import { initMessenger, setOnlinePresence } from './js/messenger.js';
  import { auth } from './js/firebase.js';
  import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = '/login.html';
      return;
    }

    setOnlinePresence(user.uid, true);
    window.addEventListener('beforeunload', () => setOnlinePresence(user.uid, false));
    document.addEventListener('visibilitychange', () => {
      setOnlinePresence(user.uid, !document.hidden);
    });

    initMessenger(user.uid);
  });

  document.getElementById('profile-btn')?.addEventListener('click', () => {
    window.location.href = 'profile.html';
  });
</script>

</body>
</html>
