<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0A0B" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com/firebasejs/ https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://firestore.googleapis.com https://firebase.googleapis.com https://identitytoolkit.googleapis.com; frame-src https://apis.google.com;">
  <meta name="description" content="Weekend Warrior Social — Logowanie" />
  <title>Logowanie — Weekend Warrior Social</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WWS Arena" />
  <link rel="apple-touch-icon" href="assets/icons/icon-512.svg" />
  <!-- OG / Social -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="Weekend Warrior Social" />
  <meta property="og:description" content="Portal społecznościowy dla wojowników weekendu. Wyzwania, ranking, osiągnięcia." />
  <meta property="og:image"       content="assets/icons/icon-512.svg" />
  <meta name="twitter:card"       content="summary" />
  <meta name="twitter:title"      content="Weekend Warrior Social ⚔️" />
  <meta name="twitter:description"content="Dołącz. Walcz. Zwyciężaj." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="bg-orbs" aria-hidden="true"></div>

<main class="auth-page page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-mark">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none"
             stroke="#000000" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
      </div>
      <span class="auth-logo-title">Weekend Warrior</span>
      <span class="auth-logo-sub">Social Portal</span>
    </div>

    <!-- Form -->
    <form id="login-form" class="auth-form" novalidate>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label" for="email">Adres e-mail</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input
            id="email"
            type="email"
            class="form-input"
            placeholder="twoj@email.com"
            autocomplete="email"
            inputmode="email"
            required
          />
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <div class="forgot-row">
          <label class="form-label" for="password">Hasło</label>
          <a id="forgot-link" href="#" class="forgot-link">Nie pamiętasz hasła?</a>
        </div>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input
            id="password"
            type="password"
            class="form-input has-toggle"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" id="toggle-password" class="input-toggle" aria-label="Pokaż hasło">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button id="login-btn" type="submit" class="btn btn-primary btn-full" style="margin-top: 0.25rem;">
        Wejdź na Arenę
      </button>

    </form>

    <!-- Divider -->
    <div class="divider">lub</div>

    <!-- Google -->
    <button id="google-btn" type="button" class="btn-google">
      <span class="google-logo">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.4 0 6.4 1.2 8.8 3.1l6.6-6.6C35.4 2.5 30 0 24 0 14.6 0 6.7 5.4 2.7 13.3l7.7 6C12.3 13.4 17.7 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.7 24.5c0-1.6-.1-3.1-.4-4.5H24v8.6h12.8c-.6 3-2.3 5.5-4.8 7.2l7.4 5.8c4.3-4 6.3-9.8 7.3-17.1z"/>
          <path fill="#FBBC05" d="M10.4 28.7A14.6 14.6 0 019.5 24c0-1.6.3-3.2.8-4.7l-7.7-6A23.9 23.9 0 000 24c0 3.9.9 7.5 2.7 10.7l7.7-6z"/>
          <path fill="#34A853" d="M24 48c6 0 11-2 14.7-5.4l-7.4-5.8c-2 1.4-4.5 2.2-7.3 2.2-6.3 0-11.7-4-13.7-9.5l-7.7 6C6.7 42.6 14.6 48 24 48z"/>
        </svg>
      </span>
      Zaloguj przez Google
    </button>

    <!-- Footer -->
    <div class="auth-footer">
      Nie masz konta?&nbsp;<a href="register.html">Zarejestruj się</a>
    </div>

  </div>
</main>

<script type="module">
  import { initLoginForm, redirectIfLogged } from './js/auth.js';

  // First-time visitor without account → show onboarding
  if (!localStorage.getItem('wws_onboarded') && !localStorage.getItem('wws_seen_login')) {
    localStorage.setItem('wws_seen_login','1');
    window.location.replace('onboarding.html');
  }

  redirectIfLogged();
  initLoginForm();
</script>


  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('[SW] Registered:', reg.scope))
          .catch(err => console.warn('[SW] Registration failed:', err));
      });
    }
  </script>
</body>
</html>
