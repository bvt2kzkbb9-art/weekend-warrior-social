<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0A0B" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com/firebasejs/ https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://firestore.googleapis.com https://firebase.googleapis.com https://identitytoolkit.googleapis.com; frame-src https://apis.google.com;">
  <meta name="description" content="Weekend Warrior Social — Logowanie" />
  <title>Logowanie — Weekend Warrior Social</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WWS Arena" />
  <link rel="apple-touch-icon" href="assets/icons/icon-512.svg" />
  <!-- OG / Social -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="Weekend Warrior Social" />
  <meta property="og:description" content="Portal społecznościowy dla wojowników weekendu. Wyzwania, ranking, osiągnięcia." />
  <meta property="og:image"       content="assets/icons/icon-512.svg" />
  <meta name="twitter:card"       content="summary" />
  <meta name="twitter:title"      content="Weekend Warrior Social ⚔️" />
  <meta name="twitter:description"content="Dołącz. Walcz. Zwyciężaj." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<!-- TOP HEADER BAR -->
<header class="top-bar">
  <div class="top-bar-logo">⚔ WWS</div>
  <div class="top-bar-actions">
    <button class="top-bar-btn" id="notif-btn" aria-label="Powiadomienia">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span id="notif-badge"></span>
    </button>
    <button class="top-bar-btn" aria-label="Profil" onclick="window.location.href='profile.html'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </button>
  </div>
</header>
<div class="bg-orbs" aria-hidden="true"></div>
<div class="login-bg-glow" aria-hidden="true"></div>
<div class="particles" aria-hidden="true">
  <div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div>
  <div class="particle"></div>
</div>

<div class="auth-page" style="position:relative;z-index:1;">
  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-swords">⚔️</span>
      <div class="auth-brand">Weekend Warrior</div>
      <div class="auth-subtitle">Social · Brama Areny</div>
    </div>

    <form class="auth-form" id="login-form">
      <div style="text-align:center;padding-bottom:.25rem;">
        <div style="font-family:var(--font-body);font-size:.9375rem;color:var(--text-muted);font-style:italic;line-height:1.6;">
          Wejdź do Areny Wojowników.<br>Twoja legenda czeka.
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">✉ Adres Krwi (e-mail)</label>
        <input type="email" id="email" class="form-input" placeholder="wojownik@arena.pl" autocomplete="email" required/>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">🔑 Słowo Mocy (hasło)</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password" required/>
      </div>

      <div id="error-msg" class="form-error" style="display:none;text-align:center;"></div>

      <button id="login-btn" class="btn btn-primary btn-md btn-full">
        ⚔ Wejdź do Areny
      </button>

      <div class="auth-divider">lub</div>

      <button type="button" id="google-btn" class="google-btn">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Wejdź przez Google
      </button>

      <div class="auth-link">
        Nie masz konta?
        <a href="register.html">Zaprzysiężenie Wojownika →</a>
      </div>

      <div style="text-align:center;">
        <a href="#" id="forgot-link" style="font-family:var(--font-heading);font-size:.5rem;
           letter-spacing:.1em;color:var(--text-faint);text-transform:uppercase;">
          Zapomniałem słowa mocy
        </a>
      </div>
    </form>
  </div>
</div>

<script type="module">
import { initLoginForm, redirectIfLogged } from './js/auth.js';

redirectIfLogged();

document.addEventListener('DOMContentLoaded', () => {
  initLoginForm();
});
</script>
  <script src="js/autohide-nav.js"></script>
</body>
</html>
