<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#080808"/>
  <title>Login — Weekend Warrior Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="css/unified-design-system.css"/>
  <link rel="stylesheet" href="css/components-auth.css"/>
  <link rel="stylesheet" href="css/utilities.css"/>
</head>
<body>
  <div class="auth-container">
    <div class="auth-form-wrap">
      <div class="auth-card">
        <!-- Header -->
        <div class="auth-header">
          <div class="auth-logo">⚔</div>
          <h1 class="auth-title">Weekend Warrior</h1>
          <p class="auth-subtitle">Enter the Arena</p>
        </div>

        <!-- Login Form -->
        <form class="auth-form" id="login-form">
          <!-- Error Message -->
          <div id="error-msg" class="auth-error"></div>

          <!-- Email Field -->
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input
              type="email"
              id="email"
              class="form-input"
              placeholder="warrior@arena.com"
              autocomplete="email"
              required
            />
            <span class="form-error"></span>
          </div>

          <!-- Password Field -->
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input
              type="password"
              id="password"
              class="form-input"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <span class="form-error"></span>
          </div>

          <!-- Remember Me & Forgot Password -->
          <div class="form-helper">
            <div class="form-checkbox">
              <input type="checkbox" id="remember" name="remember">
              <label for="remember">Remember me</label>
            </div>
            <a href="#forgot-password">Forgot password?</a>
          </div>

          <!-- Submit Button -->
          <button type="submit" id="login-btn" class="auth-submit">
            Sign In
          </button>

          <!-- Divider -->
          <div class="auth-divider">
            <span>or continue with</span>
          </div>

          <!-- Social Auth -->
          <div class="social-auth">
            <button type="button" class="social-btn" id="google-btn" title="Sign in with Google">
              <span class="social-icon">G</span>
              <span>Google</span>
            </button>
            <button type="button" class="social-btn" id="discord-btn" title="Sign in with Discord">
              <span class="social-icon">💬</span>
              <span>Discord</span>
            </button>
          </div>
        </form>

        <!-- Footer Link -->
        <div class="auth-footer">
          Don't have an account?
          <a href="register.html">Create one now</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module">
    import { initLoginForm, redirectIfLogged } from './js/auth.js';

    redirectIfLogged();

    document.addEventListener('DOMContentLoaded', () => {
      initLoginForm();
    });
  </script>
</body>
</html>
