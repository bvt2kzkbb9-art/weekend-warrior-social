<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050506" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com/firebasejs/; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://firestore.googleapis.com https://firebase.googleapis.com https://cloudinary.com https://res.cloudinary.com;">
  <meta name="description" content="Weekend Warrior Social — Kroniki" />
  <title>Kroniki — Weekend Warrior Social</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="bg-orbs" aria-hidden="true"></div>

<div class="app-layout">

  <!-- FIXED TOP HEADER -->
  <header class="app-header" role="banner">
    <div class="app-header-left">
      <span class="app-header-logo">⚔ WWS</span>
    </div>
    <div class="app-header-right">
      <button class="header-icon-btn" id="notifications-btn" aria-label="Powiadomienia">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <div class="badge-dot hidden"></div>
      </button>
      <button class="header-icon-btn" id="messages-btn" aria-label="Wiadomości">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <div class="badge-dot hidden"></div>
      </button>
      <button class="header-icon-btn" id="profile-btn" aria-label="Profil">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- SCROLLABLE CONTENT AREA -->
  <main class="app-content" role="main">
    <div class="content-area page">

      <!-- Feed header -->
      <div class="feed-header">
        <span class="feed-title">📰 Kroniki</span>
        <span class="label-caps" style="color:var(--text-muted);">na żywo</span>
      </div>

      <!-- Compose box -->
      <div class="compose-card">
        <div class="compose-top">
          <div id="compose-avatar"
               class="compose-avatar"
               aria-label="Twój avatar">
          </div>
          <textarea
            id="post-textarea"
            class="compose-textarea"
            placeholder="Co słychać na arenie, wojowniku? ⚔️"
            maxlength="500"
            rows="3"
            aria-label="Treść posta"
          ></textarea>
        </div>

        <div id="compose-preview" class="compose-image-preview hidden">
          <img src="" alt="Podgląd zdjęcia" />
          <button id="remove-image-btn" class="compose-image-remove" aria-label="Usuń zdjęcie">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        <div id="upload-progress" class="hidden" style="margin-top:0.75rem;">
          <div class="progress-track">
            <div id="upload-progress-bar" class="progress-fill" style="width:0%;"></div>
          </div>
          <p style="font-size:0.75rem;color:var(--text-muted);margin-top:0.25rem;text-align:center;">
            Przesyłanie zdjęcia...
          </p>
        </div>

        <div class="compose-actions">
          <div class="compose-tools">
            <button id="image-upload-btn" class="compose-tool-btn" aria-label="Dodaj zdjęcie">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
            </button>
          </div>
          <span id="char-count" class="char-count">500</span>
          <button id="post-submit-btn" class="btn btn-primary btn-sm">
            Publikuj
          </button>
        </div>

        <input
          type="file"
          id="image-input"
          accept="image/jpeg,image/png,image/webp,image/gif"
        />
      </div>

      <!-- Feed loading skeletons -->
      <div id="feed-loading">
        <div class="post-skeleton">
          <div class="post-skeleton-header">
            <div class="skeleton" style="width:40px;height:40px;border-radius:50%;flex-shrink:0;"></div>
            <div style="flex:1;display:flex;flex-direction:column;gap:0.375rem;">
              <div class="skeleton" style="height:14px;width:45%;border-radius:4px;"></div>
              <div class="skeleton" style="height:11px;width:30%;border-radius:4px;"></div>
            </div>
          </div>
          <div class="skeleton" style="height:14px;width:90%;border-radius:4px;"></div>
          <div class="skeleton" style="height:14px;width:70%;border-radius:4px;"></div>
          <div class="skeleton" style="height:40px;border-radius:var(--r-md);margin-top:0.25rem;"></div>
        </div>

        <div class="post-skeleton" style="margin-top:0.875rem;">
          <div class="post-skeleton-header">
            <div class="skeleton" style="width:40px;height:40px;border-radius:50%;flex-shrink:0;"></div>
            <div style="flex:1;display:flex;flex-direction:column;gap:0.375rem;">
              <div class="skeleton" style="height:14px;width:38%;border-radius:4px;"></div>
              <div class="skeleton" style="height:11px;width:25%;border-radius:4px;"></div>
            </div>
          </div>
          <div class="skeleton" style="height:180px;border-radius:var(--r-md);"></div>
          <div class="skeleton" style="height:40px;border-radius:var(--r-md);margin-top:0.5rem;"></div>
        </div>
      </div>

      <!-- Feed list -->
      <div id="feed-list" class="feed-list"></div>

      <!-- Empty state -->
      <div id="feed-empty" class="feed-empty">
        <div class="feed-empty-icon">📰</div>
        <div class="feed-empty-title">Kroniki są puste</div>
        <p class="feed-empty-text">
          Nikt jeszcze nic nie napisał.<br>
          Bądź pierwszy i zacznij opowiadać historię!
        </p>
      </div>

      <!-- Load more -->
      <button id="load-more-btn" class="load-more-posts" style="display:none;">
        Załaduj więcej postów
      </button>

    </div>
  </main>

  <!-- FIXED BOTTOM NAVIGATION -->
  <nav class="app-nav" role="navigation" aria-label="Główna nawigacja">
    <a href="index.html" class="nav-item" data-page="arena">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="1"/><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/>
      </svg>
      <span>Arena</span>
    </a>
    <a href="feed.html" class="nav-item active" aria-current="page" data-page="kroniki">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>Kroniki</span>
    </a>
    <a href="challenges.html" class="nav-item" data-page="misje">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v20M2 12h20"/>
        <circle cx="12" cy="12" r="1"/>
      </svg>
      <span>Misje</span>
    </a>
    <a href="ranking.html" class="nav-item" data-page="chwala">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
        <polyline points="17 6 23 6 23 12"/>
      </svg>
      <span>Chwała</span>
    </a>
    <a href="profile.html" class="nav-item" data-page="bohater">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>Bohater</span>
    </a>
  </nav>

</div>

<script type="module">
  import { initFeed } from './js/feed.js';

  document.getElementById('profile-btn').addEventListener('click', () => {
    window.location.href = 'profile.html';
  });

  document.getElementById('messages-btn').addEventListener('click', () => {
    window.location.href = 'messages.html';
  });

  initFeed();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('[SW] Registered:', reg.scope))
        .catch(err => console.warn('[SW] Registration failed:', err));
    });
  }
</script>

</body>
</html>
