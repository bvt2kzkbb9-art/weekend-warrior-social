<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0A0B" />
  <meta name="description" content="Weekend Warrior Social — Feed" />
  <title>Feed — Weekend Warrior Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="bg-orbs" aria-hidden="true"></div>

<!-- ── Navigation ── -->
<nav class="nav" aria-label="Główna nawigacja">
  <span class="nav-brand">⚔ WWS</span>

  <a href="index.html" class="nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <span>Start</span>
  </a>

  <a href="feed.html" class="nav-item active" aria-current="page">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
    </svg>
    <span>Feed</span>
  </a>

  <a href="ranking.html" class="nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
      <polyline points="17 6 23 6 23 12"/>
    </svg>
    <span>Ranking</span>
  </a>

  <a href="profile.html" class="nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
    <span>Profil</span>
  </a>

  <div class="nav-actions">
    <button id="logout-btn" class="btn btn-ghost btn-sm" style="color:var(--text-muted);">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Wyloguj
    </button>
  </div>
</nav>

<!-- ── Content ── -->
<main class="content-area page">

  <!-- Feed header -->
  <div class="feed-header">
    <span class="feed-title">⚔ Arena</span>
    <span class="label-caps" style="color:var(--text-muted);">na żywo</span>
  </div>

  <!-- Compose box -->
  <div class="compose-card">
    <div class="compose-top">
      <!-- Avatar (wypełniany przez JS) -->
      <div id="compose-avatar"
           class="compose-avatar"
           aria-label="Twój avatar">
      </div>

      <!-- Textarea -->
      <textarea
        id="post-textarea"
        class="compose-textarea"
        placeholder="Co słychać na arenie, wojowniku? ⚔️"
        maxlength="500"
        rows="3"
        aria-label="Treść posta"
      ></textarea>
    </div>

    <!-- Image preview (hidden by default) -->
    <div id="compose-preview" class="compose-image-preview hidden">
      <img src="" alt="Podgląd zdjęcia" />
      <button id="remove-image-btn" class="compose-image-remove" aria-label="Usuń zdjęcie">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Upload progress (hidden by default) -->
    <div id="upload-progress" class="hidden" style="margin-top:0.75rem;">
      <div class="progress-track">
        <div id="upload-progress-bar" class="progress-fill" style="width:0%;"></div>
      </div>
      <p style="font-size:0.75rem;color:var(--text-muted);margin-top:0.25rem;text-align:center;">
        Przesyłanie zdjęcia...
      </p>
    </div>

    <!-- Actions row -->
    <div class="compose-actions">
      <div class="compose-tools">
        <!-- Image upload -->
        <button id="image-upload-btn" class="compose-tool-btn" aria-label="Dodaj zdjęcie" title="Dodaj zdjęcie">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </button>
      </div>

      <span id="char-count" class="char-count">500</span>

      <button id="post-submit-btn" class="btn btn-primary btn-sm">
        Publikuj
      </button>
    </div>

    <!-- Hidden file input -->
    <input
      type="file"
      id="image-input"
      accept="image/jpeg,image/png,image/webp,image/gif"
    />
  </div>

  <!-- Feed loading skeletons -->
  <div id="feed-loading">
    <div class="post-skeleton">
      <div class="post-skeleton-header">
        <div class="skeleton" style="width:40px;height:40px;border-radius:50%;flex-shrink:0;"></div>
        <div style="flex:1;display:flex;flex-direction:column;gap:0.375rem;">
          <div class="skeleton" style="height:14px;width:45%;border-radius:4px;"></div>
          <div class="skeleton" style="height:11px;width:30%;border-radius:4px;"></div>
        </div>
      </div>
      <div class="skeleton" style="height:14px;width:90%;border-radius:4px;"></div>
      <div class="skeleton" style="height:14px;width:70%;border-radius:4px;"></div>
      <div class="skeleton" style="height:40px;border-radius:var(--r-md);margin-top:0.25rem;"></div>
    </div>

    <div class="post-skeleton" style="margin-top:0.875rem;">
      <div class="post-skeleton-header">
        <div class="skeleton" style="width:40px;height:40px;border-radius:50%;flex-shrink:0;"></div>
        <div style="flex:1;display:flex;flex-direction:column;gap:0.375rem;">
          <div class="skeleton" style="height:14px;width:38%;border-radius:4px;"></div>
          <div class="skeleton" style="height:11px;width:25%;border-radius:4px;"></div>
        </div>
      </div>
      <div class="skeleton" style="height:180px;border-radius:var(--r-md);"></div>
      <div class="skeleton" style="height:40px;border-radius:var(--r-md);margin-top:0.5rem;"></div>
    </div>
  </div>

  <!-- Feed list -->
  <div id="feed-list" class="feed-list"></div>

  <!-- Empty state -->
  <div id="feed-empty" class="feed-empty">
    <div class="feed-empty-icon">⚔️</div>
    <div class="feed-empty-title">Arena jest cicha</div>
    <p class="feed-empty-text">
      Nikt jeszcze nic nie napisał.<br>
      Bądź pierwszy i zainauguruj bitwę!
    </p>
  </div>

  <!-- Load more -->
  <button id="load-more-btn" class="load-more-posts" style="display:none;">
    Załaduj więcej postów
  </button>

  <!-- Bottom padding for mobile nav -->
  <div style="height:1rem;"></div>

</main>

<script type="module">
  import { initFeed } from './js/feed.js';
  initFeed();
</script>

</body>
</html>
