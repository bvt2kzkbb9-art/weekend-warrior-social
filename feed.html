<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#06050A"/>
  <meta name="description" content="Kroniki Areny — Weekend Warrior Social"/>
  <title>Kroniki — Weekend Warrior Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/rpg-theme.css"/>
  <style>

    /* ── FEED TABS ─────────────────────────────────────────── */
    .feed-tabs {
      display: flex;
      gap: 0;
      background: var(--bg-panel);
      border: 1px solid var(--border-dim);
      border-radius: var(--r-lg);
      padding: 3px;
      margin-bottom: .875rem;
    }
    .feed-tab-btn {
      flex: 1;
      padding: .5rem .25rem;
      background: none;
      border: none;
      border-radius: calc(var(--r-lg) - 3px);
      font-family: var(--font-heading);
      font-size: .525rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--dur-fast) var(--ease-out);
      white-space: nowrap;
    }
    .feed-tab-btn:hover { color: var(--text-parchment); }
    .feed-tab-btn.active {
      background: linear-gradient(135deg, rgba(212,175,55,.18), rgba(212,175,55,.08));
      color: var(--gold-400);
      box-shadow: 0 2px 8px rgba(212,175,55,.12);
    }

    /* ── REACTION BUTTON ───────────────────────────────────── */
    .reaction-btn {
      display: flex;
      align-items: center;
      gap: .3rem;
      padding: .4rem .625rem;
      background: none;
      border: none;
      border-radius: var(--r-md);
      font-family: var(--font-heading);
      font-size: .5rem;
      font-weight: 700;
      letter-spacing: .06em;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--dur-fast);
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    .reaction-btn:hover { color: var(--gold-400); background: rgba(212,175,55,.06); }
    .reaction-btn.reacted { color: var(--gold-400); }
    .reaction-emoji { font-size: .9375rem; line-height: 1; }
    .reaction-label { display: none; }
    @media (min-width: 380px) { .reaction-label { display: inline; } }

    /* ── REACTION PICKER ───────────────────────────────────── */
    .reaction-picker {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 2px;
      background: var(--bg-panel);
      border: 1px solid var(--border-gold);
      border-radius: 9999px;
      padding: 5px 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,.7), 0 0 0 1px rgba(212,175,55,.1);
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(6px) scale(.9);
      transition: opacity .18s ease, transform .18s ease;
      white-space: nowrap;
    }
    .reaction-picker.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0) scale(1);
    }
    .reaction-picker-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 50%;
      background: none;
      font-size: 1.375rem;
      cursor: pointer;
      transition: transform .12s ease, background .12s ease;
      -webkit-tap-highlight-color: transparent;
      line-height: 1;
    }
    .reaction-picker-btn:hover,
    .reaction-picker-btn:active { transform: scale(1.3) translateY(-4px); background: rgba(255,255,255,.06); }
    .reaction-picker-btn.active { transform: scale(1.15); filter: drop-shadow(0 0 6px var(--gold-glow-md)); }

    /* ── REACTIONS SUMMARY ─────────────────────────────────── */
    .post-reactions-summary {
      display: flex;
      align-items: center;
      gap: .375rem;
      padding: .25rem .875rem .125rem;
      border-bottom: 1px solid var(--border-dim);
      min-height: 0;
    }
    .reactions-emoji-row {
      font-size: .9375rem;
      line-height: 1;
      letter-spacing: -2px;
    }
    .reactions-count {
      font-family: var(--font-heading);
      font-size: .575rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    /* ── SHARE BUTTON ──────────────────────────────────────── */
    .share-btn span {
      display: none;
      font-family: var(--font-heading);
      font-size: .5rem;
      font-weight: 700;
      letter-spacing: .06em;
    }
    @media (min-width: 420px) { .share-btn span { display: inline; } }
    .share-btn svg { width: 16px; height: 16px; }

    /* ── MENTION / HASHTAG LINKS ───────────────────────────── */
    .mention-link {
      color: var(--gold-400);
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: color var(--dur-fast);
    }
    .mention-link:hover { color: var(--gold-300); text-decoration: underline; }
    .hashtag-link {
      color: var(--gold-500);
      text-decoration: none;
      cursor: pointer;
      transition: color var(--dur-fast);
    }
    .hashtag-link:hover { color: var(--gold-300); text-decoration: underline; }

    /* ── REACTION WRAP (position context) ──────────────────── */
    .reaction-wrap { position: relative; }

  </style>
</head>
<body>

<div class="bg-orbs" aria-hidden="true"></div>
<div class="particles" aria-hidden="true">
  <div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div>
  <div class="particle"></div>
</div>

<!-- Nav -->
<nav class="nav" aria-label="Główna nawigacja">
  <span class="nav-brand">⚔ WWS</span>
  <a href="index.html" class="nav-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14.5 10c-.83 0-1.5-.67-1.5-1.5v-5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5z"/>
    </svg>
    <span>Arena</span>
  </a>
  <a href="feed.html" class="nav-item active" aria-current="page">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    <span>Kroniki</span>
  </a>
  <a href="challenges.html" class="nav-item-hero nav-item">
    <div class="nav-hero-shield">⚔</div>
    <span>Misje</span>
  </a>
  <a href="ranking.html" class="nav-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="8" r="6"/>
      <path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/>
    </svg>
    <span>Chwała</span>
  </a>
  <a href="profile.html" class="nav-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
    <span>Bohater</span>
  </a>
  <a href="messenger.html" class="nav-item" style="position:relative;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
    </svg>
    <span id="msg-nav-badge" style="display:none;position:absolute;top:-3px;right:2px;min-width:16px;height:16px;border-radius:9999px;background:var(--gold);color:#000;font-size:.5rem;font-weight:800;align-items:center;justify-content:center;border:2px solid var(--bg-nav);font-family:var(--font-hd);">0</span>
    <span>Wiadomości</span>
  </a>
  <div class="nav-actions">
    <button id="logout-btn" class="btn btn-ghost btn-sm" style="padding:.5rem;color:var(--text-faint);">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</nav>

<!-- Content -->
<main class="content-area page">

  <!-- Feed header -->
  <div class="feed-header">
    <div>
      <div class="feed-title">📜 Kroniki Areny</div>
      <div class="label-caps" style="margin-top:.15rem;">Głosy Wojowników</div>
    </div>
    <span class="label-caps" style="color:var(--fire);display:flex;align-items:center;gap:.375rem;">
      <span style="width:6px;height:6px;background:var(--fire);border-radius:50%;animation:badge-pulse 2s ease-in-out infinite;display:inline-block;"></span>
      na żywo
    </span>
  </div>

  <!-- Feed tabs -->
  <div class="feed-tabs" role="tablist" aria-label="Filtry feedu">
    <button class="feed-tab-btn active" data-tab="forYou" role="tab" aria-selected="true">
      ⚔️ Dla Ciebie
    </button>
    <button class="feed-tab-btn" data-tab="following" role="tab" aria-selected="false">
      👁️ Obserwowani
    </button>
    <button class="feed-tab-btn" data-tab="latest" role="tab" aria-selected="false">
      🕐 Najnowsze
    </button>
  </div>

  <!-- Compose box -->
  <div class="compose-card">
    <div class="compose-top">
      <div id="compose-avatar" class="compose-avatar" aria-label="Twój avatar"></div>
      <textarea id="post-textarea" class="compose-textarea"
        placeholder="Co słychać na arenie, wojowniku? ⚔️  Użyj @nick i #tag"
        maxlength="500" rows="3" aria-label="Treść posta"></textarea>
    </div>

    <div id="compose-preview" class="compose-image-preview hidden">
      <img src="" alt="Podgląd zdjęcia"/>
      <button id="remove-image-btn" class="compose-image-remove" aria-label="Usuń zdjęcie">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div id="upload-progress" class="hidden" style="margin-top:.75rem;">
      <div class="progress-track"><div id="upload-progress-bar" class="progress-fill" style="width:0%;"></div></div>
      <p style="font-size:.7rem;color:var(--text-muted);margin-top:.25rem;text-align:center;font-family:var(--font-heading);letter-spacing:.06em;">Przesyłanie do skryptorium...</p>
    </div>

    <div class="compose-actions">
      <div class="compose-tools">
        <button id="image-upload-btn" class="compose-tool-btn" aria-label="Dodaj zdjęcie" title="Dodaj zdjęcie">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </button>
      </div>
      <span id="char-count" class="char-count">500</span>
      <button id="post-submit-btn" class="btn btn-primary btn-sm">⚔ Ogłoś</button>
    </div>
    <input type="file" id="image-input" accept="image/jpeg,image/png,image/webp,image/gif"/>
  </div>

  <!-- Skeleton -->
  <div id="feed-loading">
    <div class="post-skeleton">
      <div class="post-skeleton-header">
        <div class="skeleton" style="width:40px;height:40px;border-radius:50%;flex-shrink:0;"></div>
        <div style="flex:1;display:flex;flex-direction:column;gap:.375rem;">
          <div class="skeleton" style="height:13px;width:42%;border-radius:4px;"></div>
          <div class="skeleton" style="height:10px;width:28%;border-radius:4px;"></div>
        </div>
      </div>
      <div class="skeleton" style="height:13px;width:88%;border-radius:4px;margin-bottom:.375rem;"></div>
      <div class="skeleton" style="height:13px;width:65%;border-radius:4px;margin-bottom:.625rem;"></div>
      <div class="skeleton" style="height:38px;border-radius:var(--r-md);"></div>
    </div>
    <div class="post-skeleton" style="margin-top:.875rem;">
      <div class="post-skeleton-header">
        <div class="skeleton" style="width:40px;height:40px;border-radius:50%;flex-shrink:0;"></div>
        <div style="flex:1;display:flex;flex-direction:column;gap:.375rem;">
          <div class="skeleton" style="height:13px;width:35%;border-radius:4px;"></div>
          <div class="skeleton" style="height:10px;width:22%;border-radius:4px;"></div>
        </div>
      </div>
      <div class="skeleton" style="height:180px;border-radius:var(--r-md);margin-bottom:.625rem;"></div>
      <div class="skeleton" style="height:38px;border-radius:var(--r-md);"></div>
    </div>
  </div>

  <!-- Feed list -->
  <div id="feed-list" class="feed-list" role="feed" aria-live="polite"></div>

  <!-- Empty state -->
  <div id="feed-empty" class="feed-empty" style="display:none;">
    <div class="feed-empty-icon">📜</div>
    <div class="feed-empty-title">Kroniki są puste</div>
    <p class="feed-empty-text">Nikt jeszcze nic nie zapisał.<br>Bądź pierwszy i zainauguruj bitwę!</p>
  </div>

  <button id="load-more-btn" class="load-more-posts" style="display:none;">
    📜 Załaduj więcej kronik
  </button>

  <div style="height:1rem;"></div>
</main>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
