name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/deploy-firestore-rules.yml'
      - 'README.md'
      - '.gitignore'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write Firebase credentials

  run: echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}' > /tmp/firebase-key.json

- name: Set credentials

  run: echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-key.json" >> $GITHUB_ENV

- name: Deploy to Firebase Hosting

  run: firebase deploy --only hosting --project weekend-warrior-social-ed3d0
