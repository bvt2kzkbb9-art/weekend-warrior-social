name: Setup Firebase Authentication

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/setup-firebase-auth.yml'
    branches:
      - main

jobs:
  configure-auth:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: weekend-warrior-social-ed3d0
          service_account_key: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
          export_default_credentials: true

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Authenticate Firebase
        run: |
          firebase login --token ${{ secrets.FIREBASE_CLI_TOKEN }} || \
          firebase login:ci --token ${{ secrets.FIREBASE_CLI_TOKEN }} || \
          echo "Using GOOGLE_APPLICATION_CREDENTIALS for authentication"

      - name: Get Current Auth Config
        run: |
          echo "[Firebase Auth Setup] Checking current configuration..."
          gcloud alpha identity-platform configs describe \
            --project=weekend-warrior-social-ed3d0 || true

      - name: Add Authorized Domains via Cloud Console
        run: |
          echo "[Firebase Auth Setup] Adding authorized domains..."

          DOMAINS=(
            "weekend-warrior-social-ed3d0.web.app"
            "weekend-warrior-social-ed3d0.firebaseapp.com"
            "bvt2kzkbb9-art.github.io"
            "localhost"
          )

          for domain in "${DOMAINS[@]}"; do
            echo "  Adding domain: $domain"
            gcloud auth application-default print-access-token > /tmp/token.txt

            curl -X POST \
              -H "Authorization: Bearer $(cat /tmp/token.txt)" \
              -H "Content-Type: application/json" \
              -d "{\"authorizedDomains\": [\"${domain}\"]}" \
              "https://identitytoolkit.googleapis.com/v2/projects/weekend-warrior-social-ed3d0/config" || true
          done

      - name: Verify Configuration
        run: |
          echo "[Firebase Auth Setup] Verifying configuration..."

          # Test Firebase Auth endpoint
          curl -X GET \
            "https://www.googleapis.com/identitytoolkit/v3/relyingparty/getProjectConfig?key=AIzaSyA9I-uUmWLLjq8WNrAgnlmXQxiAgRR1U98" \
            -H "Content-Type: application/json" | jq '.' || echo "Configuration check attempted"

          echo ""
          echo "✅ Firebase Auth Setup Complete"
          echo ""
          echo "If authentication errors persist:"
          echo "1. Clear browser cache (Ctrl+Shift+Delete)"
          echo "2. Hard refresh (Ctrl+Shift+R)"
          echo "3. Wait 5 minutes for DNS propagation"
          echo "4. Check Firebase Console: https://console.firebase.google.com/project/weekend-warrior-social-ed3d0/authentication/settings"
