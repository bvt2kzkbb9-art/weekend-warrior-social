name: Deploy Firestore Rules

on:
  push:
    branches:
      - main
    paths:
      - 'firestore.rules'
      - '.github/workflows/deploy-firestore-rules.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate with Firebase
        run: echo "$GOOGLE_APPLICATION_CREDENTIALS" > /tmp/firebase-key.json
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}

      - name: Verify service account permissions
        run: |
          gcloud auth activate-service-account --key-file=/tmp/firebase-key.json
          gcloud config set project weekend-warrior-social-ed3d0
          SA_EMAIL=$(gcloud config get-value account)
          echo "Service Account: ${SA_EMAIL}"
          echo ""
          echo "IMPORTANT: This service account requires the following IAM roles in GCP:"
          echo "  - roles/firebase.admin (or)"
          echo "  - roles/firebase.rulesAdmin + roles/firestore.admin"
          echo ""
          echo "Assign these roles via GCP Console:"
          echo "  1. Go to IAM & Admin -> IAM"
          echo "  2. Find service account: ${SA_EMAIL}"
          echo "  3. Grant required role(s)"
          echo "  4. Allow 1-2 minutes for permission propagation"

      - name: Deploy Firestore Rules
        run: firebase deploy --only firestore:rules --project weekend-warrior-social-ed3d0
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-key.json
