name: Deploy Firestore Rules

on:
  push:
    branches:
      - main
    paths:
      - 'firestore.rules'
      - '.github/workflows/deploy-firestore-rules.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate with Firebase
        run: echo "$GOOGLE_APPLICATION_CREDENTIALS" > /tmp/firebase-key.json
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}

      - name: Deploy Firestore Rules
        run: firebase deploy --only firestore:rules --project weekend-warrior-social-ed3d0
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-key.json
