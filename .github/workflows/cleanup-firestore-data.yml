name: Cleanup Firestore Data

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/migrate-firestore-data.js'
      - '.github/workflows/cleanup-firestore-data.yml'
    branches:
      - main

jobs:
  cleanup:
    runs-on: ubuntu-latest
    name: Cleanup corrupted Firestore documents

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Firebase Admin SDK
        run: npm install firebase-admin

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Run Firestore data cleanup
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcloud.json
        run: |
          echo "🔧 Starting Firestore data cleanup..."
          echo "[Cleanup] Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          # Save credentials
          echo "${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}" > /tmp/gcloud.json

          # Run migration script
          node scripts/migrate-firestore-data.js

          # Clean up
          rm -f /tmp/gcloud.json

          echo ""
          echo "✅ Firestore cleanup complete!"

      - name: Verify cleanup
        run: |
          echo "[Verify] Checking Firestore data structure..."
          echo "[Verify] All user documents should now have:"
          echo "  - uid (string)"
          echo "  - email (string)"
          echo "  - username (string)"
          echo "  - xp (number)"
          echo "  - level (number)"
          echo "  - rank (string: Rookie/Warrior/Champion/Legend)"
          echo "  - streak (number)"
          echo "  - online (boolean)"
          echo "  - createdAt (timestamp)"
          echo "  - updatedAt (timestamp)"
          echo "  - lastSeen (timestamp)"
          echo ""
          echo "[Verify] Old fields removed:"
          echo "  - points (converted to xp)"
          echo "  - displayName (converted to username)"
          echo "  - photoURL"
          echo "  - bannerURL"
          echo "  - bio"
          echo "  - lastLoginAt"
          echo "  - avatar"
