<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#06050A"/>
  <title>Zaprzysiężenie Wojownika — Weekend Warrior Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/rpg-theme.css"/>
  <style>
    .register-bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .register-bg::before {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 40%;
      background: linear-gradient(180deg, transparent, rgba(212,175,55,.04));
    }
    .oath-scroll {
      background: linear-gradient(135deg, rgba(28,21,9,.9), rgba(19,15,7,.95));
      border: 1px solid var(--border-gold);
      border-radius: var(--r-lg);
      padding: .875rem 1rem;
      margin: .5rem 0;
      font-family: var(--font-body);
      font-size: .875rem;
      font-style: italic;
      color: var(--text-muted);
      line-height: 1.65;
      text-align: center;
      position: relative;
    }
    .oath-scroll::before { content: '◈'; position:absolute;top:.5rem;left:.75rem;font-size:.5rem;color:var(--gold-700);opacity:.6; }
    .oath-scroll::after  { content: '◈'; position:absolute;top:.5rem;right:.75rem;font-size:.5rem;color:var(--gold-700);opacity:.6; }

    /* Password strength bars */
    .strength-bars {
      display: flex; gap: 3px; margin-top: .375rem;
    }
    .strength-bar {
      flex: 1; height: 4px; border-radius: 2px;
      background: rgba(212,175,55,.1);
      transition: background .3s ease;
    }
    .strength-bar.weak   { background: #EF4444; }
    .strength-bar.medium { background: #F59E0B; }
    .strength-bar.strong { background: #16C784; }

    #strength-label {
      font-size: .625rem;
      font-family: var(--font-heading);
      letter-spacing: .06em;
      margin-top: .25rem;
      min-height: 1em;
      display: block;
    }

    /* Password toggle */
    .input-wrap {
      position: relative;
    }
    .input-wrap .form-input {
      padding-right: 2.5rem;
    }
    .toggle-pw-btn {
      position: absolute;
      right: .625rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--text-muted);
      cursor: pointer; padding: .25rem;
      display: flex; align-items: center;
      transition: color var(--dur-fast);
    }
    .toggle-pw-btn:hover { color: var(--gold-500); }

    /* Terms checkbox */
    .terms-row {
      display: flex; align-items: flex-start; gap: .625rem;
      padding: .25rem 0;
    }
    .terms-checkbox {
      width: 16px; height: 16px;
      accent-color: var(--gold-500);
      flex-shrink: 0; margin-top: 2px;
      cursor: pointer;
    }
    .terms-label {
      font-family: var(--font-body);
      font-size: .8125rem;
      color: var(--text-muted);
      line-height: 1.5;
      cursor: pointer;
    }
    .terms-label a {
      color: var(--gold-500);
    }
    .terms-label a:hover { color: var(--gold-300); }

    .form-error-msg {
      font-size: .75rem;
      color: #EF4444;
      margin-top: .25rem;
      font-style: italic;
      display: block;
    }

    input.error { border-color: #EF4444 !important; }
    input.valid { border-color: #16C784 !important; }
  </style>
</head>
<body>
<div class="bg-orbs" aria-hidden="true"></div>
<div class="register-bg" aria-hidden="true"></div>
<div class="particles" aria-hidden="true">
  <div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div>
  <div class="particle"></div>
</div>

<div class="auth-page" style="position:relative;z-index:1;padding:1rem;">
  <div class="auth-card" style="max-width:440px;">

    <div class="auth-header">
      <span style="font-size:1.75rem;display:block;text-align:center;margin-bottom:.75rem;">🛡</span>
      <div class="auth-brand">Zaprzysiężenie</div>
      <div class="auth-subtitle">Wojownika · Weekend Warrior Social</div>
    </div>

    <form class="auth-form" id="register-form">
      <div class="oath-scroll">
        Przysięgam walczyć z honorem,<br>
        mierzyć siły na zamiary<br>
        i nigdy nie porzucać Areny.
      </div>

      <!-- Imię wojownika -->
      <div class="form-group">
        <label class="form-label" for="display-name">⚔ Imię Wojownika</label>
        <input type="text" id="display-name" class="form-input"
          placeholder="Jak będą Cię wołać na Arenie?"
          maxlength="40" autocomplete="name" required/>
      </div>

      <!-- E-mail — ID musi być "email" (auth.js initRegisterForm) -->
      <div class="form-group">
        <label class="form-label" for="email">✉ Adres Krwi (e-mail)</label>
        <input type="email" id="email" class="form-input"
          placeholder="wojownik@arena.pl"
          autocomplete="email" required/>
      </div>

      <!-- Hasło — ID musi być "password" + toggle "toggle-password" -->
      <div class="form-group">
        <label class="form-label" for="password">🔑 Słowo Mocy (hasło)</label>
        <div class="input-wrap">
          <input type="password" id="password" class="form-input"
            placeholder="Min. 6 znaków" autocomplete="new-password"
            minlength="6" required/>
          <button type="button" id="toggle-password" class="toggle-pw-btn"
            aria-label="Pokaż hasło">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <!-- Strength bars — 3 elementy, auth.js szuka .strength-bar -->
        <div class="strength-bars">
          <div class="strength-bar"></div>
          <div class="strength-bar"></div>
          <div class="strength-bar"></div>
        </div>
        <span id="strength-label"></span>
      </div>

      <!-- Potwierdź hasło — ID musi być "confirm-password" + toggle "toggle-confirm" -->
      <div class="form-group">
        <label class="form-label" for="confirm-password">🔒 Potwierdź Słowo Mocy</label>
        <div class="input-wrap">
          <input type="password" id="confirm-password" class="form-input"
            placeholder="Powtórz hasło" autocomplete="new-password"
            minlength="6" required/>
          <button type="button" id="toggle-confirm" class="toggle-pw-btn"
            aria-label="Pokaż hasło">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Regulamin — ID musi być "terms" -->
      <div class="terms-row">
        <input type="checkbox" id="terms" class="terms-checkbox"/>
        <label for="terms" class="terms-label">
          Akceptuję
          <a href="terms.html" target="_blank">Regulamin Areny</a>
          i
          <a href="privacy.html" target="_blank">Politykę Prywatności</a>.
          Przysięgam walczyć z honorem.
        </label>
      </div>

      <!-- Submit — ID musi być "register-btn" -->
      <button type="submit" id="register-btn" class="btn btn-primary btn-md btn-full">
        🛡 Zaprzysiężenie
      </button>

      <div style="font-family:var(--font-heading);font-size:.5rem;
           letter-spacing:.1em;text-align:center;color:var(--text-faint);padding:.25rem 0;">
        — lub —
      </div>

      <!-- Google — ID musi być "google-btn" -->
      <button type="button" id="google-btn" class="btn btn-outline btn-md btn-full" style="gap:.625rem;">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Zaprzysiężenie przez Google
      </button>

      <div class="auth-link">
        Masz już konto?
        <a href="login.html">Wejdź przez Bramę →</a>
      </div>

    </form>
  </div>
</div>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
