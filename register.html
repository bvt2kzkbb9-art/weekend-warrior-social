<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rejestracja</title>
  <link rel="stylesheet" href="src/styles/wireframe.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>Rejestracja</h1>
      <p>Stwórz nowe konto</p>

      <form class="auth-form" id="register-form">
        <div class="form-group">
          <label>Imię</label>
          <input type="text" id="display-name" required>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required>
        </div>

        <div class="form-group">
          <label>Hasło (min 6 znaków)</label>
          <div style="display: flex; gap: 8px;">
            <input type="password" id="password" required style="flex: 1;">
            <button type="button" id="toggle-password" class="btn" style="width: auto;">👁️</button>
          </div>
          <div style="display: flex; gap: 4px; margin-top: 4px;">
            <div class="strength-bar" style="flex: 1;"></div>
            <div class="strength-bar" style="flex: 1;"></div>
            <div class="strength-bar" style="flex: 1;"></div>
          </div>
          <div id="strength-label" style="font-size: 11px; color: #666; margin-top: 4px;"></div>
        </div>

        <div class="form-group">
          <label>Potwierdź hasło</label>
          <div style="display: flex; gap: 8px;">
            <input type="password" id="confirm-password" required style="flex: 1;">
            <button type="button" id="toggle-confirm" class="btn" style="width: auto;">👁️</button>
          </div>
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" id="terms" required>
            Akceptuję warunki
          </label>
        </div>

        <button type="submit" class="btn" id="register-btn">Stwórz konto</button>
      </form>

      <div style="margin-top: 12px; border-top: 1px solid #000; padding-top: 12px;">
        <button class="btn" style="width: 100%; margin-bottom: 8px;" id="google-btn">Zaloguj przez Google</button>
      </div>

      <div style="margin-top: 12px; text-align: center; font-size: 12px;">
        <a href="login.html">Masz już konto? Zaloguj się</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { initRegisterForm, redirectIfLogged } from './src/js/core/auth.js';
    redirectIfLogged();
    initRegisterForm();
  </script>
</body>
</html>
