<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#080B14">
  <title>Zarejestruj się - Warrior OS 2.0</title>
  <link rel="stylesheet" href="css/auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page register-page">
  <div class="auth-container">
    <!-- Background animation -->
    <div class="background-glow"></div>
    
    <!-- Główny formularz rejestracji -->
    <div class="auth-box auth-box-wide">
      <!-- Header -->
      <div class="auth-header">
        <h1 class="brand-title">⚔️ WARRIOR OS</h1>
        <p class="brand-subtitle">Rozpocznij swoją przygodę</p>
      </div>

      <!-- Formularz -->
      <form id="registerForm" class="auth-form">
        <!-- Email -->
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <div class="input-wrapper">
            <input 
              type="email" 
              id="email" 
              name="email"
              class="form-input"
              placeholder="twój@email.com"
              required
              autocomplete="email"
            >
            <span class="input-icon">📧</span>
          </div>
          <span class="form-error" id="emailError"></span>
          <span class="form-hint">Będziesz go używać do logowania</span>
        </div>

        <!-- Nazwa użytkownika -->
        <div class="form-group">
          <label for="username" class="form-label">Nazwa użytkownika</label>
          <div class="input-wrapper">
            <input 
              type="text" 
              id="username" 
              name="username"
              class="form-input"
              placeholder="TwojaNazwa"
              required
              autocomplete="username"
            >
            <span class="input-icon" id="usernameIcon">👤</span>
          </div>
          <span class="form-error" id="usernameError"></span>
          <span class="form-hint">3-20 znaków, litery, cyfry, podkreślenia</span>
        </div>

        <!-- Hasło -->
        <div class="form-group">
          <label for="password" class="form-label">Hasło</label>
          <div class="input-wrapper">
            <input 
              type="password" 
              id="password" 
              name="password"
              class="form-input"
              placeholder="••••••••"
              required
              autocomplete="new-password"
            >
            <button type="button" class="toggle-password" id="togglePassword">👁️</button>
          </div>
          <span class="form-error" id="passwordError"></span>
          <div class="password-strength">
            <div class="strength-bar" id="strengthBar"></div>
            <span class="strength-text" id="strengthText">Słabe</span>
          </div>
        </div>

        <!-- Potwierdź hasło -->
        <div class="form-group">
          <label for="confirmPassword" class="form-label">Potwierdź hasło</label>
          <div class="input-wrapper">
            <input 
              type="password" 
              id="confirmPassword" 
              name="confirmPassword"
              class="form-input"
              placeholder="••••••••"
              required
              autocomplete="new-password"
            >
            <button type="button" class="toggle-password" id="toggleConfirmPassword">👁️</button>
          </div>
          <span class="form-error" id="confirmPasswordError"></span>
        </div>

        <!-- Zgoda na warunki -->
        <div class="form-checkbox">
          <input type="checkbox" id="terms" name="terms" required>
          <label for="terms">
            Akceptuję <a href="#" class="link link-inline">Regulamin i Politykę Prywatności</a>
          </label>
          <span class="form-error" id="termsError"></span>
        </div>

        <!-- Button submit -->
        <button type="submit" class="btn btn-primary btn-large" id="submitBtn">
          <span class="btn-text">Utwórz konto</span>
          <span class="btn-loader hidden">⚡</span>
        </button>

        <!-- Error message -->
        <div class="alert alert-error hidden" id="formError"></div>
        <div class="alert alert-success hidden" id="formSuccess"></div>
      </form>

      <!-- Divider -->
      <div class="auth-divider">
        <span>lub</span>
      </div>

      <!-- Social login -->
      <div class="social-login">
        <button type="button" class="btn btn-social" id="googleBtn">
          🔵 Zarejestruj się przez Google
        </button>
      </div>

      <!-- Footer links -->
      <div class="auth-footer">
        <p class="auth-footer-text">
          Masz już konto? 
          <a href="login.html" class="link">Zaloguj się</a>
        </p>
      </div>
    </div>

    <!-- Security info -->
    <div class="security-info">
      🔒 Twoje dane są bezpieczne z szyfrowaniem Firebase
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>

  <!-- App script -->
  <script type="module" src="js/register.js"></script>
</body>
</html>
