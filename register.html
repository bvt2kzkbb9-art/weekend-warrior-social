<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0A0B" />
  <meta name="description" content="Weekend Warrior Social — Rejestracja" />
  <title>Rejestracja — Weekend Warrior Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="bg-orbs" aria-hidden="true"></div>

<main class="auth-page page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-mark">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none"
             stroke="#000000" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
        </svg>
      </div>
      <span class="auth-logo-title">Weekend Warrior</span>
      <span class="auth-logo-sub">Dołącz do drużyny</span>
    </div>

    <!-- Form -->
    <form id="register-form" class="auth-form" novalidate autocomplete="off">

      <!-- Display name -->
      <div class="form-group">
        <label class="form-label" for="display-name">Imię lub pseudonim</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input
            id="display-name"
            type="text"
            class="form-input"
            placeholder="np. IronWolf"
            autocomplete="name"
            maxlength="32"
            required
          />
        </div>
        <span class="form-hint">Tak będą Cię widzieć inni wojownicy (min. 2 znaki).</span>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label" for="email">Adres e-mail</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input
            id="email"
            type="email"
            class="form-input"
            placeholder="twoj@email.com"
            autocomplete="email"
            inputmode="email"
            required
          />
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label" for="password">Hasło</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input
            id="password"
            type="password"
            class="form-input has-toggle"
            placeholder="Minimum 6 znaków"
            autocomplete="new-password"
            required
          />
          <button type="button" id="toggle-password" class="input-toggle" aria-label="Pokaż hasło">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="strength-wrap" aria-label="Siła hasła">
          <div class="strength-bars">
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
          </div>
          <span id="strength-label"></span>
        </div>
      </div>

      <!-- Confirm password -->
      <div class="form-group">
        <label class="form-label" for="confirm-password">Potwierdź hasło</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <input
            id="confirm-password"
            type="password"
            class="form-input has-toggle"
            placeholder="Powtórz hasło"
            autocomplete="new-password"
            required
          />
          <button type="button" id="toggle-confirm" class="input-toggle" aria-label="Pokaż hasło">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Terms -->
      <div class="form-group">
        <div class="checkbox-group">
          <input type="checkbox" id="terms" class="checkbox-input" />
          <label for="terms" class="checkbox-label">
            Akceptuję <a href="#">regulamin</a> oraz <a href="#">politykę prywatności</a> serwisu.
          </label>
        </div>
      </div>

      <!-- Submit -->
      <button id="register-btn" type="submit" class="btn btn-primary btn-full" style="margin-top: 0.25rem;">
        ⚔️&nbsp; Dołącz do Bitwy
      </button>

    </form>

    <!-- Divider -->
    <div class="divider">lub</div>

    <!-- Google -->
    <button id="google-btn" type="button" class="btn-google">
      <span class="google-logo">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.4 0 6.4 1.2 8.8 3.1l6.6-6.6C35.4 2.5 30 0 24 0 14.6 0 6.7 5.4 2.7 13.3l7.7 6C12.3 13.4 17.7 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.7 24.5c0-1.6-.1-3.1-.4-4.5H24v8.6h12.8c-.6 3-2.3 5.5-4.8 7.2l7.4 5.8c4.3-4 6.3-9.8 7.3-17.1z"/>
          <path fill="#FBBC05" d="M10.4 28.7A14.6 14.6 0 019.5 24c0-1.6.3-3.2.8-4.7l-7.7-6A23.9 23.9 0 000 24c0 3.9.9 7.5 2.7 10.7l7.7-6z"/>
          <path fill="#34A853" d="M24 48c6 0 11-2 14.7-5.4l-7.4-5.8c-2 1.4-4.5 2.2-7.3 2.2-6.3 0-11.7-4-13.7-9.5l-7.7 6C6.7 42.6 14.6 48 24 48z"/>
        </svg>
      </span>
      Zarejestruj przez Google
    </button>

    <!-- Footer -->
    <div class="auth-footer">
      Masz już konto?&nbsp;<a href="login.html">Zaloguj się</a>
    </div>

  </div>
</main>

<script type="module">
  import { initRegisterForm, redirectIfLogged } from './js/auth.js';
  redirectIfLogged();
  initRegisterForm();
</script>

</body>
</html>
