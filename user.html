<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#0B0D12"/>
  <title>Profil — Weekend Warrior Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .profile-page { max-width: 680px; margin: 0 auto; padding: 0 1rem; }

    /* Banner */
    .profile-banner {
      width: 100%; height: 160px;
      background: linear-gradient(135deg, #1A2035 0%, #0F1628 100%);
      background-size: cover; background-position: center;
      border-radius: var(--r-lg) var(--r-lg) 0 0;
      position: relative;
    }
    @media (min-width: 480px) { .profile-banner { height: 200px; } }

    /* Avatar wrap */
    .profile-av-wrap {
      position: relative; display: inline-block;
      margin-top: -44px; margin-bottom: .625rem;
    }
    .profile-av {
      width: 88px; height: 88px; border-radius: 50%;
      border: 4px solid var(--bg-app);
      background: var(--bg-elevated);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.625rem; font-weight: 700; color: var(--text-secondary);
      overflow: hidden;
    }
    .profile-av img { width:100%;height:100%;object-fit:cover; }

    /* Follow/actions */
    .profile-actions {
      display: flex; gap: .5rem; flex-wrap: wrap;
      justify-content: center;
      margin-bottom: .75rem;
    }

    /* Stats row */
    .pub-stats {
      display: grid; grid-template-columns: repeat(4,1fr);
      gap: .5rem; padding: .75rem 0;
    }
    .pub-stat { text-align: center; }
    .pub-stat-val { font-size: 1.125rem; font-weight: 800; color: var(--text-primary); display: block; }
    .pub-stat-label { font-size: .625rem; color: var(--text-muted); }

    /* Follow button */
    .follow-btn {
      display: inline-flex; align-items: center; gap: .375rem;
      padding: .5rem 1.125rem;
      border-radius: var(--r-full);
      font-size: .8125rem; font-weight: 700;
      cursor: pointer; transition: all var(--dur-fast);
      border: none;
    }
    .follow-btn.unfollow-state {
      background: transparent; color: var(--text-secondary);
      border: 1px solid var(--border-light);
    }
    .follow-btn.unfollow-state:hover { border-color: var(--error); color: var(--error); }
    .follow-btn.follow-state {
      background: var(--brand); color: #fff;
      box-shadow: 0 2px 8px rgba(79,124,255,.3);
    }
    .follow-btn.follow-state:hover { background: #5F8BFF; }
    .follow-btn:disabled { opacity: .5; pointer-events: none; }

    /* Bio */
    .pub-bio {
      font-size: .9375rem; color: var(--text-secondary);
      line-height: 1.6; text-align: center;
      padding: 0 1rem .75rem;
    }

    /* Posts section */
    .pub-posts { display: flex; flex-direction: column; gap: .75rem; }
    .pub-post-card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--r-lg); overflow: hidden;
      transition: border-color var(--dur-fast);
    }
    .pub-post-card:hover { border-color: var(--border-light); }
    .pub-post-header {
      display: flex; align-items: center; gap: .625rem;
      padding: .75rem .875rem .5rem;
    }
    .pub-post-av {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--bg-elevated); overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: .625rem; font-weight: 700; color: var(--text-secondary);
      flex-shrink: 0;
    }
    .pub-post-av img { width:100%;height:100%;object-fit:cover; }
    .pub-post-time { font-size: .6875rem; color: var(--text-muted); }
    .pub-post-content {
      padding: .25rem .875rem .75rem;
      font-size: .9375rem; color: var(--text-secondary); line-height: 1.65;
    }
    .pub-post-img {
      width: 100%; max-height: 280px;
      object-fit: cover; display: block;
    }

    /* Tabs */
    .pub-tabs {
      display: flex; gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: .875rem;
    }
    .pub-tab {
      flex: 1; padding: .75rem;
      background: none; border: none;
      font-size: .8125rem; font-weight: 600;
      color: var(--text-muted); cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all var(--dur-fast);
    }
    .pub-tab.active { color: var(--text-primary); border-bottom-color: var(--brand); }
  </style>
</head>
<body>

<!-- TOP BAR -->
<header class="top-bar">
  <button onclick="history.back()" class="top-bar-btn" aria-label="Wróć" style="flex-shrink:0;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>
  <span class="top-bar-brand" id="page-title">Profil</span>
  <nav class="top-bar-actions">
    <a href="messenger.html" class="top-bar-btn" aria-label="Wiadomości">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
      </svg>
      <span id="msg-nav-badge" class="top-bar-badge" style="display:none;">0</span>
    </a>
    <a href="profile.html" class="top-bar-avatar" id="top-bar-avatar" aria-label="Mój profil">W</a>
  </nav>
</header>

<!-- BOTTOM NAV -->
<nav class="nav" aria-label="Nawigacja">
  <a href="index.html" class="nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <span>Arena</span>
  </a>
  <a href="feed.html" class="nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
    </svg>
    <span>Kroniki</span>
  </a>
  <a href="challenges.html" class="nav-item nav-item-hero">
    <div class="nav-hero-shield">⚔</div>
    <span>Misje</span>
  </a>
  <a href="ranking.html" class="nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
    </svg>
    <span>Chwała</span>
  </a>
</nav>

<main class="content-area">
  <div class="profile-page">

    <!-- Skeleton -->
    <div id="profile-skeleton">
      <div style="background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:.875rem;">
        <div class="skeleton" style="height:160px;border-radius:var(--r-lg) var(--r-lg) 0 0;"></div>
        <div style="text-align:center;padding:0 1rem 1.5rem;">
          <div class="skeleton" style="width:88px;height:88px;border-radius:50%;margin:-44px auto .75rem;border:4px solid var(--bg-app);"></div>
          <div class="skeleton" style="height:18px;width:45%;border-radius:4px;margin:0 auto .5rem;"></div>
          <div class="skeleton" style="height:12px;width:30%;border-radius:4px;margin:0 auto 1rem;"></div>
          <div class="skeleton" style="height:36px;width:120px;border-radius:var(--r-full);margin:0 auto;"></div>
        </div>
      </div>
    </div>

    <!-- Profile content -->
    <div id="profile-content" class="hidden">

      <!-- Hero card -->
      <div style="background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:.875rem;">

        <!-- Banner -->
        <div class="profile-banner" id="pub-banner"></div>

        <!-- Avatar + info -->
        <div style="text-align:center;padding:0 1rem .75rem;position:relative;z-index:1;">
          <div class="profile-av-wrap">
            <div class="profile-av" id="pub-avatar">W</div>
          </div>

          <div class="profile-name" id="pub-name">—</div>
          <div class="profile-rank-tag" id="pub-rank-tag" style="display:inline-flex;margin-bottom:.375rem;">
            <span id="pub-rank-emoji">⚔️</span>&nbsp;<span id="pub-rank-label">Rookie</span>
          </div>
          <div style="font-size:.75rem;color:var(--text-muted);margin-bottom:.625rem;">
            Poziom <span id="pub-level">1</span> · <span id="pub-xp-text">0 XP</span>
          </div>

          <!-- XP bar -->
          <div style="max-width:240px;margin:0 auto .875rem;">
            <div class="profile-xp-track">
              <div class="profile-xp-fill" id="pub-xp-fill" style="width:0%;"></div>
            </div>
          </div>

          <!-- Follow counts -->
          <div style="display:flex;justify-content:center;gap:2rem;margin-bottom:.75rem;">
            <div style="text-align:center;">
              <div style="font-size:1rem;font-weight:800;color:var(--text-primary);" id="pub-followers">0</div>
              <div style="font-size:.6875rem;color:var(--text-muted);">Obserwujący</div>
            </div>
            <div style="text-align:center;">
              <div style="font-size:1rem;font-weight:800;color:var(--text-primary);" id="pub-following">0</div>
              <div style="font-size:.6875rem;color:var(--text-muted);">Obserwuje</div>
            </div>
          </div>

          <!-- Bio -->
          <div class="pub-bio" id="pub-bio" style="display:none;"></div>

          <!-- Actions -->
          <div class="profile-actions" id="pub-actions">
            <!-- Injected by JS -->
          </div>
        </div>

        <!-- Stats grid -->
        <div style="border-top:1px solid var(--border);padding:.625rem 1rem;">
          <div class="pub-stats">
            <div class="pub-stat">
              <span class="pub-stat-val" id="pub-posts">0</span>
              <span class="pub-stat-label">Posty</span>
            </div>
            <div class="pub-stat">
              <span class="pub-stat-val" id="pub-xp">0</span>
              <span class="pub-stat-label">XP</span>
            </div>
            <div class="pub-stat">
              <span class="pub-stat-val" id="pub-wins">0</span>
              <span class="pub-stat-label">Wygrane</span>
            </div>
            <div class="pub-stat">
              <span class="pub-stat-val" id="pub-streak" style="color:var(--fire);">0🔥</span>
              <span class="pub-stat-label">Seria</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Achievements -->
      <div style="background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:.875rem;">
        <div class="rpg-panel-header">
          <div class="rpg-panel-title">🏅 Osiągnięcia</div>
          <span id="pub-ach-count" style="font-size:.75rem;color:var(--text-muted);"></span>
        </div>
        <div id="pub-ach-grid" class="achievements-grid"></div>
      </div>

      <!-- Posts tabs + list -->
      <div style="background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:1rem;">
        <div class="pub-tabs">
          <button class="pub-tab active" data-tab="posts">📜 Posty</button>
          <button class="pub-tab" data-tab="achievements">🏅 Odznaki</button>
        </div>
        <div id="pub-posts-list" style="padding:.75rem;"></div>
      </div>

    </div><!-- /profile-content -->
  </div>
</main>

<script type="module">
import { checkAuth } from './js/auth.js';
import { db, COL, getRank, getLevel, getRankProgress, RANKS } from './js/firebase.js';
import { followUser, unfollowUser, isFollowing, getFollowCounts } from './js/social.js';
import { injectMessengerBadge } from './js/messenger.js';
import { openConversation } from './js/messenger.js';
import {
  doc, getDoc, getDocs, collection, query, where, orderBy, limit,
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

// ── Osiągnięcia — te same IDs co achievements.js ──────────────
const ACH_DEFS = [
  { id:'first_post',      icon:'📝', name:'Pierwsze słowo',           check: d=>(d.postsCount??0)>=1 },
  { id:'five_posts',      icon:'✍️', name:'Narrator areny',           check: d=>(d.postsCount??0)>=5 },
  { id:'ten_posts',       icon:'📖', name:'Kronikarz bitew',          check: d=>(d.postsCount??0)>=10 },
  { id:'first_comment',   icon:'💬', name:'Pierwszy głos',           check: d=>(d.commentsCount??0)>=1 },
  { id:'first_like',      icon:'❤️', name:'Pierwsze uznanie',        check: d=>(d.likesReceived??0)>=1 },
  { id:'ten_likes',       icon:'🔥', name:'Wojownik popularny',      check: d=>(d.likesReceived??0)>=10 },
  { id:'rank_warrior',    icon:'🥈', name:'Warrior',                  check: d=>(d.points??0)>=500 },
  { id:'rank_champion',   icon:'🥇', name:'Champion',                 check: d=>(d.points??0)>=2000 },
  { id:'rank_legend',     icon:'💎', name:'Legend',                   check: d=>(d.points??0)>=10000 },
  { id:'golden_circle',   icon:'🌟', name:'Złoty Krąg',              check: d=>(d.points??0)>=1000 },
  { id:'dragon_slayer',   icon:'🐉', name:'Pogromca Węża',           check: d=>(d.points??0)>=5000 },
];

const params    = new URLSearchParams(window.location.search);
const targetUid = params.get('uid') || params.get('id');

if (!targetUid) {
  document.getElementById('profile-skeleton').innerHTML = `
    <div style="text-align:center;padding:3rem 1rem;">
      <div style="font-size:2rem;margin-bottom:1rem;">⚔️</div>
      <div style="color:var(--text-muted);">Nie podano ID użytkownika</div>
      <a href="index.html" style="color:var(--brand);display:block;margin-top:1rem;">← Wróć do Areny</a>
    </div>`;
}

let myUid = null, myData = {};

checkAuth(async (user) => {
  myUid = user.uid;
  injectMessengerBadge(user.uid);

  // Update top bar avatar
  try {
    const snap = await getDoc(doc(db, COL.USERS, user.uid));
    myData = snap.data() || {};
    const avEl = document.getElementById('top-bar-avatar');
    if (avEl && myData.photoURL) avEl.innerHTML = `<img src="${_esc(myData.photoURL)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>`;
    else if (avEl) avEl.textContent = (myData.displayName||user.displayName||'W').charAt(0).toUpperCase();
  } catch {}

  // If viewing own profile → redirect to profile.html
  if (targetUid === user.uid) {
    window.location.href = 'profile.html';
    return;
  }

  // Load target user
  const skTimer = setTimeout(() => {
    document.getElementById('profile-skeleton')?.remove();
    document.getElementById('profile-content')?.classList.remove('hidden');
  }, 2500);

  let userData = null;
  try {
    const snap = await getDoc(doc(db, COL.USERS, targetUid));
    if (!snap.exists()) { throw new Error('not_found'); }
    userData = { uid: snap.id, ...snap.data() };
  } catch {
    clearTimeout(skTimer);
    document.getElementById('profile-skeleton').innerHTML = `
      <div style="text-align:center;padding:3rem 1rem;">
        <div style="font-size:2rem;margin-bottom:1rem;">😕</div>
        <div style="color:var(--text-muted);">Nie znaleziono wojownika.</div>
        <a href="index.html" style="color:var(--brand);display:block;margin-top:1rem;">← Wróć do Areny</a>
      </div>`;
    return;
  }

  clearTimeout(skTimer);
  document.getElementById('profile-skeleton')?.remove();
  document.getElementById('profile-content').classList.remove('hidden');

  _renderProfile(userData);
  _renderAchievements(userData);
  await _loadPosts(targetUid);
  await _loadFollowCounts(targetUid);
  _setupActions(user, userData);

  // Tab switching
  document.querySelectorAll('.pub-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.pub-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (btn.dataset.tab === 'posts') _loadPosts(targetUid);
      else _renderAchievementsTab(userData);
    });
  });
});

function _renderProfile(data) {
  const name     = data.displayName || 'Wojownik';
  const points   = Number(data.points) || 0;
  const level    = getLevel(points);
  const rankObj  = getRank(points);
  const progress = getRankProgress(points);
  const rankIdx  = RANKS.findIndex(r => r.id === rankObj.id);
  const next     = RANKS[rankIdx + 1];
  const xpIn     = Math.max(0, points - rankObj.min);
  const xpNeed   = Math.max(1, (next?.min ?? points + 500) - rankObj.min);

  document.title = `${name} — Weekend Warrior Social`;

  // Banner
  const banner = document.getElementById('pub-banner');
  if (banner && data.bannerUrl) banner.style.backgroundImage = `url(${_esc(data.bannerUrl)})`;

  // Avatar
  const av  = document.getElementById('pub-avatar');
  const ini = name.charAt(0).toUpperCase();
  if (av) {
    if (data.photoURL) {
      av.innerHTML = `<img src="${_esc(data.photoURL)}" alt="Avatar" onerror="this.style.display='none';this.parentElement.textContent='${ini}'"/>`;
    } else { av.textContent = ini; }
  }

  const s = (id, v) => { const e = document.getElementById(id); if(e) e.textContent = v; };
  s('page-title',    name);
  s('pub-name',      name);
  s('pub-rank-emoji', rankObj.emoji);
  s('pub-rank-label', rankObj.label);
  s('pub-level',     level);
  s('pub-xp-text',   `${xpIn.toLocaleString('pl-PL')} / ${xpNeed.toLocaleString('pl-PL')} XP`);
  s('pub-posts',     data.postsCount || 0);
  s('pub-xp',        points.toLocaleString('pl-PL'));
  s('pub-wins',      data.challengesCompleted || 0);
  s('pub-streak',    `${data.streak || 0}🔥`);

  // Bio
  const bioEl = document.getElementById('pub-bio');
  if (bioEl && data.bio) { bioEl.textContent = data.bio; bioEl.style.display = 'block'; }

  setTimeout(() => {
    const f = document.getElementById('pub-xp-fill');
    if (f) f.style.width = progress + '%';
  }, 400);
}

async function _loadFollowCounts(uid) {
  try {
    const counts = await getFollowCounts(uid);
    const s = (id, v) => { const e = document.getElementById(id); if(e) e.textContent = v; };
    s('pub-followers', counts.followers);
    s('pub-following', counts.following);
  } catch {}
}

function _renderAchievements(data) {
  const grid = document.getElementById('pub-ach-grid');
  const count = document.getElementById('pub-ach-count');
  if (!grid) return;
  const earned = new Set(Array.isArray(data.achievements) ? data.achievements : []);
  let n = 0;
  grid.innerHTML = '';
  ACH_DEFS.forEach((ach, i) => {
    const unlocked = earned.has(ach.id) || ach.check(data);
    if (unlocked) n++;
    const item = document.createElement('div');
    item.className = 'achievement-item' + (unlocked ? '' : ' locked');
    item.style.animationDelay = (i * .04) + 's';
    item.title = ach.name;
    item.innerHTML = `<div class="achievement-icon">${unlocked ? ach.icon : '🔒'}</div><div class="achievement-name">${unlocked ? ach.name : '???'}</div>`;
    grid.appendChild(item);
  });
  if (count) count.textContent = `${n} / ${ACH_DEFS.length}`;
}

function _renderAchievementsTab(data) {
  const container = document.getElementById('pub-posts-list');
  if (!container) return;
  const earned = new Set(Array.isArray(data.achievements) ? data.achievements : []);
  container.innerHTML = '<div class="achievements-grid">' + ACH_DEFS.map(ach => {
    const unlocked = earned.has(ach.id) || ach.check(data);
    return `<div class="achievement-item ${unlocked ? '' : 'locked'}" title="${_esc(ach.name)}">
      <div class="achievement-icon">${unlocked ? ach.icon : '🔒'}</div>
      <div class="achievement-name">${unlocked ? _esc(ach.name) : '???'}</div>
    </div>`;
  }).join('') + '</div>';
}

async function _loadPosts(uid) {
  const container = document.getElementById('pub-posts-list');
  if (!container) return;
  container.innerHTML = '<div class="skeleton" style="height:80px;border-radius:var(--r-md);margin-bottom:.5rem;"></div>'.repeat(2);
  try {
    const snap = await getDocs(query(
      collection(db, COL.POSTS),
      where('authorId','==', uid),
      orderBy('createdAt','desc'),
      limit(10)
    ));
    container.innerHTML = '';
    if (snap.empty) {
      container.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--text-muted);">Brak postów.</div>`;
      return;
    }
    snap.forEach(d => {
      const p   = d.data();
      const ini = (p.authorName||'W').charAt(0).toUpperCase();
      const card = document.createElement('div');
      card.className = 'pub-post-card';
      card.innerHTML = `
        <div class="pub-post-header">
          <div class="pub-post-av">
            ${p.authorPhoto ? `<img src="${_esc(p.authorPhoto)}" alt="Av" onerror="this.style.display='none';this.parentElement.textContent='${ini}'"/>` : ini}
          </div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:.8125rem;font-weight:600;color:var(--text-primary);">${_esc(p.authorName||'Wojownik')}</div>
            <div class="pub-post-time">${_fmtTime(p.createdAt)}</div>
          </div>
        </div>
        ${p.content ? `<div class="pub-post-content">${_esc(p.content)}</div>` : ''}
        ${p.imageUrl ? `<img src="${_esc(p.imageUrl)}" class="pub-post-img" loading="lazy" alt="Zdjęcie"/>` : ''}`;
      container.appendChild(card);
    });
  } catch(e) { console.warn('[loadPosts]', e.code); }
}

function _setupActions(myUser, target) {
  const actions = document.getElementById('pub-actions');
  if (!actions) return;
  actions.innerHTML = '';

  // Follow button
  const followBtn = document.createElement('button');
  followBtn.className = 'follow-btn follow-state';
  followBtn.textContent = '+ Obserwuj';
  let followDocId = null;

  isFollowing(myUser.uid, target.uid).then(({ following, docId }) => {
    followDocId = docId;
    if (following) {
      followBtn.className = 'follow-btn unfollow-state';
      followBtn.textContent = 'Obserwujesz';
    }
  }).catch(() => {});

  followBtn.addEventListener('click', async () => {
    followBtn.disabled = true;
    try {
      if (followDocId) {
        await unfollowUser(myUser.uid, target.uid);
        followDocId = null;
        followBtn.className = 'follow-btn follow-state';
        followBtn.textContent = '+ Obserwuj';
        const f = document.getElementById('pub-followers');
        if (f) f.textContent = Math.max(0, (parseInt(f.textContent)||1) - 1);
      } else {
        followDocId = await followUser(myUser.uid, target.uid,
          myData.displayName || myUser.displayName || 'Wojownik');
        followBtn.className = 'follow-btn unfollow-state';
        followBtn.textContent = 'Obserwujesz';
        const f = document.getElementById('pub-followers');
        if (f) f.textContent = (parseInt(f.textContent)||0) + 1;
      }
    } catch(e) { console.warn(e.message); }
    finally { followBtn.disabled = false; }
  });
  actions.appendChild(followBtn);

  // Message button
  const msgBtn = document.createElement('button');
  msgBtn.className = 'btn btn-outline btn-sm';
  msgBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg> Napisz`;
  msgBtn.addEventListener('click', () => openConversation(target.uid));
  actions.appendChild(msgBtn);
}

function _fmtTime(ts) {
  if (!ts) return '';
  const d = ts?.toDate?.() ?? (ts?.seconds ? new Date(ts.seconds*1000) : new Date(ts));
  if (isNaN(d)) return '';
  const m = Math.floor((Date.now()-d)/60000);
  if (m < 1)  return 'przed chwilą';
  if (m < 60) return `${m} min. temu`;
  const h = Math.floor(m/60);
  if (h < 24) return `${h} godz. temu`;
  return `${Math.floor(h/24)} dni temu`;
}

function _esc(s) {
  if (typeof s !== 'string') return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
