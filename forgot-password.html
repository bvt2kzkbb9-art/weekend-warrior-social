<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset hasła</title>
  <link rel="stylesheet" href="src/styles/foundation.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>WEEKEND WARRIOR</h1>
      <p>Resetuj hasło</p>

      <form class="auth-form" id="reset-form">
        <div id="error-msg" style="display: none; color: red; font-size: 12px; margin-bottom: 10px;"></div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required>
        </div>

        <button type="submit" class="btn btn-full" id="reset-btn">Wyślij link resetowania</button>
      </form>

      <div class="auth-links">
        <a href="login.html">Wróć do logowania</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { initResetPasswordForm, redirectIfLogged } from './src/js/core/auth.js';
    redirectIfLogged();
    initResetPasswordForm();
  </script>
</body>
</html>
