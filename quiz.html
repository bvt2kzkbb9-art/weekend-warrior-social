<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Próba Wiedzy Wojownika</title>

  <!-- Styl dark fantasy -->
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #f5d98c;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    #quiz-root {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }

    .quiz-wrapper {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .quiz-header {
      text-align: center;
      padding: 10px 0;
    }

    .quiz-title {
      font-size: 26px;
      font-weight: bold;
      color: #f5d98c;
      text-shadow: 0 0 10px #caa85a;
    }

    .quiz-subtitle {
      font-size: 14px;
      opacity: 0.8;
      margin-top: 5px;
    }

    .quiz-progress {
      margin-top: 10px;
      font-size: 14px;
      color: #caa85a;
    }

    .quiz-question-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #caa85a33;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 0 10px #000 inset;
    }

    .quiz-question-text {
      font-size: 20px;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    .quiz-answers {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .quiz-answer-btn {
      padding: 14px;
      font-size: 16px;
      background: #111;
      border: 1px solid #caa85a55;
      border-radius: 10px;
      color: #f5d98c;
      cursor: pointer;
      transition: 0.2s;
    }

    .quiz-answer-btn:hover {
      background: #222;
    }

    .quiz-answer-btn.selected {
      border-color: #f5d98c;
      background: #1a1405;
    }

    .quiz-answer-btn.correct {
      border-color: #4caf50;
      background: #0f2a0f;
    }

    .quiz-answer-btn.incorrect {
      border-color: #d9534f;
      background: #2a0f0f;
    }

    .quiz-footer {
      text-align: center;
    }

    .quiz-next-btn {
      padding: 14px 30px;
      font-size: 18px;
      background: #caa85a;
      border: none;
      border-radius: 10px;
      color: #000;
      cursor: pointer;
      opacity: 0.9;
      transition: 0.2s;
    }

    .quiz-next-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .quiz-next-btn:hover:not(:disabled) {
      opacity: 1;
    }

    /* Wyniki */
    .quiz-results-wrapper {
      text-align: center;
      padding: 20px;
    }

    .quiz-results-title {
      font-size: 26px;
      font-weight: bold;
      color: #f5d98c;
      margin-bottom: 10px;
    }

    .quiz-results-stat {
      margin: 12px 0;
      font-size: 18px;
    }

    .quiz-results-total {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
      color: #f5d98c;
    }

    .quiz-results-btn {
      display: block;
      margin: 15px auto;
      padding: 12px 20px;
      width: 80%;
      max-width: 300px;
      background: #caa85a;
      color: #000;
      border-radius: 10px;
      text-decoration: none;
      font-size: 18px;
    }

    .quiz-results-btn.secondary {
      background: #333;
      color: #f5d98c;
      border: 1px solid #caa85a55;
    }

    /* Błąd */
    .quiz-error {
      text-align: center;
      padding: 40px 20px;
    }

    .quiz-error-title {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .quiz-error-back {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #caa85a;
      color: #000;
      border-radius: 10px;
      text-decoration: none;
    }
  </style>
</head>

<body data-page="quiz">

  <!-- Kontener, do którego quiz.js wstrzykuje UI -->
  <div id="quiz-root"></div>

  <!-- Logika quizu -->
  <script type="module" src="js/quiz.js"></script>

</body>
</html>
