<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#080808"/>
  <title>Weekend Warrior Social</title>
  <link rel="manifest" href="../../manifest.json"/>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #080808;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .loader {
      text-align: center;
    }
    .logo {
      font-size: 4rem;
      margin-bottom: 20px;
      animation: pulse 1.5s infinite;
    }
    .tekst {
      font-size: 1.2rem;
      margin-bottom: 10px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="loader">
    <div class="logo">⚔️</div>
    <div class="tekst">Weekend Warrior Social</div>
    <div style="color: #888; font-size: 0.9rem;">Ładowanie...</div>
  </div>

  <script type="module">
    import { auth } from '../js/core/firebase.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

    // Czekaj na inicjalizację auth
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // Użytkownik zalogowany - idź do Arena
        window.location.href = 'screens/arena.html';
      } else {
        // Użytkownik nie zalogowany - idź do Logowania
        window.location.href = 'auth/login.html';
      }
    });
  </script>
</body>
</html>
