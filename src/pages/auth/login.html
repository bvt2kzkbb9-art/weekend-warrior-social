<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#080808"/>
  <title>Logowanie — Weekend Warrior Social</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="../../css/main.css"/>
</head>
<body>
  <div class="auth-container">
    <div class="auth-form-wrap">
      <div class="auth-card">
        <!-- Nagłówek -->
        <div class="auth-header">
          <div class="auth-logo">⚔️</div>
          <h1 class="auth-title">Weekend Warrior</h1>
          <p class="auth-subtitle">Wejdź do Areny</p>
        </div>

        <!-- Formularz Logowania -->
        <form class="auth-form" id="login-form">
          <!-- Wiadomość o błędzie -->
          <div id="error-msg" class="auth-error"></div>

          <!-- Pole Email -->
          <div class="form-group">
            <label class="form-label" for="email">Adres Email</label>
            <input
              type="email"
              id="email"
              class="form-input"
              placeholder="wojownik@arena.com"
              autocomplete="email"
              required
            />
            <span class="form-error"></span>
          </div>

          <!-- Pole Hasła -->
          <div class="form-group">
            <label class="form-label" for="password">Hasło</label>
            <input
              type="password"
              id="password"
              class="form-input"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <span class="form-error"></span>
          </div>

          <!-- Zapamiętaj mnie & Zapomniane Hasło -->
          <div class="form-helper">
            <div class="form-checkbox">
              <input type="checkbox" id="remember" name="remember">
              <label for="remember">Zapamiętaj mnie</label>
            </div>
            <a href="#forgot-password" id="forgot-link">Zapomniałeś hasła?</a>
          </div>

          <!-- Przycisk Logowania -->
          <button type="submit" id="login-btn" class="auth-submit">
            Zaloguj się
          </button>

          <!-- Separator -->
          <div class="auth-divider">
            <span>lub kontynuuj z</span>
          </div>

          <!-- Social Auth -->
          <div class="social-auth">
            <button type="button" class="social-btn" id="google-btn" title="Zaloguj się przez Google">
              <span class="social-icon">G</span>
              <span>Google</span>
            </button>
          </div>
        </form>

        <!-- Link Stopki -->
        <div class="auth-footer">
          Nie masz konta?
          <a href="register.html">Stwórz je teraz</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module">
    import { initLoginForm, redirectIfLogged } from '../../js/core/auth.js';

    redirectIfLogged();

    document.addEventListener('DOMContentLoaded', () => {
      initLoginForm();
    });
  </script>
</body>
</html>
